<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1800s British Parliamentary Strategy Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#0F223D] text-[#E2E8F0]">
  <div id="root"></div>

  <script type="text/babel">
    const MONTH_NAMES = [
      'Jan (Early)', 'Jan (Late)', 'Feb (Early)', 'Feb (Late)', 'Mar (Early)', 'Mar (Late)', 
      'Apr (Early)', 'Apr (Late)', 'May (Early)', 'May (Late)', 'Jun (Early)', 'Jun (Late)',
      'Jul (Early)', 'Jul (Late)', 'Aug (Early)', 'Aug (Late)', 'Sep (Early)', 'Sep (Late)',
      'Oct (Early)', 'Oct (Late)', 'Nov (Early)', 'Nov (Late)', 'Dec (Early)', 'Dec (Late)'
    ];

    const RECESS_TURNS = {
      6: 'Easter Recess',               
      13: 'Summer Recess',              
      14: 'Summer Recess',              
      15: 'Summer Recess',              
      16: 'Summer Recess',              
      18: 'Conference Recess',          
      24: 'Christmas & New Year Recess' 
    };

    const ROMAN_NUMERALS = ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII', 'IX', 'X', 'XI', 'XII'];

    const DIPLOMATIC_OPTIONS = [
      { id: 'alliance', title: 'CONCLUDING ALLIANCES & SOLEMN COMPACTS', desc: 'Formal treaties of mutual defense, trade concessions, and military alignment.' },
      { id: 'subsidies', title: 'DIPLOMATIC SUBSIDIES & COALITION FUNDING', desc: 'Direct financial transfers to continental powers to sustain military campaigns.' },
      { id: 'sanctions', title: 'COMMERCIAL SANCTIONS & TARIFF EMBARGOES', desc: 'Restricted trade mandates targeting rival sovereign ports and trade lanes.' },
      { id: 'mediation', title: 'PEACE MEDIATION & CONGRESS ARBITRATION', desc: 'Sponsoring multi-power summits to resolve ongoing territorial disputes.' },
      { id: 'expulsion', title: 'EXPULSION OF DIPLOMATIC ENVOYS & SEVERANCE', desc: 'Recalling ambassadors and ordering foreign legations to depart the realm.' },
      { id: 'embargo', title: 'MERCANTILE INTERDICTS & PORT BLOCKADES', desc: 'Naval interdictions and port blockades enforcing maritime supremacy.' }
    ];

    function ParliamentaryEngine() {
      const [gameState, setGameState] = React.useState('TIMETABLE_BUILDER');
      const [selectedYear, setSelectedYear] = React.useState(1820);
      const [activeTab, setActiveTab] = React.useState('Foreign Office');
      const [exchequerSubTab, setExchequerSubTab] = React.useState('CONSOLIDATED_FUNDS');
      const [currentTurn, setCurrentTurn] = React.useState(1);
      const [isMenuOpen, setIsMenuOpen] = React.useState(false);

      const [justiceTurns, setJusticeTurns] = React.useState([]);
      const [peaceTurns, setPeaceTurns] = React.useState([]);
      const [oppositionTurns, setOppositionTurns] = React.useState([]);
      const [warOfficeTurn, setWarOfficeTurn] = React.useState(null);
      const [admiraltyTurn, setAdmiraltyTurn] = React.useState(null);

      const [turn3Rev, setTurn3Rev] = React.useState(9154);
      const [turn8Rev, setTurn8Rev] = React.useState(12500);
      const [growthRate, setGrowthRate] = React.useState(null);

      // Foreign Office Dynamic Order State
      const [selectedActionsOrder, setSelectedActionsOrder] = React.useState([]);
      const [foreignForm, setForeignForm] = React.useState({
        foreignSecretary: 'Viscount Castlereagh',
        treatyName: 'Treaty of Solemn League',
        treatyNature: 'Coalition Accord',
        actionDetails: {}
      });

      // Consolidated Funds Form State
      const [cfForm, setCfForm] = React.useState({
        domTax: 12500,
        bristol: 3400,
        chatham: 2800,
        liverpool: 4100,
        waterford: 1500,
        tradeIncome: 5200,
        coreTreasury: 8900,
        protectorates: 2100,
        subsidies: 1200,
        contributions: 800,
        reparations: 1500,
        prizeGrants: 600,
        exactions: 400,
        landForces: 8500,
        fleetMaint: 9200,
        townWatch: 1200,
        civilList: 3100,
        pensions: 1400,
        diplomatic: 1800,
        initialLiquidity: 24500
      });

      // Home Office State
      const [homeOfficeForm, setHomeOfficeForm] = React.useState({
        reportingOfficer: 'Viscount Sidmouth',
        publicOrder: { london: 8, wales: 6, scotland: 7, ireland: 4 },
        clamour: { london: 3, wales: 5, scotland: 2, ireland: 8 },
        garrisons: { london: 4, wales: 2, scotland: 2, ireland: 6 },
        ministers: { london: 2, wales: 1, scotland: 1, ireland: 1 },
        buildings: { london: 3, wales: 1, scotland: 1, ireland: 0 },
        govType: { london: 2, wales: 2, scotland: 2, ireland: 2 },
        culture: { london: 5, wales: 2, scotland: 3, ireland: 1 },
        religiousUnrest: { london: 1, wales: 2, scotland: 2, ireland: 5 },
        foreignAgents: [
          { nation: 'Kingdom of France', name: 'Jean-Luc Moreau', status: 'Under Surveillance', location: 'London (Soho)' },
          { nation: 'Russian Empire', name: 'Count Nikolai Volkov', status: 'Monitored', location: 'Edinburgh' }
        ]
      });

      const toggleDiplomaticAction = (actionId) => {
        if (selectedActionsOrder.includes(actionId)) {
          setSelectedActionsOrder(selectedActionsOrder.filter(id => id !== actionId));
        } else {
          // Dynamic append to ensure First Come First Served numbering
          setSelectedActionsOrder([...selectedActionsOrder, actionId]);
        }
      };

      const handleCfChange = (field, val) => {
        const parsed = parseFloat(val);
        setCfForm((prev) => ({
          ...prev,
          [field]: isNaN(parsed) ? 0 : parsed
        }));
      };

      const handleHomeOfficeChange = (category, region, val) => {
        const parsed = parseInt(val) || 0;
        setHomeOfficeForm((prev) => ({
          ...prev,
          [category]: {
            ...prev[category],
            [region]: parsed
          }
        }));
      };

      const handleAddAgent = () => {
        setHomeOfficeForm((prev) => ({
          ...prev,
          foreignAgents: [
            ...prev.foreignAgents,
            { nation: '', name: '', status: 'Unconfirmed', location: '' }
          ]
        }));
      };

      const handleAgentChange = (index, field, value) => {
        setHomeOfficeForm((prev) => {
          const updated = [...prev.foreignAgents];
          updated[index][field] = value;
          return { ...prev, foreignAgents: updated };
        });
      };

      const handleRemoveAgent = (index) => {
        setHomeOfficeForm((prev) => ({
          ...prev,
          foreignAgents: prev.foreignAgents.filter((_, i) => i !== index)
        }));
      };

      // Financial calculations
      const totalCapacity = (cfForm.bristol || 0) + (cfForm.chatham || 0) + (cfForm.liverpool || 0) + (cfForm.waterford || 0);
      const totalInflows = 
        (cfForm.domTax || 0) + totalCapacity + (cfForm.tradeIncome || 0) + (cfForm.coreTreasury || 0) +
        (cfForm.protectorates || 0) + (cfForm.subsidies || 0) + (cfForm.contributions || 0) +
        (cfForm.reparations || 0) + (cfForm.prizeGrants || 0) + (cfForm.exactions || 0);

      const totalOutflows = 
        (cfForm.landForces || 0) + (cfForm.fleetMaint || 0) + (cfForm.townWatch || 0) +
        (cfForm.civilList || 0) + (cfForm.pensions || 0) + (cfForm.diplomatic || 0);

      const netYield = totalInflows - totalOutflows;
      const totalLiquidity = (cfForm.initialLiquidity || 0) + netYield;

      const getPublicOrderStatusLabel = (score) => {
        if (score >= 10) return { label: 'Exceptional', color: 'text-emerald-400' };
        if (score >= 7) return { label: 'Stable', color: 'text-blue-400' };
        if (score >= 0) return { label: 'Elevated Risk', color: 'text-amber-400' };
        return { label: 'Critical Risk', color: 'text-rose-500 font-bold' };
      };

      const handleSaveGame = () => {
        const stateToSave = {
          selectedYear, currentTurn, activeTab, exchequerSubTab, justiceTurns,
          peaceTurns, oppositionTurns, warOfficeTurn, admiraltyTurn, turn3Rev,
          turn8Rev, growthRate, cfForm, homeOfficeForm, foreignForm, selectedActionsOrder
        };
        localStorage.setItem('parliament_savegame', JSON.stringify(stateToSave));
        alert('Game saved successfully!');
        setIsMenuOpen(false);
      };

      const handleLoadGame = () => {
        const saved = localStorage.getItem('parliament_savegame');
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            setSelectedYear(parsed.selectedYear || 1820);
            setCurrentTurn(parsed.currentTurn || 1);
            setActiveTab(parsed.activeTab || 'Foreign Office');
            setExchequerSubTab(parsed.exchequerSubTab || 'CONSOLIDATED_FUNDS');
            setJusticeTurns(parsed.justiceTurns || []);
            setPeaceTurns(parsed.peaceTurns || []);
            setOppositionTurns(parsed.oppositionTurns || []);
            setWarOfficeTurn(parsed.warOfficeTurn || null);
            setAdmiraltyTurn(parsed.admiraltyTurn || null);
            setTurn3Rev(parsed.turn3Rev || 9154);
            setTurn8Rev(parsed.turn8Rev || 12500);
            setGrowthRate(parsed.growthRate || null);
            if (parsed.cfForm) setCfForm(parsed.cfForm);
            if (parsed.homeOfficeForm) setHomeOfficeForm(parsed.homeOfficeForm);
            if (parsed.foreignForm) setForeignForm(parsed.foreignForm);
            if (parsed.selectedActionsOrder) setSelectedActionsOrder(parsed.selectedActionsOrder);
            setGameState('DASHBOARD');
            setIsMenuOpen(false);
          } catch (e) {
            alert('Failed to parse save game data.');
          }
        } else {
          alert('No saved game found.');
        }
      };

      const validateRules = () => {
        const errors = [];
        if (justiceTurns.length > 1) {
          const sorted = [...justiceTurns].sort((a, b) => a - b);
          for (let i = 0; i < sorted.length - 1; i++) {
            if (sorted[i + 1] - sorted[i] !== 8) {
              errors.push("Lord Chancellor reports must be exactly 8 turns apart.");
            }
          }
        }
        if (peaceTurns.length > 1) {
          const sorted = [...peaceTurns].sort((a, b) => a - b);
          for (let i = 0; i < sorted.length - 1; i++) {
            if (sorted[i + 1] - sorted[i] !== 4) {
              errors.push("Home Office reports must be exactly 4 turns apart.");
            }
          }
        }
        if (oppositionTurns.length !== 2) {
          errors.push("You must designate exactly 2 Opposition Days (Turns 4–12, sitting turns only).");
        }
        if (!warOfficeTurn) {
          errors.push("War Office Annual Report must be scheduled between Turn 13 and Turn 24 (sitting turns only).");
        }
        if (!admiraltyTurn) {
          errors.push("Admiralty Annual Report must be scheduled between Turn 13 and Turn 24 (sitting turns only).");
        }
        return errors;
      };

      const validationErrors = validateRules();
      const isValid = validationErrors.length === 0;

      const toggleTurn = (turn, currentList, setList) => {
        if (RECESS_TURNS[turn]) return;
        if (currentList.includes(turn)) {
          setList(currentList.filter((t) => t !== turn));
        } else {
          setList([...currentList, turn]);
        }
      };

      const handleNextTurn = () => {
        if (currentTurn < 24) {
          setCurrentTurn(currentTurn + 1);
        } else {
          setSelectedYear((prev) => prev + 1);
          setCurrentTurn(1);
          setGameState('TIMETABLE_BUILDER');
        }
      };

      const renderLucidTimeline = (turns, currentList, setList) => (
        <div className="relative pt-6 pb-2 my-2 overflow-x-auto">
          <div className="flex justify-between min-w-[650px] relative z-10 px-2 gap-2">
            <div className="absolute top-3 left-4 right-4 h-[3px] bg-[#E5C158] shadow-[0_0_8px_rgba(229,193,88,0.4)] z-0" />
            {turns.map((t) => {
              const isRecess = !!RECESS_TURNS[t];
              const isSelected = currentList.includes(t);
              const monthLabel = MONTH_NAMES[t - 1];

              return (
                <div key={t} className="flex flex-col items-center flex-1 relative z-10">
                  <div className={`w-[2px] h-3 mb-1 ${isSelected ? 'bg-[#E5C158]' : 'bg-[#E5C158]/60'}`}></div>
                  <button
                    disabled={isRecess}
                    onClick={() => toggleTurn(t, currentList, setList)}
                    className={`w-full py-2 px-1 rounded-md text-center border transition-all duration-150 shadow-md ${
                      isRecess
                        ? 'border-slate-800 bg-slate-900/80 text-slate-600 cursor-not-allowed opacity-50'
                        : isSelected
                        ? 'border-[#E5C158] bg-[#E5C158] text-[#0F223D] font-bold scale-105 shadow-yellow-500/20'
                        : 'border-slate-600 bg-[#0B192C] text-slate-200 hover:border-[#E5C158] hover:bg-[#0F223D] cursor-pointer'
                    }`}
                  >
                    <div className="text-[10px] uppercase tracking-wider opacity-80 leading-none mb-1">
                      {monthLabel}
                    </div>
                    <div className="text-xs font-bold leading-none">
                      Turn {t}
                    </div>
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      );

      const renderMasterTimeline = () => {
        const allTurns = Array.from({ length: 24 }, (_, i) => i + 1);

        return (
          <div className="relative pt-6 pb-4 my-2 overflow-x-auto">
            <div className="min-w-[1500px] relative z-10 px-2">
              <div className="absolute top-3 left-6 right-6 h-[3px] bg-[#E5C158] shadow-[0_0_10px_rgba(229,193,88,0.5)] z-0" />
              
              <div className="flex justify-between relative z-10 gap-2">
                {allTurns.map((t) => {
                  const recessName = RECESS_TURNS[t];
                  const monthLabel = MONTH_NAMES[t - 1];
                  
                  const isJustice = justiceTurns.includes(t);
                  const isPeace = peaceTurns.includes(t);
                  const isOpp = oppositionTurns.includes(t);
                  const isWar = warOfficeTurn === t;
                  const isAdm = admiraltyTurn === t;
                  const isBudget = t === 8;

                  const hasScheduledEvent = isJustice || isPeace || isOpp || isWar || isAdm || isBudget;

                  return (
                    <div key={t} className="flex flex-col items-center flex-1 min-w-[55px] relative z-10">
                      <div className={`w-[2px] h-3 mb-1 ${recessName ? 'bg-slate-700' : hasScheduledEvent ? 'bg-[#E5C158]' : 'bg-[#E5C158]/50'}`}></div>
                      <div className={`w-full p-1.5 rounded border text-center transition-all min-h-[72px] flex flex-col justify-between ${
                        recessName
                          ? 'border-slate-800 bg-slate-900/60 text-slate-500'
                          : hasScheduledEvent
                          ? 'border-[#E5C158] bg-[#0F223D] text-white shadow-lg'
                          : 'border-slate-700 bg-[#0B192C] text-slate-300'
                      }`}>
                        <div>
                          <div className="text-[9px] uppercase tracking-wider opacity-75 font-semibold">
                            {monthLabel}
                          </div>
                          <div className="text-xs font-bold text-[#E5C158]">
                            T{t}
                          </div>
                        </div>

                        <div className="mt-1 space-y-0.5 text-[8px] leading-tight">
                          {recessName && <span className="text-slate-500 italic block">Recess</span>}
                          {isBudget && <span className="bg-amber-500 text-black px-1 rounded block font-bold">Budget</span>}
                          {isJustice && <span className="bg-blue-600 text-white px-1 rounded block font-bold">Justice</span>}
                          {isPeace && <span className="bg-purple-600 text-white px-1 rounded block font-bold">Home</span>}
                          {isOpp && <span className="bg-rose-600 text-white px-1 rounded block font-bold">Opp</span>}
                          {isWar && <span className="bg-amber-600 text-white px-1 rounded block font-bold">War</span>}
                          {isAdm && <span className="bg-cyan-600 text-white px-1 rounded block font-bold">Admiralty</span>}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      };

      if (gameState === 'MAIN_MENU') {
        return (
          <div className="min-h-screen bg-[#0F223D] text-[#E2E8F0] flex flex-col items-center justify-center p-6 font-serif">
            <div className="border-4 border-[#E5C158] p-8 rounded-lg max-w-md w-full text-center bg-[#0B192C] shadow-2xl">
              <h1 className="text-3xl font-bold text-[#E5C158] mb-2 tracking-wide">PARLIAMENTARY ENGINE</h1>
              <p className="text-sm italic text-slate-400 mb-8">British Political Strategy Simulation · 1800s</p>
              <div className="space-y-4">
                <button
                  onClick={() => setGameState('YEAR_INPUT')}
                  className="w-full bg-[#E5C158] text-[#0F223D] font-bold py-3 px-6 rounded hover:bg-yellow-400 transition-colors cursor-pointer"
                >
                  NEW GAME
                </button>
                <button
                  onClick={handleLoadGame}
                  className="w-full border border-[#E5C158] text-[#E5C158] font-bold py-3 px-6 rounded hover:bg-[#E5C158] hover:text-[#0F223D] transition-colors cursor-pointer"
                >
                  LOAD GAME
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'YEAR_INPUT') {
        return (
          <div className="min-h-screen bg-[#0F223D] text-[#E2E8F0] flex flex-col items-center justify-center p-6 font-serif">
            <div className="border-2 border-[#E5C158] p-8 rounded-lg max-w-sm w-full bg-[#0B192C]">
              <h2 className="text-2xl font-bold text-[#E5C158] mb-4 text-center">Select Starting Year</h2>
              <input
                type="number"
                value={selectedYear}
                onChange={(e) => setSelectedYear(parseInt(e.target.value) || 1820)}
                className="w-full bg-[#0F223D] border border-[#E5C158] text-white p-3 rounded mb-6 text-center text-xl font-bold"
              />
              <button
                onClick={() => setGameState('TIMETABLE_BUILDER')}
                className="w-full bg-[#E5C158] text-[#0F223D] font-bold py-3 rounded hover:bg-yellow-400 transition-colors cursor-pointer"
              >
                PROCEED TO TIMETABLE
              </button>
            </div>
          </div>
        );
      }

      if (gameState === 'TIMETABLE_BUILDER') {
        const optionWindowTurns = [4, 5, 7, 8, 9, 10, 11, 12];
        const secondHalfTurns = Array.from({ length: 12 }, (_, i) => i + 13).filter(t => !RECESS_TURNS[t]);

        return (
          <div className="min-h-screen bg-[#0F223D] text-[#E2E8F0] p-6 font-serif max-w-6xl mx-auto">
            <button onClick={() => setGameState('MAIN_MENU')} className="text-xs text-slate-400 hover:text-white mb-4 block cursor-pointer">
              ← Return to Menu
            </button>
            <span className="text-xs uppercase tracking-widest text-[#E5C158]">PRE-SESSION · CLERK OF THE HOUSE</span>
            <h1 className="text-3xl font-bold text-white mb-2">Design the Timetable · {selectedYear}</h1>
            <p className="text-sm text-slate-300 mb-6">
              Before Parliament convenes, order the sitting bi-weekly turns of {selectedYear}.
            </p>

            {!isValid ? (
              <div className="bg-rose-950/80 border-2 border-rose-600 p-5 rounded-lg mb-8 shadow-xl">
                <div className="flex items-center gap-2 mb-2 text-rose-300 font-bold text-base">
                  <span>⚠️</span> Timetable Requirements & Rules Pending
                </div>
                <div className="space-y-2 text-sm text-rose-200">
                  {validationErrors.map((err, idx) => (
                    <div key={idx} className="flex items-start gap-2 bg-rose-900/40 p-2 rounded border border-rose-800/60">
                      <span className="font-bold">•</span>
                      <span>{err}</span>
                    </div>
                  ))}
                </div>
              </div>
            ) : (
              <div className="bg-emerald-950/80 border-2 border-emerald-500 p-4 rounded-lg mb-8 text-emerald-200 text-sm font-bold flex items-center gap-3">
                <span>✓</span> All timetable rules satisfied! You may begin the session.
              </div>
            )}

            <div className="border-2 border-[#E5C158] bg-[#0B192C] p-5 rounded-lg mb-8 shadow-xl">
              <div className="flex justify-between items-center mb-1">
                <h2 className="text-sm font-bold text-[#E5C158] flex items-center gap-2">
                  🗺️ Master Parliamentary Session Timeline (Turns 1–24)
                </h2>
              </div>
              {renderMasterTimeline()}
            </div>

            <div className="border border-[#E5C158]/40 bg-[#0B192C] p-4 rounded mb-6">
              <h2 className="text-sm font-bold text-[#E5C158] mb-2 flex items-center gap-2">🔒 Fixed Orders & Recesses</h2>
              <div className="space-y-1.5 text-xs">
                <div><span className="bg-[#E5C158]/20 text-[#E5C158] px-2 py-0.5 rounded font-bold mr-2">TURN 1</span> Opening Address to Parliament & Session Convening.</div>
                <div><span className="bg-[#E5C158]/20 text-[#E5C158] px-2 py-0.5 rounded font-bold mr-2">TURNS 1, 2, 3, 4, 5, 7</span> Consolidated Funds (Gross Domestic Income Growth Assessment).</div>
                <div><span className="bg-[#E5C158]/20 text-[#E5C158] px-2 py-0.5 rounded font-bold mr-2">TURN 8</span> Financial Statement — Annual Budget.</div>
                <div><span className="bg-[#E5C158]/20 text-[#E5C158] px-2 py-0.5 rounded font-bold mr-2">TURNS 9–12, 17, 19–23</span> Consolidated Funds.</div>
                <div><span className="bg-slate-700/60 text-slate-300 px-2 py-0.5 rounded font-bold mr-2">RECESSES</span> Easter (T6), Summer (T13–16), Conference (T18), Christmas (T24).</div>
              </div>
            </div>

            <div className="border border-slate-700 bg-[#0B192C] p-5 rounded-lg mb-6 shadow-md">
              <div className="flex justify-between items-center mb-1">
                <h3 className="font-bold text-white text-sm">Lord Chancellor's Report <span className="text-xs text-slate-400 font-normal">(Administration of Justice)</span></h3>
                <span className="text-xs px-2 py-0.5 rounded bg-slate-800 text-slate-400">Spacing: 8 turns</span>
              </div>
              {renderLucidTimeline(optionWindowTurns, justiceTurns, setJusticeTurns)}
            </div>

            <div className="border border-slate-700 bg-[#0B192C] p-5 rounded-lg mb-6 shadow-md">
              <div className="flex justify-between items-center mb-1">
                <h3 className="font-bold text-white text-sm">Home Office Report <span className="text-xs text-slate-400 font-normal">(State of Public Peace)</span></h3>
                <span className="text-xs px-2 py-0.5 rounded bg-slate-800 text-slate-400">Spacing: 4 turns</span>
              </div>
              {renderLucidTimeline(optionWindowTurns, peaceTurns, setPeaceTurns)}
            </div>

            <div className="border border-slate-700 bg-[#0B192C] p-5 rounded-lg mb-6 shadow-md">
              <div className="flex justify-between items-center mb-1">
                <h3 className="font-bold text-white text-sm">Opposition Days</h3>
                <span className={`text-xs px-2 py-0.5 rounded ${oppositionTurns.length === 2 ? 'bg-emerald-900 text-emerald-200' : 'bg-rose-900 text-rose-200'}`}>{oppositionTurns.length} of 2 set</span>
              </div>
              {renderLucidTimeline(optionWindowTurns, oppositionTurns, setOppositionTurns)}
            </div>

            <div className="grid grid-cols-2 gap-4 mb-6">
              <div className="border border-slate-700 bg-[#0B192C] p-4 rounded">
                <h3 className="font-bold text-white text-sm mb-1">War Office Annual Report</h3>
                <p className="text-xs text-slate-400 mb-2">Sitting Turns 17–23</p>
                <select
                  value={warOfficeTurn || ''}
                  onChange={(e) => setWarOfficeTurn(e.target.value ? parseInt(e.target.value) : null)}
                  className="w-full bg-[#0F223D] border border-slate-700 text-xs p-2 rounded text-white"
                >
                  <option value="">-- Choose Sitting Turn --</option>
                  {secondHalfTurns.map((t) => (
                    <option key={t} value={t}>Turn {t} ({MONTH_NAMES[t - 1]})</option>
                  ))}
                </select>
              </div>

              <div className="border border-slate-700 bg-[#0B192C] p-4 rounded">
                <h3 className="font-bold text-white text-sm mb-1">Admiralty Annual Report</h3>
                <p className="text-xs text-slate-400 mb-2">Sitting Turns 17–23</p>
                <select
                  value={admiraltyTurn || ''}
                  onChange={(e) => setAdmiraltyTurn(e.target.value ? parseInt(e.target.value) : null)}
                  className="w-full bg-[#0F223D] border border-slate-700 text-xs p-2 rounded text-white"
                >
                  <option value="">-- Choose Sitting Turn --</option>
                  {secondHalfTurns.map((t) => (
                    <option key={t} value={t}>Turn {t} ({MONTH_NAMES[t - 1]})</option>
                  ))}
                </select>
              </div>
            </div>

            <button
              disabled={!isValid}
              onClick={() => {
                setActiveTab('Foreign Office');
                setGameState('DASHBOARD');
              }}
              className={`w-full py-3.5 rounded-lg font-bold text-base transition-colors mb-8 ${isValid ? 'bg-[#E5C158] text-[#0F223D] hover:bg-yellow-400 cursor-pointer shadow-lg' : 'bg-slate-800 text-slate-500 cursor-not-allowed'}`}
            >
              {isValid ? 'Confirm & Start Year' : 'Resolve every rule above before session may begin'}
            </button>
          </div>
        );
      }

      const tabs = [
        'Parliamentary Timetable', 'General Election', 'Parliament', 
        'Cabinet', "Lord Chancellor's Department", 
        'Exchequer', 'Foreign Office', 'Home Office', 'Admiralty', 'War Office'
      ];

      return (
        <div className="min-h-screen bg-[#0F223D] text-[#E2E8F0] font-serif flex flex-col relative">
          <header className="border-b border-[#E5C158] bg-[#0B192C] px-4 py-3 flex items-center gap-4">
            <div className="relative">
              <button 
                onClick={() => setIsMenuOpen(!isMenuOpen)}
                className="border border-[#E5C158] text-[#E5C158] p-1.5 rounded hover:bg-[#E5C158]/10 cursor-pointer"
              >
                ☰
              </button>

              {isMenuOpen && (
                <div className="absolute top-10 left-0 w-48 bg-[#0B192C] border border-[#E5C158] rounded shadow-2xl z-50 py-1 font-sans text-xs">
                  <button
                    onClick={handleSaveGame}
                    className="w-full text-left px-4 py-2 hover:bg-[#E5C158]/20 text-[#E2E8F0] flex items-center gap-2 cursor-pointer"
                  >
                    💾 Save Game
                  </button>
                  <button
                    onClick={() => {
                      setIsMenuOpen(false);
                      setGameState('MAIN_MENU');
                    }}
                    className="w-full text-left px-4 py-2 hover:bg-rose-900/50 text-rose-300 flex items-center gap-2 cursor-pointer border-t border-slate-800"
                  >
                    🚪 Exit to Menu
                  </button>
                </div>
              )}
            </div>

            <div className="text-sm font-bold text-[#E5C158] whitespace-nowrap">Year {selectedYear} · Turn {currentTurn} of 24</div>
            
            <nav className="flex gap-2 overflow-x-auto py-1">
              {tabs.map((tab) => (
                <button
                  key={tab}
                  onClick={() => setActiveTab(tab)}
                  className={`text-xs whitespace-nowrap px-3 py-1.5 rounded cursor-pointer ${activeTab === tab ? 'bg-[#E5C158] text-[#0F223D] font-bold' : 'text-slate-300 hover:text-white'}`}
                >
                  {tab}
                </button>
              ))}
            </nav>
          </header>

          <main className="flex-1 p-6 max-w-6xl mx-auto w-full">
            <div className="flex justify-between items-center mb-4">
              <h1 className="text-2xl font-bold text-[#E5C158]">{activeTab}</h1>
              <button onClick={handleNextTurn} className="bg-[#E5C158] text-[#0F223D] font-bold px-4 py-2 rounded text-xs hover:bg-yellow-400 cursor-pointer">
                Advance to Next Turn →
              </button>
            </div>

            {/* FOREIGN OFFICE TAB */}
            {activeTab === 'Foreign Office' && (
              <div className="space-y-6 bg-[#0B192C] border border-[#E5C158]/60 p-6 rounded-lg shadow-xl font-mono">
                <div className="text-center space-y-1">
                  <div className="text-slate-400">========================================================================================</div>
                  <div className="text-[#E5C158] font-bold text-base tracking-widest uppercase">HER MAJESTY'S DIPLOMATIC & FOREIGN AFFAIRS DESPATCH</div>
                  <div className="text-slate-400">========================================================================================</div>
                  <div className="flex justify-between items-center text-slate-300 pt-2 font-sans text-xs">
                    <div>
                      <strong className="text-white">Date of Despatch :</strong> {MONTH_NAMES[currentTurn - 1]} {selectedYear} (Turn {currentTurn})
                    </div>
                    <div className="flex items-center gap-2">
                      <strong className="text-white">Foreign Secretary :</strong>
                      <input
                        type="text"
                        value={foreignForm.foreignSecretary}
                        onChange={(e) => setForeignForm({ ...foreignForm, foreignSecretary: e.target.value })}
                        className="bg-[#0F223D] border border-slate-700 text-white font-mono px-2 py-0.5 rounded text-xs focus:border-[#E5C158] focus:outline-none"
                      />
                    </div>
                  </div>
                </div>

                {/* HEADER / TREATY METADATA */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 bg-[#0F223D] p-4 rounded border border-slate-700 font-sans text-xs">
                  <div>
                    <label className="block text-slate-300 font-semibold mb-1">Treaty / Despatch Name:</label>
                    <input
                      type="text"
                      value={foreignForm.treatyName}
                      onChange={(e) => setForeignForm({ ...foreignForm, treatyName: e.target.value })}
                      className="w-full bg-[#0B192C] border border-slate-700 text-white p-2 rounded focus:border-[#E5C158] focus:outline-none font-mono"
                    />
                  </div>
                  <div>
                    <label className="block text-slate-300 font-semibold mb-1">Treaty Nature / Classification:</label>
                    <select
                      value={foreignForm.treatyNature}
                      onChange={(e) => setForeignForm({ ...foreignForm, treatyNature: e.target.value })}
                      className="w-full bg-[#0B192C] border border-slate-700 text-white p-2 rounded focus:border-[#E5C158] focus:outline-none font-mono"
                    >
                      <option value="Coalition Accord">Coalition Accord</option>
                      <option value="Bilateral Non-Aggression">Bilateral Non-Aggression</option>
                      <option value="Commercial Convention">Commercial Convention</option>
                      <option value="Ultimatum">Ultimatum / War Declaration</option>
                    </select>
                  </div>
                </div>

                {/* SELECTOR MATRIX */}
                <div className="bg-[#0F223D] p-4 rounded border border-slate-700 space-y-3 font-sans">
                  <div className="text-[#E5C158] font-bold text-xs font-mono uppercase">
                    ----------------------------------------------------------------------------------------<br />
                    SELECTIVE DIPLOMATIC ACTION MANDATES<br />
                    ----------------------------------------------------------------------------------------
                  </div>
                  <p className="text-xs text-slate-300 font-serif">
                    Diplomatic Action(s) (Select all that apply to reveal core action sections). Selected items are dynamically numbered sequentially (**I.**, **II.**, **III.**, etc.) on a "first come, first serve" basis based on selection sequence.
                  </p>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3 pt-2">
                    {DIPLOMATIC_OPTIONS.map((opt) => {
                      const isSelected = selectedActionsOrder.includes(opt.id);
                      const orderIndex = selectedActionsOrder.indexOf(opt.id);

                      return (
                        <div
                          key={opt.id}
                          onClick={() => toggleDiplomaticAction(opt.id)}
                          className={`p-3 rounded border cursor-pointer transition-all flex items-start gap-3 ${
                            isSelected
                              ? 'border-[#E5C158] bg-[#0B192C] shadow-lg'
                              : 'border-slate-800 bg-[#0F223D]/60 hover:border-slate-600'
                          }`}
                        >
                          <input
                            type="checkbox"
                            checked={isSelected}
                            onChange={() => {}} // parent onClick handles toggle
                            className="mt-1 accent-[#E5C158] cursor-pointer"
                          />
                          <div className="flex-1">
                            <div className="flex justify-between items-center">
                              <span className={`text-xs font-bold ${isSelected ? 'text-[#E5C158]' : 'text-slate-300'}`}>
                                {opt.title}
                              </span>
                              {isSelected && (
                                <span className="text-[10px] bg-[#E5C158] text-[#0F223D] font-bold px-1.5 py-0.5 rounded font-mono">
                                  ORDER {ROMAN_NUMERALS[orderIndex]}
                                </span>
                              )}
                            </div>
                            <p className="text-[11px] text-slate-400 mt-0.5 font-serif">{opt.desc}</p>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* DYNAMIC SEQUENTIAL SECTIONS (FIRST COME FIRST SERVE) */}
                {selectedActionsOrder.length === 0 ? (
                  <div className="text-center py-8 text-slate-500 italic text-xs border border-slate-800 rounded bg-[#0F223D]/40 font-sans">
                    No core diplomatic actions currently selected for execution. Select options above to construct despatch mandates.
                  </div>
                ) : (
                  selectedActionsOrder.map((actionId, index) => {
                    const option = DIPLOMATIC_OPTIONS.find(o => o.id === actionId);
                    const romanNumeral = ROMAN_NUMERALS[index] || (index + 1);

                    return (
                      <div key={actionId} className="space-y-3 bg-[#0F223D] p-4 rounded border border-[#E5C158]/50 transition-all">
                        <div className="text-[#E5C158] font-bold text-xs flex justify-between items-center">
                          <div>
                            ----------------------------------------------------------------------------------------<br />
                            {romanNumeral}. CORE DIPLOMATIC ACTION : {option.title}<br />
                            ----------------------------------------------------------------------------------------
                          </div>
                          <button
                            onClick={() => toggleDiplomaticAction(actionId)}
                            className="text-rose-400 hover:text-rose-200 text-xs font-mono px-2 py-1 rounded bg-rose-950/40 border border-rose-800 cursor-pointer"
                          >
                            ✕ Remove
                          </button>
                        </div>

                        <div className="space-y-3 font-sans text-xs pt-2">
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                              <label className="block text-slate-300 font-semibold mb-1">High Contracting Sovereign / Power:</label>
                              <input
                                type="text"
                                defaultValue="Kingdom of France"
                                className="w-full bg-[#0B192C] border border-slate-700 text-white p-2 rounded text-xs focus:border-[#E5C158] focus:outline-none"
                              />
                            </div>
                            <div>
                              <label className="block text-slate-300 font-semibold mb-1">Directive / Proscribed Terms:</label>
                              <input
                                type="text"
                                placeholder="Enter specific treaty terms or directive notes..."
                                className="w-full bg-[#0B192C] border border-slate-700 text-white p-2 rounded text-xs focus:border-[#E5C158] focus:outline-none"
                              />
                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  })
                )}

                <div className="text-center space-y-1 pt-4 border-t border-slate-800">
                  <div className="text-slate-400">========================================================================================</div>
                  <div className="text-[#E5C158] font-bold text-xs tracking-wider">DOCUMENT CERTIFIED & SEALED BY THE GREAT SEAL OF GREAT BRITAIN</div>
                  <div className="text-slate-400">========================================================================================</div>
                </div>
              </div>
            )}

            {/* EXCHEQUER TAB */}
            {activeTab === 'Exchequer' && (
              <div className="space-y-6">
                <div className="flex gap-2 border-b border-slate-700 pb-2">
                  <button
                    onClick={() => setExchequerSubTab('CONSOLIDATED_FUNDS')}
                    className={`px-3 py-1 text-xs rounded font-bold cursor-pointer ${exchequerSubTab === 'CONSOLIDATED_FUNDS' ? 'bg-[#E5C158] text-[#0F223D]' : 'bg-slate-800 text-slate-300'}`}
                  >
                    Consolidated Funds Ledger
                  </button>
                  <button
                    onClick={() => setExchequerSubTab('GDI_ASSESSMENT')}
                    className={`px-3 py-1 text-xs rounded font-bold cursor-pointer ${exchequerSubTab === 'GDI_ASSESSMENT' ? 'bg-[#E5C158] text-[#0F223D]' : 'bg-slate-800 text-slate-300'}`}
                  >
                    GDI Growth Assessment
                  </button>
                </div>

                {exchequerSubTab === 'CONSOLIDATED_FUNDS' && (
                  <div className="bg-[#0B192C] border border-[#E5C158]/50 p-6 rounded-lg space-y-6">
                    <h2 className="text-lg font-bold text-[#E5C158]">Consolidated Funds & Treasury Receipts Ledger</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 text-xs">
                      <div className="space-y-4">
                        <h3 className="font-bold text-emerald-400 border-b border-emerald-500/30 pb-1">TREASURY INFLOWS (£)</h3>
                        <div className="space-y-2">
                          <div className="flex justify-between items-center">
                            <span>Domestic Tax Base:</span>
                            <input type="number" value={cfForm.domTax} onChange={(e) => handleCfChange('domTax', e.target.value)} className="bg-[#0F223D] border border-slate-700 text-right p-1 rounded w-32" />
                          </div>
                          <div className="flex justify-between items-center">
                            <span>Bristol Customs:</span>
                            <input type="number" value={cfForm.bristol} onChange={(e) => handleCfChange('bristol', e.target.value)} className="bg-[#0F223D] border border-slate-700 text-right p-1 rounded w-32" />
                          </div>
                          <div className="flex justify-between items-center">
                            <span>Chatham Docks Revenue:</span>
                            <input type="number" value={cfForm.chatham} onChange={(e) => handleCfChange('chatham', e.target.value)} className="bg-[#0F223D] border border-slate-700 text-right p-1 rounded w-32" />
                          </div>
                          <div className="flex justify-between items-center">
                            <span>Liverpool Trade Dues:</span>
                            <input type="number" value={cfForm.liverpool} onChange={(e) => handleCfChange('liverpool', e.target.value)} className="bg-[#0F223D] border border-slate-700 text-right p-1 rounded w-32" />
                          </div>
                          <div className="flex justify-between items-center">
                            <span>Waterford Port Tariff:</span>
                            <input type="number" value={cfForm.waterford} onChange={(e) => handleCfChange('waterford', e.target.value)} className="bg-[#0F223D] border border-slate-700 text-right p-1 rounded w-32" />
                          </div>
                          <div className="flex justify-between items-center pt-2 border-t border-slate-800 font-bold text-emerald-300">
                            <span>Total Gross Inflows:</span>
                            <span>£{totalInflows.toLocaleString()}</span>
                          </div>
                        </div>
                      </div>

                      <div className="space-y-4">
                        <h3 className="font-bold text-rose-400 border-b border-rose-500/30 pb-1">TREASURY OUTFLOWS (£)</h3>
                        <div className="space-y-2">
                          <div className="flex justify-between items-center">
                            <span>Army & Land Forces:</span>
                            <input type="number" value={cfForm.landForces} onChange={(e) => handleCfChange('landForces', e.target.value)} className="bg-[#0F223D] border border-slate-700 text-right p-1 rounded w-32" />
                          </div>
                          <div className="flex justify-between items-center">
                            <span>Royal Navy Maintenance:</span>
                            <input type="number" value={cfForm.fleetMaint} onChange={(e) => handleCfChange('fleetMaint', e.target.value)} className="bg-[#0F223D] border border-slate-700 text-right p-1 rounded w-32" />
                          </div>
                          <div className="flex justify-between items-center">
                            <span>Civil List & Administration:</span>
                            <input type="number" value={cfForm.civilList} onChange={(e) => handleCfChange('civilList', e.target.value)} className="bg-[#0F223D] border border-slate-700 text-right p-1 rounded w-32" />
                          </div>
                          <div className="flex justify-between items-center">
                            <span>Foreign Subsidies:</span>
                            <input type="number" value={cfForm.diplomatic} onChange={(e) => handleCfChange('diplomatic', e.target.value)} className="bg-[#0F223D] border border-slate-700 text-right p-1 rounded w-32" />
                          </div>
                          <div className="flex justify-between items-center pt-2 border-t border-slate-800 font-bold text-rose-300">
                            <span>Total Gross Outflows:</span>
                            <span>£{totalOutflows.toLocaleString()}</span>
                          </div>
                        </div>
                      </div>
                    </div>

                    <div className="p-4 bg-[#0F223D] border border-[#E5C158] rounded flex justify-between items-center text-sm font-bold">
                      <span>Net Yield to Core Exchequer Liquidity:</span>
                      <span className={netYield >= 0 ? 'text-emerald-400' : 'text-rose-400'}>
                        £{netYield.toLocaleString()}
                      </span>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* HOME OFFICE TAB */}
            {activeTab === 'Home Office' && (
              <div className="space-y-6 bg-[#0B192C] border border-slate-800 p-6 rounded-lg">
                <h2 className="text-lg font-bold text-[#E5C158]">Home Office Security & Public Peace Ledger</h2>
                <div className="grid grid-cols-2 gap-4 text-xs">
                  {['london', 'wales', 'scotland', 'ireland'].map((reg) => (
                    <div key={reg} className="p-4 bg-[#0F223D] rounded border border-slate-700">
                      <h3 className="font-bold text-white uppercase mb-2">{reg} Region</h3>
                      <div className="space-y-2">
                        <div className="flex justify-between items-center">
                          <span>Public Order Rating (0-10):</span>
                          <input
                            type="number"
                            value={homeOfficeForm.publicOrder[reg]}
                            onChange={(e) => handleHomeOfficeChange('publicOrder', reg, e.target.value)}
                            className="bg-[#0B192C] border border-slate-700 text-right p-1 rounded w-16"
                          />
                        </div>
                        <div className="flex justify-between items-center">
                          <span>Public Clamour Level:</span>
                          <input
                            type="number"
                            value={homeOfficeForm.clamour[reg]}
                            onChange={(e) => handleHomeOfficeChange('clamour', reg, e.target.value)}
                            className="bg-[#0B192C] border border-slate-700 text-right p-1 rounded w-16"
                          />
                        </div>
                        <div className="text-right text-[10px] pt-1">
                          Status: <span className={getPublicOrderStatusLabel(homeOfficeForm.publicOrder[reg]).color}>
                            {getPublicOrderStatusLabel(homeOfficeForm.publicOrder[reg]).label}
                          </span>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* DEFAULT TAB VIEW */}
            {activeTab !== 'Foreign Office' && activeTab !== 'Exchequer' && activeTab !== 'Home Office' && activeTab !== 'Parliamentary Timetable' && (
              <div className="bg-[#0B192C] border border-slate-800 p-8 rounded text-center">
                <h2 className="text-lg font-bold text-[#E5C158] mb-2">{activeTab} Department</h2>
                <p className="text-xs text-slate-400">Department administrative controls active under primary schedule.</p>
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ParliamentaryEngine />);
  </script>
</body>
</html>
