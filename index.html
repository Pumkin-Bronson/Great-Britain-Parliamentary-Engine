    function toRoman(num) {
      const lookup = { M: 1000, CM: 900, D: 500, CD: 400, C: 100, XC: 90, L: 50, XL: 40, X: 10, IX: 9, V: 5, IV: 4, I: 1 };
      let roman = '';
      for (let i in lookup) {
        while (num >= lookup[i]) {
          roman += i;
          num -= lookup[i];
        }
      }
      return roman;
    }

          try {

            setSelectedYear(parsed.selectedYear || 1820);
            setCurrentTurn(parsed.currentTurn || 1);
            setActiveTab(parsed.activeTab || 'Parliament');
            setExchequerSubTab(parsed.exchequerSubTab || 'CONSOLIDATED_FUNDS');
            setJusticeTurns(parsed.justiceTurns || []);
            setPeaceTurns(parsed.peaceTurns || []);
            setOppositionTurns(parsed.oppositionTurns || []);
            setWarOfficeTurn(parsed.warOfficeTurn || null);
            setAdmiraltyTurn(parsed.admiraltyTurn || null);
            setTurn3Rev(parsed.turn3Rev || 9154);
            setTurn8Rev(parsed.turn8Rev || 12500);
            setGrowthRate(parsed.growthRate || null);
            if (parsed.cfForm) setCfForm(parsed.cfForm);
            if (parsed.homeOfficeForm) setHomeOfficeForm(parsed.homeOfficeForm);
            if (parsed.foreignOfficeForm) setForeignOfficeForm(parsed.foreignOfficeForm);
            if (parsed.cabinetForm) setCabinetForm(parsed.cabinetForm);
            if (parsed.cabinetMinisters) setCabinetMinisters(parsed.cabinetMinisters);
            setGameState('DASHBOARD');
            setIsMenuOpen(false);
          } catch (e) {
            alert('Failed to parse save game data.');
          }
        } else {
          alert('No saved game found.');
        }
      };

      const validateRules = () => {
        const errors = [];
        if (justiceTurns.length > 1) {
          const sorted = [...justiceTurns].sort((a, b) => a - b);
          for (let i = 0; i < sorted.length - 1; i++) {
            if (sorted[i + 1] - sorted[i] !== 8) {
              errors.push("Lord Chancellor reports must be exactly 8 turns apart.");
            }
          }
        }
        if (peaceTurns.length > 1) {
          const sorted = [...peaceTurns].sort((a, b) => a - b);
          for (let i = 0; i < sorted.length - 1; i++) {
            if (sorted[i + 1] - sorted[i] !== 4) {
              errors.push("Home Office reports must be exactly 4 turns apart.");
            }
          }
        }
        if (oppositionTurns.length !== 2) {
          errors.push("You must designate exactly 2 Opposition Days (Turns 4–12, sitting turns only).");
        }
        if (!warOfficeTurn) {
          errors.push("War Office Annual Report must be scheduled between Turn 13 and Turn 24 (sitting turns only).");
        }
        if (!admiraltyTurn) {
          errors.push("Admiralty Annual Report must be scheduled between Turn 13 and Turn 24 (sitting turns only).");
        }
        return errors;
      };

      const validationErrors = validateRules();
      const isValid = validationErrors.length === 0;

      const toggleTurn = (turn, currentList, setList) => {
        if (RECESS_TURNS[turn]) return;
        if (currentList.includes(turn)) {
          setList(currentList.filter((t) => t !== turn));
        } else {
          setList([...currentList, turn]);
        }
      };

      const handleCalculateGrowth = () => {
        if (turn3Rev > 0 && turn8Rev > 0) {
          const g = Math.pow(turn8Rev / turn3Rev, 1 / 5) - 1;
          setGrowthRate(g);
        }
      };

      const handleNextTurn = () => {
        if (currentTurn < 24) {
          setCurrentTurn(currentTurn + 1);
        } else {
          setSelectedYear((prev) => prev + 1);
          setCurrentTurn(1);
          setGameState('TIMETABLE_BUILDER');
        }
      };

      const renderLucidTimeline = (turns, currentList, setList) => (
        <div className="relative pt-6 pb-2 my-2 overflow-x-auto">
          <div className="flex justify-between min-w-[650px] relative z-10 px-2 gap-2">
            <div className="absolute top-3 left-4 right-4 h-[3px] bg-[#E5C158] shadow-[0_0_8px_rgba(229,193,88,0.4)] z-0" />
            {turns.map((t) => {
              const isRecess = !!RECESS_TURNS[t];
              const isSelected = currentList.includes(t);
              const monthLabel = MONTH_NAMES[t - 1];

              return (
                <div key={t} className="flex flex-col items-center flex-1 relative z-10">
                  <div className={`w-[2px] h-3 mb-1 ${isSelected ? 'bg-[#E5C158]' : 'bg-[#E5C158]/60'}`}></div>
                  <button
                    disabled={isRecess}
                    onClick={() => toggleTurn(t, currentList, setList)}
                    className={`w-full py-2 px-1 rounded-md text-center border transition-all duration-150 shadow-md ${
                      isRecess
                        ? 'border-slate-800 bg-slate-900/80 text-slate-600 cursor-not-allowed opacity-50'
                        : isSelected
                        ? 'border-[#E5C158] bg-[#E5C158] text-[#0F223D] font-bold scale-105 shadow-yellow-500/20'
                        : 'border-slate-600 bg-[#0B192C] text-slate-200 hover:border-[#E5C158] hover:bg-[#0F223D] cursor-pointer'
                    }`}
                  >
                    <div className="text-[10px] uppercase tracking-wider opacity-80 leading-none mb-1">
                      {monthLabel}
                    </div>
                    <div className="text-xs font-bold leading-none">
                      Turn {t}
                    </div>
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      );

      const renderMasterTimeline = () => {
        const allTurns = Array.from({ length: 24 }, (_, i) => i + 1);

        return (
          <div className="relative pt-6 pb-4 my-2 overflow-x-auto">
            <div className="min-w-[1500px] relative z-10 px-2">
              <div className="absolute top-3 left-6 right-6 h-[3px] bg-[#E5C158] shadow-[0_0_10px_rgba(229,193,88,0.5)] z-0" />
              
              <div className="flex justify-between relative z-10 gap-2">
                {allTurns.map((t) => {
                  const recessName = RECESS_TURNS[t];
                  const monthLabel = MONTH_NAMES[t - 1];
                  
                  const isJustice = justiceTurns.includes(t);
                  const isPeace = peaceTurns.includes(t);
                  const isOpp = oppositionTurns.includes(t);
                  const isWar = warOfficeTurn === t;
                  const isAdm = admiraltyTurn === t;
                  const isBudget = t === 8;

                  const hasScheduledEvent = isJustice || isPeace || isOpp || isWar || isAdm || isBudget;

                  return (
                    <div key={t} className="flex flex-col items-center flex-1 min-w-[55px] relative z-10">

                      <div className={`w-full p-1.5 rounded border text-center transition-all min-h-[72px] flex flex-col justify-between ${
                        recessName
                          ? 'border-slate-800 bg-slate-900/60 text-slate-500'
                          : hasScheduledEvent
                          ? 'border-[#E5C158] bg-[#0F223D] text-white shadow-lg'
                          : 'border-slate-700 bg-[#0B192C] text-slate-300'

                          <div className="text-[9px] uppercase tracking-wider opacity-75 font-semibold">
                            {monthLabel}
                          </div>
                          <div className="text-xs font-bold text-[#E5C158]">
                            T{t}
                          </div>
                        </div>

                        <div className="mt-1 space-y-0.5 text-[8px] leading-tight">

                          {isBudget && <span className="bg-amber-500 text-black px-1 rounded block font-bold">Budget</span>}
                          {isJustice && <span className="bg-blue-600 text-white px-1 rounded block font-bold">Justice</span>}
                          {isPeace && <span className="bg-purple-600 text-white px-1 rounded block font-bold">Home</span>}
                          {isOpp && <span className="bg-rose-600 text-white px-1 rounded block font-bold">Opp</span>}

                          {isAdm && <span className="bg-cyan-600 text-white px-1 rounded block font-bold">Admiralty</span>}
                        </div>
                      </div>
                    </div>

                })}

            </div>
          </div>

        const cfTurns = [9, 10, 11, 12, 17, 19, 20, 21, 22, 23];

        if (gdiTurns.includes(t)) return "Consolidated Funds (Gross Domestic Income Growth Assessment)";
        if (t === 8) return "Financial Statement (Annual Budget)";
        if (cfTurns.includes(t)) return "Consolidated Funds";

                                + Effect

                                  </button>
                                )}
                              </div>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* FOLLOWERS SECTION */}
                <div>
                  <div className="flex justify-between items-center mb-1">
                    <span className="text-[11px] font-bold text-cyan-300">👥 Followers</span>
                    <button
                      onClick={() => addFollowerToMinister(ministerKey)}

                    >

                    </button>

                  {minister.followers.length === 0 ? (

                    <div className="space-y-2">
                      {minister.followers.map((follower) => (
                        <div key={follower.id} className="bg-[#0F223D] p-2 rounded border border-slate-700 text-[10px]">
                          <div className="flex justify-between items-center mb-1">
                            <input
                              type="text"
                              value={follower.name}
                              onChange={(e) => updateFollowerName(ministerKey, follower.id, e.target.value)}
                              className="bg-[#0B192C] border border-slate-600 text-white font-bold px-1.5 py-0.5 rounded w-36 text-[10px]"
                            />
                            <button

                            {follower.effects.map((eff) => (

                                <input

                                  value={eff.text}
                                  onChange={(e) => updateFollowerEffectText(ministerKey, follower.id, eff.id, e.target.value)}
                                  className="bg-[#0B192C] border border-slate-800 text-cyan-200 px-1 py-0.5 rounded flex-1 text-[9px]"
                                />

        return (
          <div className="min-h-screen bg-[#0F223D] text-[#E2E8F0] flex flex-col items-center justify-center p-6 font-serif">
            <div className="border-4 border-[#E5C158] p-8 rounded-lg max-w-md w-full text-center bg-[#0B192C] shadow-2xl">
              <h1 className="text-3xl font-bold text-[#E5C158] mb-2 tracking-wide">PARLIAMENTARY ENGINE</h1>
              <p className="text-sm italic text-slate-400 mb-8">British Political Strategy Simulation · 1800s</p>
              <div className="space-y-4">
                <button
                  onClick={() => setGameState('YEAR_INPUT')}
                  className="w-full bg-[#E5C158] text-[#0F223D] font-bold py-3 px-6 rounded hover:bg-yellow-400 transition-colors cursor-pointer"
                >
                  NEW GAME

                  onClick={handleLoadGame}
                  className="w-full border border-[#E5C158] text-[#E5C158] font-bold py-3 px-6 rounded hover:bg-[#E5C158] hover:text-[#0F223D] transition-colors cursor-pointer"
                >
                  LOAD GAME
                </button>
              </div>

          </div>
        );
      }

      if (gameState === 'YEAR_INPUT') {
        return (
          <div className="min-h-screen bg-[#0F223D] text-[#E2E8F0] flex flex-col items-center justify-center p-6 font-serif">
            <div className="border-2 border-[#E5C158] p-8 rounded-lg max-w-sm w-full bg-[#0B192C]">
              <h2 className="text-2xl font-bold text-[#E5C158] mb-4 text-center">Select Starting Year</h2>
              <input
                type="number"
                value={selectedYear}
                onChange={(e) => setSelectedYear(parseInt(e.target.value) || 1820)}
                className="w-full bg-[#0F223D] border border-[#E5C158] text-white p-3 rounded mb-6 text-center text-xl font-bold"
              />
              <button

                className="w-full bg-[#E5C158] text-[#0F223D] font-bold py-3 rounded hover:bg-yellow-400 transition-colors cursor-pointer"

      }

      if (gameState === 'TIMETABLE_BUILDER') {
        const optionWindowTurns = [4, 5, 7, 8, 9, 10, 11, 12];
        const secondHalfTurns = Array.from({ length: 12 }, (_, i) => i + 13).filter(t => !RECESS_TURNS[t]);

        return (
          <div className="min-h-screen bg-[#0F223D] text-[#E2E8F0] p-6 font-serif max-w-6xl mx-auto">
            <button onClick={() => setGameState('MAIN_MENU')} className="text-xs text-slate-400 hover:text-white mb-4 block cursor-pointer">
              ← Return to Menu
            </button>
            <span className="text-xs uppercase tracking-widest text-[#E5C158]">PRE-SESSION · CLERK OF THE HOUSE</span>

                                <div className="relative">
                                  <span className="absolute left-2.5 top-1.5 text-slate-500">£</span>
                                  <input
                                    type="number"
                                    value={cfForm.tradeIncome || ''}
                                    onChange={(e) => handleCfChange('tradeIncome', e.target.value)}
                                    className="w-full bg-[#0B192C] border border-slate-700 text-emerald-400 font-mono pl-6 p-1.5 rounded focus:border-[#E5C158] focus:outline-none"
                                  />
                                </div>
                              </div>
                            </div>

                            <div className="border border-slate-800 p-3 rounded bg-[#0B192C]/50 space-y-2 ml-2">
                              <div className="text-slate-300 font-semibold text-[11px]">Gross Commercial Port Traffic</div>
                              <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                                <div>
                                  <label className="block text-[10px] text-slate-400">Bristol</label>
                                  <input
                                    type="number"
                                    value={cfForm.bristol || ''}
                                    onChange={(e) => handleCfChange('bristol', e.target.value)}
                                    className="w-full bg-[#0F223D] border border-slate-700 text-emerald-400 font-mono p-1 rounded text-xs"
                                  />
                                </div>
                                <div>
                                  <label className="block text-[10px] text-slate-400">Chatham Docks</label>
                                  <input
                                    type="number"
                                    value={cfForm.chatham || ''}
                                    onChange={(e) => handleCfChange('chatham', e.target.value)}
                                    className="w-full bg-[#0F223D] border border-slate-700 text-emerald-400 font-mono p-1 rounded text-xs"
                                  />
                                </div>
                                <div>
                                  <label className="block text-[10px] text-slate-400">Liverpool</label>
                                  <input
                                    type="number"
                                    value={cfForm.liverpool || ''}
                                    onChange={(e) => handleCfChange('liverpool', e.target.value)}
                                    className="w-full bg-[#0F223D] border border-slate-700 text-emerald-400 font-mono p-1 rounded text-xs"
                                  />
                                </div>
                                <div>
                                  <label className="block text-[10px] text-slate-400">Waterford</label>
                                  <input
                                    type="number"
                                    value={cfForm.waterford || ''}
                                    onChange={(e) => handleCfChange('waterford', e.target.value)}
                                    className="w-full bg-[#0F223D] border border-slate-700 text-emerald-400 font-mono p-1 rounded text-xs"
                                  />
                                </div>
                              </div>
                              <div className="text-right text-[11px] text-slate-300 font-mono pt-1">
                                Total Commercial Capacity : <strong className="text-emerald-400">£{totalCapacity.toLocaleString()}</strong>
                              </div>
                            </div>

                            <div className="pl-2">
                              <label className="block text-[11px] text-slate-300 mb-1">Core Treasury Income</label>
                              <div className="relative max-w-md">
                                <span className="absolute left-2.5 top-1.5 text-slate-500">£</span>
                                <input
                                  type="number"
                                  value={cfForm.coreTreasury || ''}
                                  onChange={(e) => handleCfChange('coreTreasury', e.target.value)}
                                  className="w-full bg-[#0B192C] border border-slate-700 text-emerald-400 font-mono pl-6 p-1.5 rounded focus:border-[#E5C158] focus:outline-none"
                                />
                              </div>
                            </div>
                          </div>

                          <div className="space-y-3 font-sans pt-2 border-t border-slate-800/80">
                            <div className="text-[#E5C158] font-bold text-xs">&gt; Foreign Inflow(s)</div>
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-3 pl-2">
                              <div>
                                <label className="block text-[10px] text-slate-400">Protectorate(s) Income</label>
                                <input type="number" value={cfForm.protectorates || ''} onChange={(e) => handleCfChange('protectorates', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 text-emerald-400 font-mono p-1.5 rounded text-xs" />
                              </div>
                              <div>
                                <label className="block text-[10px] text-slate-400">Allied Subsidies</label>
                                <input type="number" value={cfForm.subsidies || ''} onChange={(e) => handleCfChange('subsidies', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 text-emerald-400 font-mono p-1.5 rounded text-xs" />
                              </div>
                              <div>
                                <label className="block text-[10px] text-slate-400">Convention Contributions</label>
                                <input type="number" value={cfForm.contributions || ''} onChange={(e) => handleCfChange('contributions', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 text-emerald-400 font-mono p-1.5 rounded text-xs" />
                              </div>
                              <div>
                                <label className="block text-[10px] text-slate-400">War Reparations</label>
                                <input type="number" value={cfForm.reparations || ''} onChange={(e) => handleCfChange('reparations', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 text-emerald-400 font-mono p-1.5 rounded text-xs" />
                              </div>
                              <div>
                                <label className="block text-[10px] text-slate-400">Admiralty Prize Grants</label>
                                <input type="number" value={cfForm.prizeGrants || ''} onChange={(e) => handleCfChange('prizeGrants', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 text-emerald-400 font-mono p-1.5 rounded text-xs" />
                              </div>
                              <div>
                                <label className="block text-[10px] text-slate-400">Exactions / Requisitions</label>
                                <input type="number" value={cfForm.exactions || ''} onChange={(e) => handleCfChange('exactions', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 text-emerald-400 font-mono p-1.5 rounded text-xs" />
                              </div>
                            </div>
                          </div>

                          <div className="text-slate-400">———————————————————————————————————————</div>
                          <div className="flex justify-between items-center text-sm font-bold text-emerald-400 font-mono">
                            <span>Total Inflows :</span>
                            <span>£{totalInflows.toLocaleString()}</span>
                          </div>
                        </div>

                        {/* OUTFLOWS SECTION */}
                        <div className="space-y-4 bg-[#0F223D] p-4 rounded border border-slate-700">
                          <div className="text-rose-400 font-bold text-sm tracking-wide border-b border-slate-800 pb-1">OUTFLOWS:</div>
                          
                          <div className="space-y-3 font-sans">
                            <div className="text-[#E5C158] font-bold text-xs">&gt; Domestic Outflow(s)</div>
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-3 pl-2">
                              <div>
                                <label className="block text-[11px] text-slate-300 mb-1">Land Forces Expenditure</label>
                                <input type="number" value={cfForm.landForces || ''} onChange={(e) => handleCfChange('landForces', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 text-rose-400 font-mono p-1.5 rounded focus:border-[#E5C158] focus:outline-none" />
                              </div>
                              <div>
                                <label className="block text-[11px] text-slate-300 mb-1">Fleet Maintenance & Ordnance</label>
                                <input type="number" value={cfForm.fleetMaint || ''} onChange={(e) => handleCfChange('fleetMaint', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 text-rose-400 font-mono p-1.5 rounded focus:border-[#E5C158] focus:outline-none" />
                              </div>
                              <div>
                                <label className="block text-[11px] text-slate-300 mb-1">Town Watch</label>
                                <input type="number" value={cfForm.townWatch || ''} onChange={(e) => handleCfChange('townWatch', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 text-rose-400 font-mono p-1.5 rounded focus:border-[#E5C158] focus:outline-none" />
                              </div>
                              <div>
                                <label className="block text-[11px] text-slate-300 mb-1">Statutory Civil List</label>
                                <input type="number" value={cfForm.civilList || ''} onChange={(e) => handleCfChange('civilList', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 text-rose-400 font-mono p-1.5 rounded focus:border-[#E5C158] focus:outline-none" />
                              </div>
                              <div className="col-span-2">
                                <label className="block text-[11px] text-slate-300 mb-1">Pensions & Annuities</label>
                                <input type="number" value={cfForm.pensions || ''} onChange={(e) => handleCfChange('pensions', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 text-rose-400 font-mono p-1.5 rounded focus:border-[#E5C158] focus:outline-none" />
                              </div>
                            </div>
                          </div>

                          <div className="space-y-3 font-sans pt-2 border-t border-slate-800/80">
                            <div className="text-[#E5C158] font-bold text-xs">&gt; Foreign Outflow(s)</div>
                            <div className="pl-2">
                              <label className="block text-[11px] text-slate-300 mb-1">Diplomatic Subsidies & Secret Service</label>
                              <input type="number" value={cfForm.diplomatic || ''} onChange={(e) => handleCfChange('diplomatic', e.target.value)} className="w-full max-w-md bg-[#0B192C] border border-slate-700 text-rose-400 font-mono p-1.5 rounded focus:border-[#E5C158] focus:outline-none" />
                            </div>
                          </div>

                          <div className="text-slate-400">———————————————————————————————————————</div>
                          <div className="flex justify-between items-center text-sm font-bold text-rose-400 font-mono">
                            <span>Total Outflows :</span>
                            <span>£{totalOutflows.toLocaleString()}</span>
                          </div>
                        </div>

                        {/* SUMMARY SECTION */}
                        <div className="space-y-3 bg-[#0F223D] p-4 rounded border border-[#E5C158]/50 font-mono">
                          <div className="text-[#E5C158] font-bold text-sm">SUMMARY:</div>
                          <div className="flex justify-between items-center text-xs">
                            <span className="text-slate-300">Net Turn Yield (Inflows - Outflows) :</span>
                            <span className={`font-bold ${netYield >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                              {netYield >= 0 ? `+£${netYield.toLocaleString()}` : `-£${Math.abs(netYield).toLocaleString()}`}
                            </span>
                          </div>
                          <div className="flex justify-between items-center text-xs">
                            <span className="text-slate-300">Initial State Liquidity :</span>
                            <span className="text-white">£{(cfForm.initialLiquidity || 0).toLocaleString()}</span>
                          </div>
                          <div className="border-t border-slate-700 pt-2 flex justify-between items-center text-sm font-bold">
                            <span className="text-[#E5C158]">Net Liquidity Balance :</span>
                            <span className={totalLiquidity >= 0 ? 'text-emerald-400' : 'text-rose-400'}>
                              £{totalLiquidity.toLocaleString()}
                            </span>
                          </div>
                        </div>

                        <div className="text-center space-y-1 pt-4 border-t border-slate-800">
                          <div className="text-slate-400">=======================================================</div>
                          <div className="text-[#E5C158] font-bold text-xs">DOCUMENT CERTIFIED & SEALED BY HIS MAJESTY'S TREASURY</div>
                          <div className="text-slate-400">=======================================================</div>
                        </div>
                      </div>
                    )}

                    {/* SUBTAB 2: GDI GROWTH ASSESSMENT */}
                    {exchequerSubTab === 'GDI_ASSESSMENT' && (
                      <div className="bg-[#0B192C] border border-[#E5C158]/60 p-6 rounded space-y-6 font-mono text-xs">
                        <div className="text-center space-y-1">
                          <div className="text-[#E5C158] font-bold text-base">📊 Consolidated Funds (Gross Domestic Income Growth Assessment)</div>
                          <div className="text-slate-400">========================================================================</div>
                          <div className="text-white font-bold tracking-wider">HM TREASURY // GDI GROWTH RATE CALCULATOR</div>
                          <div className="text-slate-400">========================================================================</div>
                        </div>

                        <div className="bg-[#0F223D] p-5 rounded border border-slate-700 space-y-4 font-sans">
                          <p className="text-slate-300 text-xs leading-relaxed">
                            Under Treasury regulations, the annualized growth rate of Gross Domestic Income is assessed based on baseline tax revenues recorded at Turn 3 and projected revenues through Turn 8.
                          </p>

                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2">
                            <div>
                              <label className="block text-xs font-bold text-[#E5C158] mb-1">Turn 3 Revenue Baseline (£)</label>
                              <input
                                type="number"
                                value={turn3Rev}
                                onChange={(e) => setTurn3Rev(parseFloat(e.target.value) || 0)}
                                className="w-full bg-[#0B192C] border border-slate-700 text-white font-mono p-2 rounded focus:border-[#E5C158]"
                              />
                            </div>
                            <div>
                              <label className="block text-xs font-bold text-[#E5C158] mb-1">Turn 8 Revenue Target (£)</label>
                              <input
                                type="number"
                                value={turn8Rev}
                                onChange={(e) => setTurn8Rev(parseFloat(e.target.value) || 0)}
                                className="w-full bg-[#0B192C] border border-slate-700 text-white font-mono p-2 rounded focus:border-[#E5C158]"
                              />
                            </div>
                          </div>

                          <button
                            onClick={handleCalculateGrowth}
                            className="w-full bg-[#E5C158] text-[#0F223D] font-bold py-2.5 rounded hover:bg-yellow-400 transition-colors cursor-pointer text-xs mt-2"
                          >
                            Calculate Compound Growth Rate
                          </button>

                          {growthRate !== null && (
                            <div className="bg-[#0B192C] p-4 rounded border border-emerald-500/50 mt-4 text-center font-mono">
                              <div className="text-xs text-slate-400">Assessed Growth Rate (5-Turn Compound) :</div>
                              <div className="text-2xl font-bold text-emerald-400 my-1">
                                {(growthRate * 100).toFixed(2)}% per turn
                              </div>
                              <div className="text-[11px] text-slate-400 italic">
                                Projected Annualized Impact: +£{((turn8Rev - turn3Rev)).toLocaleString()} net revenue gain over 5 turns.
                              </div>
                            </div>
                          )}
                        </div>
                      </div>
                    )}

                    {/* SUBTAB 3: FINANCIAL STATEMENT (ANNUAL BUDGET) */}
                    {exchequerSubTab === 'FINANCIAL_STATEMENT' && (
                      <div className="bg-[#0B192C] border border-[#E5C158]/60 p-6 rounded space-y-6 font-mono text-xs">
                        <div className="text-center space-y-1">
                          <div className="text-[#E5C158] font-bold text-base">📜 Financial Statement — Annual Budget (Turn 8)</div>
                          <div className="text-slate-400">========================================================================</div>
                          <div className="text-white font-bold tracking-wider">CHANCELLOR OF THE EXCHEQUER // ANNUAL BUDGET STATEMENT TO PARLIAMENT</div>
                          <div className="text-slate-400">========================================================================</div>
                        </div>

                        <div className="bg-[#0F223D] p-5 rounded border border-slate-700 space-y-4 font-sans text-xs">
                          <div className="text-[#E5C158] font-bold text-sm border-b border-slate-700 pb-2">
                            State Balance Sheet & Parliamentary Appropriations
                          </div>
                          
                          <div className="grid grid-cols-2 gap-4 font-mono">
                            <div className="bg-[#0B192C] p-3 rounded border border-slate-800">
                              <div className="text-slate-400 text-[11px]">Total Session Revenues</div>
                              <div className="text-emerald-400 font-bold text-base mt-1">£{(totalInflows * 8).toLocaleString()}</div>
                            </div>
                            <div className="bg-[#0B192C] p-3 rounded border border-slate-800">
                              <div className="text-slate-400 text-[11px]">Total Session Outlays</div>
                              <div className="text-rose-400 font-bold text-base mt-1">£{(totalOutflows * 8).toLocaleString()}</div>
                            </div>
                          </div>

                          <p className="text-slate-300 leading-relaxed pt-2">
                            The Chancellor of the Exchequer presents the formal budget statement to the House of Commons. Appropriations for Civil List, Naval Supplies, and Military Service for the upcoming session are ratified under the Supply Act.
                          </p>
                        </div>
                      </div>
                    )}
                  </>
                )}
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.render(<ParliamentaryEngine />, document.getElementById('root'));
  </script>
</body>
</html>
