    function toRoman(num) {
      const lookup = { M: 1000, CM: 900, D: 500, CD: 400, C: 100, XC: 90, L: 50, XL: 40, X: 10, IX: 9, V: 5, IV: 4, I: 1 };
      let roman = '';
      for (let i in lookup) {
        while (num >= lookup[i]) {
          roman += i;
          num -= lookup[i];
        }
      }
      return roman;
    }

      // Consolidated Funds Calculations

        if (score >= 10) return { label: 'Exceptional', color: 'text-emerald-400' };
        if (score >= 7) return { label: 'Stable', color: 'text-blue-400' };

          homeOfficeForm.publicOrder.wales +
          homeOfficeForm.publicOrder.scotland +

        sumRegion(homeOfficeForm.garrisons) + 
        sumRegion(homeOfficeForm.ministers) + 
        sumRegion(homeOfficeForm.buildings) + 
        sumRegion(homeOfficeForm.govType) + 
        sumRegion(homeOfficeForm.culture);

      const handleSaveGame = () => {
        const stateToSave = {
          selectedYear, currentTurn, activeTab, exchequerSubTab, cabinetSubTab,
          justiceTurns, peaceTurns, oppositionTurns, warOfficeTurn, admiraltyTurn,
          turn3Rev, turn8Rev, growthRate, cfForm, homeOfficeForm, foreignOfficeForm, cabinetForm, cabinetMinisters
        };
        localStorage.setItem('parliament_savegame', JSON.stringify(stateToSave));
        alert('Game saved successfully!');
        setIsMenuOpen(false);
      };

      const handleLoadGame = () => {
        const saved = localStorage.getItem('parliament_savegame');
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            setSelectedYear(parsed.selectedYear || 1820);
            setCurrentTurn(parsed.currentTurn || 1);
            setActiveTab(parsed.activeTab || 'Parliamentary Timetable');
            setExchequerSubTab(parsed.exchequerSubTab || 'CONSOLIDATED_FUNDS');
            setCabinetSubTab(parsed.cabinetSubTab || 'NO_10_DOWNING_STREET');
            setJusticeTurns(parsed.justiceTurns || []);
            setPeaceTurns(parsed.peaceTurns || []);
            setOppositionTurns(parsed.oppositionTurns || []);
            setWarOfficeTurn(parsed.warOfficeTurn || null);
            setAdmiraltyTurn(parsed.admiraltyTurn || null);
            setTurn3Rev(parsed.turn3Rev || 9154);
            setTurn8Rev(parsed.turn8Rev || 12500);
            setGrowthRate(parsed.growthRate || null);
            if (parsed.cfForm) setCfForm(parsed.cfForm);
            if (parsed.homeOfficeForm) setHomeOfficeForm(parsed.homeOfficeForm);
            if (parsed.foreignOfficeForm) setForeignOfficeForm(parsed.foreignOfficeForm);
            if (parsed.cabinetForm) setCabinetForm(parsed.cabinetForm);
            if (parsed.cabinetMinisters) setCabinetMinisters(parsed.cabinetMinisters);
            setGameState('DASHBOARD');
            setIsMenuOpen(false);
          } catch (e) {
            alert('Failed to parse save game data.');
          }
        } else {
          alert('No saved game found.');
        }
      };

      const validateRules = () => {
        const errors = [];
        if (justiceTurns.length > 1) {
          const sorted = [...justiceTurns].sort((a, b) => a - b);
          for (let i = 0; i < sorted.length - 1; i++) {
            if (sorted[i + 1] - sorted[i] !== 8) {
              errors.push("Lord Chancellor reports must be exactly 8 turns apart.");
            }
          }
        }
        if (peaceTurns.length > 1) {
          const sorted = [...peaceTurns].sort((a, b) => a - b);
          for (let i = 0; i < sorted.length - 1; i++) {
            if (sorted[i + 1] - sorted[i] !== 4) {
              errors.push("Home Office reports must be exactly 4 turns apart.");
            }
          }
        }
        if (oppositionTurns.length !== 2) {
          errors.push("You must designate exactly 2 Opposition Days (Turns 4–12, sitting turns only).");
        }
        if (!warOfficeTurn) {
          errors.push("War Office Annual Report must be scheduled between Turn 13 and Turn 24 (sitting turns only).");
        }
        if (!admiraltyTurn) {
          errors.push("Admiralty Annual Report must be scheduled between Turn 13 and Turn 24 (sitting turns only).");
        }
        return errors;
      };

      const validationErrors = validateRules();
      const isValid = validationErrors.length === 0;

      const toggleTurn = (turn, currentList, setList) => {
        if (RECESS_TURNS[turn]) return;
        if (currentList.includes(turn)) {
          setList(currentList.filter((t) => t !== turn));
        } else {
          setList([...currentList, turn]);
        }
      };

      const handleCalculateGrowth = () => {
        if (turn3Rev > 0 && turn8Rev > 0) {
          const g = Math.pow(turn8Rev / turn3Rev, 1 / 5) - 1;
          setGrowthRate(g);
        }
      };

      const handleNextTurn = () => {
        if (currentTurn < 24) {
          setCurrentTurn(currentTurn + 1);
        } else {
          setSelectedYear((prev) => prev + 1);
          setCurrentTurn(1);
          setGameState('TIMETABLE_BUILDER');
        }
      };

      const renderLucidTimeline = (turns, currentList, setList) => (
        <div className="relative pt-6 pb-2 my-2 overflow-x-auto">
          <div className="flex justify-between min-w-[650px] relative z-10 px-2 gap-2">
            <div className="absolute top-3 left-4 right-4 h-[3px] bg-[#E5C158] shadow-[0_0_8px_rgba(229,193,88,0.4)] z-0" />
            {turns.map((t) => {
              const isRecess = !!RECESS_TURNS[t];
              const isSelected = currentList.includes(t);
              const monthLabel = MONTH_NAMES[t - 1];

              return (
                <div key={t} className="flex flex-col items-center flex-1 relative z-10">
                  <div className={`w-[2px] h-3 mb-1 ${isSelected ? 'bg-[#E5C158]' : 'bg-[#E5C158]/60'}`}></div>
                  <button
                    disabled={isRecess}
                    onClick={() => toggleTurn(t, currentList, setList)}
                    className={`w-full py-2 px-1 rounded-md text-center border transition-all duration-150 shadow-md ${
                      isRecess
                        ? 'border-slate-800 bg-slate-900/80 text-slate-600 cursor-not-allowed opacity-50'
                        : isSelected
                        ? 'border-[#E5C158] bg-[#E5C158] text-[#0F223D] font-bold scale-105 shadow-yellow-500/20'
                        : 'border-slate-600 bg-[#0B192C] text-slate-200 hover:border-[#E5C158] hover:bg-[#0F223D] cursor-pointer'
                    }`}
                  >
                    <div className="text-[10px] font-bold tracking-wider uppercase">{monthLabel}</div>
                    <div className="text-xs font-serif font-semibold">Turn {t}</div>
                    {isRecess && <div className="text-[9px] text-amber-500/80 font-sans mt-0.5 font-bold">RECESS</div>}
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      );

      const currentDateString = `${MONTH_NAMES[currentTurn - 1]} ${selectedYear}`;

      return (
        <div className="min-h-screen bg-[#0F223D] text-[#E2E8F0] font-sans pb-12">
          {/* Header */}
          <header className="bg-[#0B192C] border-b border-slate-800 px-6 py-4 flex justify-between items-center relative shadow-md">
            <div>
              <h1 className="text-xl font-serif font-bold text-[#E5C158] tracking-wide">
                1800s British Parliamentary Strategy Engine
              </h1>
              <p className="text-xs text-slate-400">
                HM Government Session Planning & Executive Dashboard
              </p>
            </div>

            {/* Turn & Year Status Banner */}

                </div>
                <div className="text-sm font-bold text-[#E5C158] font-mono">

              </div>

              {/* Hamburger Menu Toggle */}
              <div className="relative">
                <button

                  className="bg-[#132A4A] hover:bg-[#1E3A8A] border border-slate-700 text-[#E5C158] p-2 rounded focus:outline-none transition"
                  title="Menu"
                >
                  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16" />
                  </svg>
                </button>

                {/* Dropdown Menu */}
                {isMenuOpen && (
                  <div className="absolute right-0 mt-2 w-48 bg-[#0B192C] border border-slate-700 rounded shadow-xl z-50 py-1">

                    </button>

          {/* Navigation Bar for Dashboard State */}

                      >
                        <option value="">-- Select Turn --</option>
                        {[17, 19, 20, 21, 22, 23].map((t) => (
                          <option key={t} value={t}>
                            Turn {t} ({MONTH_NAMES[t - 1]})
                          </option>

                      </select>
                    </div>

                    <div className="bg-[#0B192C] border border-slate-700 p-4 rounded">

                      <select
                        value={admiraltyTurn || ''}
                        onChange={(e) => setAdmiraltyTurn(e.target.value ? parseInt(e.target.value) : null)}

                        <option value="">-- Select Turn --</option>
                        {[17, 19, 20, 21, 22, 23].map((t) => (
                          <option key={t} value={t}>
                            Turn {t} ({MONTH_NAMES[t - 1]})
                          </option>
                        ))}
                      </select>
                    </div>
                  </div>
                </div>

                {/* Validation Warnings */}
                {validationErrors.length > 0 && (
                  <div className="bg-rose-950/40 border border-rose-800 p-4 rounded text-xs text-rose-300 space-y-1">
                    <div className="font-bold uppercase tracking-wider mb-1">Schedule Requirements Not Met:</div>
                    {validationErrors.map((err, idx) => (
                      <div key={idx}>• {err}</div>
                    ))}
                  </div>
                )}

                <div className="pt-4 border-t border-slate-700 flex justify-end">
                  <button
                    disabled={!isValid}
                    onClick={() => setGameState('DASHBOARD')}
                    className={`px-6 py-2 rounded font-bold text-xs uppercase tracking-wider transition ${
                      isValid
                        ? 'bg-[#E5C158] text-[#0F223D] hover:bg-yellow-400 shadow-lg cursor-pointer'
                        : 'bg-slate-700 text-slate-500 cursor-not-allowed'
                    }`}
                  >
                    Confirm Timetable & Open Parliament &rarr;
                  </button>
                </div>
              </div>
            )}

            {gameState === 'DASHBOARD' && (
              <div>
                {/* Parliamentary Timetable Tab */}
                {activeTab === 'Parliamentary Timetable' && (
                  <div className="space-y-6 bg-[#132A4A] border border-slate-700 p-6 rounded-lg">
                    <div className="border-b border-slate-700 pb-2">
                      <h2 className="text-lg font-serif font-bold text-[#E5C158]">
                        Parliamentary Calendar ({selectedYear})
                      </h2>
                      <p className="text-xs text-slate-300">
                        Overview of statutory sitting days and scheduled cabinet reports.
                      </p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 text-xs font-mono">
                      {Array.from({ length: 24 }, (_, i) => i + 1).map((t) => {
                        const isRecess = !!RECESS_TURNS[t];
                        const isCurrent = t === currentTurn;

                        return (
                          <div
                            key={t}
                            className={`p-3 rounded border ${
                              isCurrent
                                ? 'bg-[#0B192C] border-[#E5C158] ring-1 ring-[#E5C158]'
                                : isRecess
                                ? 'bg-slate-900/50 border-slate-800 text-slate-500'
                                : 'bg-[#0B192C] border-slate-700 text-slate-200'
                            }`}
                          >
                            <div className="flex justify-between items-center mb-1 font-bold">
                              <span>Turn {t}: {MONTH_NAMES[t - 1]}</span>
                              {isCurrent && <span className="text-[#E5C158] text-[10px] uppercase">Active</span>}
                            </div>
                            {isRecess ? (
                              <div className="text-amber-500 font-sans italic">{RECESS_TURNS[t]}</div>
                            ) : (
                              <div className="space-y-0.5 text-[11px] font-sans">
                                {justiceTurns.includes(t) && <div className="text-blue-300">• Lord Chancellor Report</div>}
                                {peaceTurns.includes(t) && <div className="text-emerald-300">• Home Office Report</div>}
                                {oppositionTurns.includes(t) && <div className="text-rose-300">• Opposition Day</div>}
                                {warOfficeTurn === t && <div className="text-amber-300">• War Office Report</div>}
                                {admiraltyTurn === t && <div className="text-cyan-300">• Admiralty Report</div>}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* Cabinet Office Tab */}
                {activeTab === 'Cabinet Office' && (
                  <div className="space-y-6">
                    <div className="flex border-b border-slate-700 bg-[#0B192C] p-2 rounded-t-lg">
                      {['NO_10_DOWNING_STREET', 'MINISTERS_TRAITS'].map((sub) => (
                        <button
                          key={sub}
                          onClick={() => setCabinetSubTab(sub)}
                          className={`px-4 py-2 text-xs font-bold uppercase tracking-wider rounded-t transition ${
                            cabinetSubTab === sub
                              ? 'bg-[#E5C158] text-[#0F223D]'
                              : 'text-slate-400 hover:text-white'
                          }`}
                        >
                          {sub.replace(/_/g, ' ')}
                        </button>
                      ))}
                    </div>

                    {cabinetSubTab === 'NO_10_DOWNING_STREET' && (
                      <div className="bg-[#132A4A] border border-slate-700 p-6 rounded-b-lg space-y-4">
                        <h3 className="text-sm font-bold text-[#E5C158] uppercase tracking-wider border-b border-slate-700 pb-2">
                          10 Downing Street Cabinet Directives
                        </h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs">
                          <div>
                            <label className="block text-slate-400 mb-1 font-bold">Prime Minister Notes</label>
                            <textarea
                              rows={4}
                              value={cabinetForm.pmNotes}
                              onChange={(e) => setCabinetForm({ ...cabinetForm, pmNotes: e.target.value })}
                              className="w-full bg-[#0B192C] border border-slate-700 text-white p-2 rounded"
                            />
                          </div>
                          <div>
                            <label className="block text-slate-400 mb-1 font-bold">Key Executive Directives</label>
                            <textarea
                              rows={4}
                              value={cabinetForm.keyDirectives}
                              onChange={(e) => setCabinetForm({ ...cabinetForm, keyDirectives: e.target.value })}
                              className="w-full bg-[#0B192C] border border-slate-700 text-white p-2 rounded"
                            />
                          </div>
                        </div>
                      </div>
                    )}

                    {cabinetSubTab === 'MINISTERS_TRAITS' && (
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {Object.entries(cabinetMinisters).map(([key, min]) => (
                          <div key={key} className="bg-[#0B192C] border border-slate-700 p-4 rounded-lg flex space-x-4">
                            <img src={min.img} alt={min.name} className="w-20 h-28 object-cover rounded border border-slate-700" />
                            <div className="flex-1 text-xs space-y-1">
                              <div className="font-bold text-[#E5C158] text-sm">{min.role}</div>
                              <div className="text-white font-semibold">{min.name} ({min.title})</div>
                              <div className="text-slate-400">Management Skills: {min.managementSkills} | Age: {min.age}</div>
                              <div className="pt-2">
                                <span className="font-bold text-slate-300">Traits: </span>
                                {min.traits.map(t => t.name).join(', ')}
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}

                {/* Home Office Tab */}
                {activeTab === 'Home Office' && (
                  <div className="bg-[#132A4A] border border-slate-700 p-6 rounded-lg space-y-6">
                    <div className="border-b border-slate-700 pb-2">
                      <h2 className="text-lg font-serif font-bold text-[#E5C158]">

                      </h2>

                      <div className="text-xs font-bold uppercase tracking-wider text-[#E5C158] mb-1">

                      <div className={`text-xs ${domesticJudgementColor}`}>

                              <input type="number" value={cfForm.liverpool} onChange={(e) => handleCfChange('liverpool', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 p-1 rounded font-mono text-white" />
                            </div>
                            <div>
                              <label className="block text-slate-400 mb-1">Waterford Traffic (£)</label>
                              <input type="number" value={cfForm.waterford} onChange={(e) => handleCfChange('waterford', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 p-1 rounded font-mono text-white" />
                            </div>
                            <div>
                              <label className="block text-slate-400 mb-1">Protectorates Income (£)</label>
                              <input type="number" value={cfForm.protectorates} onChange={(e) => handleCfChange('protectorates', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 p-1 rounded font-mono text-white" />
                            </div>
                            <div>
                              <label className="block text-slate-400 mb-1">Allied Subsidies (£)</label>
                              <input type="number" value={cfForm.subsidies} onChange={(e) => handleCfChange('subsidies', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 p-1 rounded font-mono text-white" />
                            </div>
                            <div>
                              <label className="block text-slate-400 mb-1">Convention Contributions (£)</label>
                              <input type="number" value={cfForm.contributions} onChange={(e) => handleCfChange('contributions', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 p-1 rounded font-mono text-white" />
                            </div>
                            <div>
                              <label className="block text-slate-400 mb-1">War Reparations (£)</label>
                              <input type="number" value={cfForm.reparations} onChange={(e) => handleCfChange('reparations', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 p-1 rounded font-mono text-white" />
                            </div>
                            <div>
                              <label className="block text-slate-400 mb-1">Admiralty Prize Grants (£)</label>
                              <input type="number" value={cfForm.prizeGrants} onChange={(e) => handleCfChange('prizeGrants', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 p-1 rounded font-mono text-white" />
                            </div>
                            <div>
                              <label className="block text-slate-400 mb-1">Exactions / Requisitions (£)</label>
                              <input type="number" value={cfForm.exactions} onChange={(e) => handleCfChange('exactions', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 p-1 rounded font-mono text-white" />
                            </div>
                            <div>
                              <label className="block text-slate-400 mb-1">Land Forces Expenditure (£)</label>
                              <input type="number" value={cfForm.landForces} onChange={(e) => handleCfChange('landForces', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 p-1 rounded font-mono text-white" />
                            </div>
                            <div>
                              <label className="block text-slate-400 mb-1">Fleet Maintenance (£)</label>
                              <input type="number" value={cfForm.fleetMaint} onChange={(e) => handleCfChange('fleetMaint', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 p-1 rounded font-mono text-white" />
                            </div>
                            <div>
                              <label className="block text-slate-400 mb-1">Town Watch (£)</label>
                              <input type="number" value={cfForm.townWatch} onChange={(e) => handleCfChange('townWatch', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 p-1 rounded font-mono text-white" />
                            </div>
                            <div>
                              <label className="block text-slate-400 mb-1">Statutory Civil List (£)</label>
                              <input type="number" value={cfForm.civilList} onChange={(e) => handleCfChange('civilList', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 p-1 rounded font-mono text-white" />
                            </div>
                            <div>
                              <label className="block text-slate-400 mb-1">Pensions & Grants (£)</label>
                              <input type="number" value={cfForm.pensions} onChange={(e) => handleCfChange('pensions', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 p-1 rounded font-mono text-white" />
                            </div>
                            <div>
                              <label className="block text-slate-400 mb-1">Diplomatic Expenditures (£)</label>
                              <input type="number" value={cfForm.diplomatic} onChange={(e) => handleCfChange('diplomatic', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 p-1 rounded font-mono text-white" />
                            </div>
                            <div>
                              <label className="block text-slate-400 mb-1">Initial Vault Liquidity (£)</label>
                              <input type="number" value={cfForm.initialLiquidity} onChange={(e) => handleCfChange('initialLiquidity', e.target.value)} className="w-full bg-[#0B192C] border border-slate-700 p-1 rounded font-mono text-white" />
                            </div>
                          </div>
                        </div>

                        {/* Consolidated Funds Display Output */}
                        <div className="bg-[#0B192C] border border-slate-700 p-6 rounded-lg font-mono text-xs shadow-xl leading-relaxed">
                          <div className="text-center font-bold text-[#E5C158] text-sm mb-1">
                            💰 Consolidated Funds
                          </div>
                          <div className="text-center text-slate-400 mb-1">
                            =======================================================
                          </div>
                          <div className="text-center text-white font-bold mb-1 tracking-widest">
                            HM TREASURY // THE EXCHEQUER AUDIT OF THE CONSOLIDATED FUND
                          </div>
                          <div className="text-center text-slate-400 mb-3">
                            =======================================================
                          </div>
                          <div className="mb-4 text-slate-200">
                            DATE: <span className="text-[#E5C158] font-bold">{currentDateString}</span>
                          </div>

                          <div className="mb-4">
                            <div className="font-bold text-[#E5C158] mb-1">INFLOWS:</div>
                            <div className="pl-2 text-slate-300">&gt; Domestic Inflows</div>
                            <div className="pl-4 space-y-0.5 text-slate-300">
                              <div>Domestic Tax Income : £{cfForm.domTax.toLocaleString()}</div>
                              <div>Gross Commercial Port Traffic</div>
                              <div className="pl-4">Bristol : £{cfForm.bristol.toLocaleString()}</div>
                              <div className="pl-4">Chatham Docks : £{cfForm.chatham.toLocaleString()}</div>
                              <div className="pl-4">Liverpool : £{cfForm.liverpool.toLocaleString()}</div>
                              <div className="pl-4">Waterford : £{cfForm.waterford.toLocaleString()}</div>
                              <div className="text-amber-300 font-semibold">Total Commercial Capacity : £{totalCapacity.toLocaleString()}</div>
                              <div>Total Trade Income (Custom Duties Collected) : £{cfForm.tradeIncome.toLocaleString()}</div>
                              <div>Core Treasury Income : £{cfForm.coreTreasury.toLocaleString()}</div>
                            </div>

                            <div className="pl-2 mt-2 text-slate-300">&gt; Foreign Inflows</div>
                            <div className="pl-4 space-y-0.5 text-slate-300">
                              <div>Protectorate(s) Income : £{cfForm.protectorates.toLocaleString()}</div>
                              <div>Allied Subsidies : £{cfForm.subsidies.toLocaleString()}</div>
                              <div>Convention Contributions : £{cfForm.contributions.toLocaleString()}</div>
                              <div>War Reparations : £{cfForm.reparations.toLocaleString()}</div>
                              <div>Admiralty Prize Grants : £{cfForm.prizeGrants.toLocaleString()}</div>
                              <div>Exactions / Requisitions : £{cfForm.exactions.toLocaleString()}</div>
                            </div>
                            <div className="text-slate-500 my-1">-------------------------------------------------------</div>
                            <div className="text-[#E5C158] font-bold">Total Inflows Income : £{totalInflows.toLocaleString()}</div>
                          </div>

                          <div className="mb-4">
                            <div className="font-bold text-[#E5C158] mb-1">OUTFLOWS:</div>
                            <div className="pl-2 text-slate-300">&gt; Domestic Outflows</div>
                            <div className="pl-4 space-y-0.5 text-slate-300">
                              <div>Land Forces Expenditure : £{cfForm.landForces.toLocaleString()}</div>
                              <div>Fleet Maintenance & Ordnance : £{cfForm.fleetMaint.toLocaleString()}</div>
                              <div>Town Watch : £{cfForm.townWatch.toLocaleString()}</div>
                              <div>Statutory Civil List : £{cfForm.civilList.toLocaleString()}</div>
                              <div>Pensions, Grants & Privy Purse Supplements : £{cfForm.pensions.toLocaleString()}</div>
                            </div>

                            <div className="pl-2 mt-2 text-slate-300">&gt; Foreign Outflows</div>
                            <div className="pl-4 space-y-0.5 text-slate-300">
                              <div>Diplomatic Expenditures : £{cfForm.diplomatic.toLocaleString()}</div>
                            </div>
                            <div className="text-slate-500 my-1">-------------------------------------------------------</div>
                            <div className="text-rose-400 font-bold">Total Outflows Expenditure : £{totalOutflows.toLocaleString()}</div>
                          </div>

                          <div className="text-slate-400 mb-2">
                            =======================================================
                          </div>
                          <div className="text-[#E5C158] font-bold text-sm mb-1">
                            NET YIELD TO SPECIE VAULTS : £{netYield.toLocaleString()}
                          </div>
                          <div className="text-emerald-400 font-bold text-sm mb-3">
                            TOTAL TREASURY LIQUIDITY : £{totalLiquidity.toLocaleString()}
                          </div>

                          <div className="text-center text-slate-400 mb-1">
                            ========================================================================================
                          </div>
                          <div className="text-center text-[10px] text-slate-400 tracking-wider">
                            DOCUMENT CERTIFIED & SEALED BY THE GREAT SEAL OF GREAT BRITAIN
                          </div>
                          <div className="text-center text-slate-400 mt-1">
                            ========================================================================================
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* Foreign Office Tab */}
                {activeTab === 'Foreign Office' && (
                  <div className="bg-[#132A4A] border border-slate-700 p-6 rounded-lg space-y-4">
                    <div className="border-b border-slate-700 pb-2">
                      <h2 className="text-lg font-serif font-bold text-[#E5C158]">
                        Foreign Office & Diplomatic Conventions
                      </h2>
                      <p className="text-xs text-slate-300">
                        Reporting Officer: <span className="text-white font-bold">{foreignOfficeForm.reportingOfficer}</span>
                      </p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs">
                      <div>
                        <label className="block text-slate-400 mb-1 font-bold">Treaty Name / Accord</label>
                        <input
                          type="text"
                          value={foreignOfficeForm.treatyName}
                          onChange={(e) => setForeignOfficeForm({ ...foreignOfficeForm, treatyName: e.target.value })}
                          placeholder="e.g., Treaty of Vienna Protocol"
                          className="w-full bg-[#0B192C] border border-slate-700 p-2 rounded text-white"
                        />
                      </div>
                      <div>
                        <label className="block text-slate-400 mb-1 font-bold">Treaty Nature</label>
                        <select
                          value={foreignOfficeForm.treatyNature}
                          onChange={(e) => setForeignOfficeForm({ ...foreignOfficeForm, treatyNature: e.target.value })}
                          className="w-full bg-[#0B192C] border border-slate-700 p-2 rounded text-white"
                        >
                          <option value="Coalition Accord">Coalition Accord</option>
                          <option value="Bilateral Convention">Bilateral Convention</option>
                          <option value="Secret Protocol">Secret Protocol</option>
                          <option value="Armistice & Peace">Armistice & Peace</option>
                        </select>
                      </div>
                    </div>

                    <div>
                      <label className="block text-slate-400 mb-2 font-bold text-xs">Diplomatic Actions Included</label>
                      <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
                        {DIPLOMATIC_ACTION_TYPES.map((act) => {
                          const isSel = foreignOfficeForm.selectedActions.includes(act.id);
                          return (
                            <button
                              key={act.id}
                              onClick={() => toggleDiplomaticAction(act.id)}
                              className={`p-2 rounded text-xs text-left border transition ${
                                isSel
                                  ? 'bg-[#E5C158] text-[#0F223D] border-[#E5C158] font-bold'
                                  : 'bg-[#0B192C] text-slate-300 border-slate-700 hover:border-slate-500'
                              }`}
                            >
                              {act.label}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ParliamentaryEngine />);
  </script>
</body>
</html>
