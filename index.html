    function toRoman(num) {
      const lookup = { M: 1000, CM: 900, D: 500, CD: 400, C: 100, XC: 90, L: 50, XL: 40, X: 10, IX: 9, V: 5, IV: 4, I: 1 };
      let roman = '';
      for (let i in lookup) {
        while (num >= lookup[i]) {
          roman += i;
          num -= lookup[i];
        }
      }
      return roman;
    }

      const [cabinetForm, setCabinetForm] = React.useState({
        pmNotes: 'Prime Minister directive: Preserve Tory majority and monitor civil agitation.',
        keyDirectives: '1. Secure Treasury appropriations.\n2. Maintain public tranquility via local garrisons.\n3. Oversee diplomatic posture with the Quadruple Alliance.',

      });

      // Helper Handlers for Ministers Traits and Followers
      const toggleMinisterTraitsOpen = (key) => {
        setCabinetMinisters(prev => ({
          ...prev,
          [key]: { ...prev[key], isTraitsOpen: !prev[key].isTraitsOpen }
        }));
      };

      const handleMinisterFieldChange = (key, field, value) => {
        setCabinetMinisters(prev => ({
          ...prev,
          [key]: { ...prev[key], [field]: value }
        }));
      };

      // Traits Handlers
      const addTraitToMinister = (key) => {
        setCabinetMinisters(prev => {
          const m = prev[key];
          const newTrait = { id: Date.now(), name: 'New Trait', effects: [{ id: Date.now() + 1, text: 'Trait Effect' }] };
          return { ...prev, [key]: { ...m, traits: [...m.traits, newTrait] } };
        });
      };

      const removeTraitFromMinister = (key, traitId) => {
        setCabinetMinisters(prev => {
          const m = prev[key];
          return { ...prev, [key]: { ...m, traits: m.traits.filter(t => t.id !== traitId) } };
        });
      };

      const updateTraitName = (key, traitId, name) => {
        setCabinetMinisters(prev => {
          const m = prev[key];
          const updated = m.traits.map(t => t.id === traitId ? { ...t, name } : t);
          return { ...prev, [key]: { ...m, traits: updated } };
        });
      };

      const addEffectToTrait = (key, traitId) => {
        setCabinetMinisters(prev => {
          const m = prev[key];
          const updated = m.traits.map(t => {
            if (t.id === traitId) {
              return { ...t, effects: [...t.effects, { id: Date.now(), text: 'New Effect' }] };
            }
            return t;
          });
          return { ...prev, [key]: { ...m, traits: updated } };
        });
      };

      const removeEffectFromTrait = (key, traitId, effectId) => {
        setCabinetMinisters(prev => {
          const m = prev[key];
          const updated = m.traits.map(t => {
            if (t.id === traitId) {
              return { ...t, effects: t.effects.filter(e => e.id !== effectId) };
            }
            return t;
          });
          return { ...prev, [key]: { ...m, traits: updated } };

        setCabinetMinisters(prev => {
          const m = prev[key];
          const updated = m.traits.map(t => {
            if (t.id === traitId) {
              const effs = t.effects.map(e => e.id === effectId ? { ...e, text } : e);
              return { ...t, effects: effs };
            }
            return t;
          });
          return { ...prev, [key]: { ...m, traits: updated } };
        });
      };

          const m = prev[key];

        });
      };

      const removeFollowerFromMinister = (key, followerId) => {
        setCabinetMinisters(prev => {
          const m = prev[key];
          return { ...prev, [key]: { ...m, followers: m.followers.filter(f => f.id !== followerId) } };
        });
      };

      const updateFollowerName = (key, followerId, name) => {
        setCabinetMinisters(prev => {
          const m = prev[key];
          const updated = m.followers.map(f => f.id === followerId ? { ...f, name } : f);
          return { ...prev, [key]: { ...m, followers: updated } };
        });
      };

      const addEffectToFollower = (key, followerId) => {
        setCabinetMinisters(prev => {
          const m = prev[key];
          const updated = m.followers.map(f => {
            if (f.id === followerId) {
              return { ...f, effects: [...f.effects, { id: Date.now(), text: 'New Effect' }] };
            }
            return f;
          });
          return { ...prev, [key]: { ...m, followers: updated } };
        });

      const removeEffectFromFollower = (key, followerId, effectId) => {
        setCabinetMinisters(prev => {
          const m = prev[key];

              return { ...f, effects: f.effects.filter(e => e.id !== effectId) };

        setCabinetMinisters(prev => {
          const m = prev[key];
          const updated = m.followers.map(f => {
            if (f.id === followerId) {
              const effs = f.effects.map(e => e.id === effectId ? { ...e, text } : e);
              return { ...f, effects: effs };

      // Consolidated Funds Ledger Form State

        garrisons: { london: 4, wales: 2, scotland: 2, ireland: 6 },
        ministers: { london: 2, wales: 1, scotland: 1, ireland: 1 },
        buildings: { london: 3, wales: 1, scotland: 1, ireland: 0 },
        govType: { london: 2, wales: 2, scotland: 2, ireland: 2 },
        culture: { london: 5, wales: 2, scotland: 3, ireland: 1 },

      // Foreign Office State

      const handleCfChange = (field, val) => {
        const parsed = parseFloat(val);
        setCfForm((prev) => ({
          ...prev,
          [field]: isNaN(parsed) ? 0 : parsed
        }));
      };

      const handleHomeOfficeChange = (category, region, val) => {
        const parsed = parseInt(val) || 0;
        setHomeOfficeForm((prev) => ({
          ...prev,
          [category]: {
            ...prev[category],

      const handleAddAgent = () => {
        setHomeOfficeForm((prev) => ({
          ...prev,
          foreignAgents: [
            ...prev.foreignAgents,
            { nation: '', name: '', status: 'Unconfirmed', location: '' }
          ]
        }));
      };

      const handleAgentChange = (index, field, value) => {
        setHomeOfficeForm((prev) => {
          const updated = [...prev.foreignAgents];
          updated[index][field] = value;
          return { ...prev, foreignAgents: updated };
        });
      };

      const handleRemoveAgent = (index) => {
        setHomeOfficeForm((prev) => ({
          ...prev,
          foreignAgents: prev.foreignAgents.filter((_, i) => i !== index)
        }));
      };

      const toggleDiplomaticAction = (actionId) => {
        setForeignOfficeForm((prev) => {
          const exists = prev.selectedActions.includes(actionId);
          const updatedActions = exists
            ? prev.selectedActions.filter((id) => id !== actionId)
            : [...prev.selectedActions, actionId];
          return { ...prev, selectedActions: updatedActions };
        });
      };

      const handleActionDataChange = (actionId, field, value) => {
        setForeignOfficeForm((prev) => ({
          ...prev,
          actionData: {
            ...prev.actionData,
            [actionId]: {
              ...prev.actionData[actionId],
              [field]: value

          }
        }));
      };

      const isExchequerSubTabUnlocked = (subTabKey) => {
        const gdiTurns = [1, 2, 3, 4, 5, 7];
        const cfTurns = [9, 10, 11, 12, 17, 19, 20, 21, 22, 23];

        if (subTabKey === 'GDI_ASSESSMENT') return gdiTurns.includes(currentTurn);
        if (subTabKey === 'FINANCIAL_STATEMENT') return currentTurn === 8;
        if (subTabKey === 'CONSOLIDATED_FUNDS') return cfTurns.includes(currentTurn);
        return true;
      };

      // Consolidated Funds Calculations
      const totalCapacity = (cfForm.bristol || 0) + (cfForm.chatham || 0) + (cfForm.liverpool || 0) + (cfForm.waterford || 0);
      const totalInflows = 
        (cfForm.domTax || 0) + totalCapacity + (cfForm.tradeIncome || 0) + (cfForm.coreTreasury || 0) +
        (cfForm.protectorates || 0) + (cfForm.subsidies || 0) + (cfForm.contributions || 0) +
        (cfForm.reparations || 0) + (cfForm.prizeGrants || 0) + (cfForm.exactions || 0);

      const totalOutflows = 
        (cfForm.landForces || 0) + (cfForm.fleetMaint || 0) + (cfForm.townWatch || 0) +
        (cfForm.civilList || 0) + (cfForm.pensions || 0) + (cfForm.diplomatic || 0);

      const netYield = totalInflows - totalOutflows;
      const totalLiquidity = (cfForm.initialLiquidity || 0) + netYield;

      // Home Office Calculations
      const getPublicOrderStatusLabel = (score) => {
        if (score >= 10) return { label: 'Exceptional', color: 'text-emerald-400' };
        if (score >= 7) return { label: 'Stable', color: 'text-blue-400' };
        if (score >= 0) return { label: 'Elevated Risk', color: 'text-amber-400' };
        return { label: 'Critical Risk', color: 'text-rose-500 font-bold' };
      };

      const getClamourLabel = (score) => {
        if (score >= 10) return { label: 'High Threat', color: 'text-rose-400 font-bold' };
        if (score >= 6) return { label: 'Medium Threat', color: 'text-amber-400' };
        if (score >= 1) return { label: 'Low Threat', color: 'text-blue-400' };
        return { label: 'None', color: 'text-emerald-400' };
      };

      const getReligiousUnrestLabel = (score) => {
        if (score >= 5) return { label: 'High Unrest', color: 'text-rose-400 font-bold' };
        if (score >= 3) return { label: 'Medium Unrest', color: 'text-amber-400' };
        if (score >= 1) return { label: 'Low Unrest', color: 'text-blue-400' };
        return { label: 'None', color: 'text-emerald-400' };
      };

      const avgPublicOrder = (
        (homeOfficeForm.publicOrder.london +
          homeOfficeForm.publicOrder.wales +
          homeOfficeForm.publicOrder.scotland +
          homeOfficeForm.publicOrder.ireland) /
        4
      ).toFixed(1);

      // Domestic Summary Logic
      const sumRegion = (obj) => obj.london + obj.wales + obj.scotland + obj.ireland;
      const totalPositiveEffects = 
        sumRegion(homeOfficeForm.garrisons) + 
        sumRegion(homeOfficeForm.ministers) + 
        sumRegion(homeOfficeForm.buildings) + 
        sumRegion(homeOfficeForm.govType) + 
        sumRegion(homeOfficeForm.culture);

      const totalNegativeEffects = sumRegion(homeOfficeForm.clamour) + sumRegion(homeOfficeForm.religiousUnrest);
      const netDomesticBalance = totalPositiveEffects - totalNegativeEffects;

      let domesticJudgement = "";
      let domesticJudgementColor = "";

      if (netDomesticBalance >= 15) {
        domesticJudgement = "The Realm is in complete domestic tranquility. Public order measures and civic contentedness firmly suppress radical elements across all Home Provinces.";
        domesticJudgementColor = "text-emerald-400";
      } else if (netDomesticBalance >= 0) {
        domesticJudgement = "Domestic conditions remain generally orderly, though mild social unrest persists in localized industrial districts. Regular policing and garrison strength are currently sufficient.";
        domesticJudgementColor = "text-amber-300";
      } else {
        domesticJudgement = "CRITICAL WARNING: Widespread social disorder detected. Radical reform agitation exceeds local peacekeeping capacity. Imminent risk of sedition and civil violence if garrisons or concessions are not deployed.";
        domesticJudgementColor = "text-rose-400 font-bold";
      }

      // Save & Load Handlers
      const handleSaveGame = () => {
        const stateToSave = {
          selectedYear, currentTurn, activeTab, exchequerSubTab,
          justiceTurns, peaceTurns, oppositionTurns, warOfficeTurn, admiraltyTurn,
          turn3Rev, turn8Rev, growthRate, cfForm, homeOfficeForm, foreignOfficeForm, cabinetForm, cabinetMinisters
        };
        localStorage.setItem('parliament_savegame', JSON.stringify(stateToSave));
        alert('Game saved successfully!');
        setIsMenuOpen(false);
      };

      const handleLoadGame = () => {
        const saved = localStorage.getItem('parliament_savegame');
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            setSelectedYear(parsed.selectedYear || 1820);
            setCurrentTurn(parsed.currentTurn || 1);
            setActiveTab(parsed.activeTab || 'Cabinet');
            setExchequerSubTab(parsed.exchequerSubTab || 'CONSOLIDATED_FUNDS');
            setJusticeTurns(parsed.justiceTurns || []);
            setPeaceTurns(parsed.peaceTurns || []);
            setOppositionTurns(parsed.oppositionTurns || []);
            setWarOfficeTurn(parsed.warOfficeTurn || null);
            setAdmiraltyTurn(parsed.admiraltyTurn || null);
            setTurn3Rev(parsed.turn3Rev || 9154);
            setTurn8Rev(parsed.turn8Rev || 12500);
            setGrowthRate(parsed.growthRate || null);
            if (parsed.cfForm) setCfForm(parsed.cfForm);
            if (parsed.homeOfficeForm) setHomeOfficeForm(parsed.homeOfficeForm);
            if (parsed.foreignOfficeForm) setForeignOfficeForm(parsed.foreignOfficeForm);
            if (parsed.cabinetForm) setCabinetForm(parsed.cabinetForm);
            if (parsed.cabinetMinisters) setCabinetMinisters(parsed.cabinetMinisters);
            setGameState('DASHBOARD');
            setIsMenuOpen(false);
          } catch (e) {
            alert('Failed to parse save game data.');
          }
        } else {
          alert('No saved game found.');
        }
      };

      const validateRules = () => {
        const errors = [];
        if (justiceTurns.length > 1) {
          const sorted = [...justiceTurns].sort((a, b) => a - b);
          for (let i = 0; i < sorted.length - 1; i++) {
            if (sorted[i + 1] - sorted[i] !== 8) {
              errors.push("Lord Chancellor reports must be exactly 8 turns apart.");
            }
          }
        }
        if (peaceTurns.length > 1) {
          const sorted = [...peaceTurns].sort((a, b) => a - b);
          for (let i = 0; i < sorted.length - 1; i++) {
            if (sorted[i + 1] - sorted[i] !== 4) {
              errors.push("Home Office reports must be exactly 4 turns apart.");
            }
          }
        }
        if (oppositionTurns.length !== 2) {
          errors.push("You must designate exactly 2 Opposition Days (Turns 4–12, sitting turns only).");
        }
        if (!warOfficeTurn) {
          errors.push("War Office Annual Report must be scheduled between Turn 13 and Turn 24 (sitting turns only).");
        }
        if (!admiraltyTurn) {
          errors.push("Admiralty Annual Report must be scheduled between Turn 13 and Turn 24 (sitting turns only).");
        }
        return errors;
      };

      const validationErrors = validateRules();
      const isValid = validationErrors.length === 0;

      const toggleTurn = (turn, currentList, setList) => {
        if (RECESS_TURNS[turn]) return;
        if (currentList.includes(turn)) {
          setList(currentList.filter((t) => t !== turn));
        } else {
          setList([...currentList, turn]);
        }
      };

      const handleNextTurn = () => {
        if (currentTurn < 24) {
          setCurrentTurn(currentTurn + 1);
        } else {
          setSelectedYear((prev) => prev + 1);
          setCurrentTurn(1);
          setGameState('TIMETABLE_BUILDER');
        }
      };

      const renderLucidTimeline = (turns, currentList, setList) => (
        <div className="relative pt-6 pb-2 my-2 overflow-x-auto">
          <div className="flex justify-between min-w-[650px] relative z-10 px-2 gap-2">
            <div className="absolute top-3 left-4 right-4 h-[3px] bg-[#E5C158] shadow-[0_0_8px_rgba(229,193,88,0.4)] z-0" />
            {turns.map((t) => {
              const isRecess = !!RECESS_TURNS[t];
              const isSelected = currentList.includes(t);
              const monthLabel = MONTH_NAMES[t - 1];

              return (
                <div key={t} className="flex flex-col items-center flex-1 relative z-10">
                  <div className={`w-[2px] h-3 mb-1 ${isSelected ? 'bg-[#E5C158]' : 'bg-[#E5C158]/60'}`}></div>
                  <button
                    disabled={isRecess}
                    onClick={() => toggleTurn(t, currentList, setList)}
                    className={`w-full py-2 px-1 rounded-md text-center border transition-all duration-150 shadow-md ${
                      isRecess
                        ? 'border-slate-800 bg-slate-900/80 text-slate-600 cursor-not-allowed opacity-50'
                        : isSelected
                        ? 'border-[#E5C158] bg-[#E5C158] text-[#0F223D] font-bold scale-105 shadow-yellow-500/20'
                        : 'border-slate-600 bg-[#0B192C] text-slate-200 hover:border-[#E5C158] hover:bg-[#0F223D] cursor-pointer'
                    }`}
                  >
                    <div className="text-[10px] uppercase tracking-wider opacity-80 leading-none mb-1">
                      {monthLabel}
                    </div>
                    <div className="text-xs font-bold leading-none">
                      Turn {t}
                    </div>
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      );

      const renderMasterTimeline = () => {
        const allTurns = Array.from({ length: 24 }, (_, i) => i + 1);

        return (
          <div className="relative pt-6 pb-4 my-2 overflow-x-auto">
            <div className="min-w-[1500px] relative z-10 px-2">
              <div className="absolute top-3 left-6 right-6 h-[3px] bg-[#E5C158] shadow-[0_0_10px_rgba(229,193,88,0.5)] z-0" />
              
              <div className="flex justify-between relative z-10 gap-2">
                {allTurns.map((t) => {
                  const recessName = RECESS_TURNS[t];
                  const monthLabel = MONTH_NAMES[t - 1];
                  
                  const isJustice = justiceTurns.includes(t);
                  const isPeace = peaceTurns.includes(t);
                  const isOpp = oppositionTurns.includes(t);
                  const isWar = warOfficeTurn === t;
                  const isAdm = admiraltyTurn === t;
                  const isBudget = t === 8;

                  const hasScheduledEvent = isJustice || isPeace || isOpp || isWar || isAdm || isBudget;

                  return (
                    <div key={t} className="flex flex-col items-center flex-1 min-w-[55px] relative z-10">
                      <div className={`w-[2px] h-3 mb-1 ${recessName ? 'bg-slate-700' : hasScheduledEvent ? 'bg-[#E5C158]' : 'bg-[#E5C158]/50'}`}></div>
                      <div className={`w-full p-1.5 rounded border text-center transition-all min-h-[72px] flex flex-col justify-between ${
                        recessName
                          ? 'border-slate-800 bg-slate-900/60 text-slate-500'
                          : hasScheduledEvent
                          ? 'border-[#E5C158] bg-[#0F223D] text-white shadow-lg'
                          : 'border-slate-700 bg-[#0B192C] text-slate-300'
                      }`}>
                        <div>
                          <div className="text-[9px] uppercase tracking-wider opacity-75 font-semibold">
                            {monthLabel}
                          </div>
                          <div className="text-xs font-bold text-[#E5C158]">
                            T{t}
                          </div>
                        </div>

                        <div className="mt-1 space-y-0.5 text-[8px] leading-tight">
                          {recessName && <span className="text-slate-500 italic block">Recess</span>}
                          {isBudget && <span className="bg-amber-500 text-black px-1 rounded block font-bold">Budget</span>}
                          {isJustice && <span className="bg-blue-600 text-white px-1 rounded block font-bold">Justice</span>}
                          {isPeace && <span className="bg-purple-600 text-white px-1 rounded block font-bold">Home</span>}
                          {isOpp && <span className="bg-rose-600 text-white px-1 rounded block font-bold">Opp</span>}
                          {isWar && <span className="bg-amber-600 text-white px-1 rounded block font-bold">War</span>}
                          {isAdm && <span className="bg-cyan-600 text-white px-1 rounded block font-bold">Admiralty</span>}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      };

                            <button
                              onClick={() => removeTraitFromMinister(ministerKey, trait.id)}
                              className="text-rose-400 hover:text-rose-200 font-bold px-1"
                              title="Delete Trait"

                              ✕

                          <div className="pl-2 border-l border-[#E5C158]/40 space-y-1 mt-1">

                              <span>Trait Effects:</span>
                              <button
                                onClick={() => addEffectToTrait(ministerKey, trait.id)}
                                className="text-[#E5C158] hover:underline"
                              >
                                + Effect

                            </div>
                            {trait.effects.map((eff) => (
                              <div key={eff.id} className="flex items-center gap-1">

                                  className="bg-[#0B192C] border border-slate-800 text-emerald-300 px-1 py-0.5 rounded flex-1 text-[9px]"
                                />
                                {trait.effects.length > 1 && (
                                  <button
                                    onClick={() => removeEffectFromTrait(ministerKey, trait.id, eff.id)}
                                    className="text-slate-500 hover:text-rose-400 text-[9px]"
                                  >
                                    ✕
                                  </button>
                                )}
                              </div>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* FOLLOWERS SECTION */}
                <div>
                  <div className="flex justify-between items-center mb-1">
                    <span className="text-[11px] font-bold text-cyan-300">👥 Followers</span>
                    <button
                      onClick={() => addFollowerToMinister(ministerKey)}
                      className="text-[9px] bg-cyan-600 text-white px-1.5 py-0.5 rounded font-bold hover:bg-cyan-500 cursor-pointer"
                    >
                      + Follower
                    </button>
                  </div>

                  {minister.followers.length === 0 ? (
                    <div className="text-[10px] text-slate-500 italic">No followers assigned.</div>
                  ) : (
                    <div className="space-y-2">
                      {minister.followers.map((follower) => (
                        <div key={follower.id} className="bg-[#0F223D] p-2 rounded border border-slate-700 text-[10px]">
                          <div className="flex justify-between items-center mb-1">
                            <input
                              type="text"
                              value={follower.name}
                              onChange={(e) => updateFollowerName(ministerKey, follower.id, e.target.value)}
                              className="bg-[#0B192C] border border-slate-600 text-white font-bold px-1.5 py-0.5 rounded w-36 text-[10px]"
                            />
                            <button
                              onClick={() => removeFollowerFromMinister(ministerKey, follower.id)}
                              className="text-rose-400 hover:text-rose-200 font-bold px-1"
                              title="Delete Follower"
                            >
                              ✕
                            </button>
                          </div>

                          <div className="pl-2 border-l border-cyan-500/40 space-y-1 mt-1">
                            <div className="flex justify-between items-center text-[9px] text-slate-400">
                              <span>Follower Effects:</span>
                              <button
                                onClick={() => addEffectToFollower(ministerKey, follower.id)}
                                className="text-cyan-300 hover:underline"
                              >
                                + Effect
                              </button>
                            </div>
                            {follower.effects.map((eff) => (
                              <div key={eff.id} className="flex items-center gap-1">
                                <span className="text-cyan-300">›</span>
                                <input
                                  type="text"
                                  value={eff.text}
                                  onChange={(e) => updateFollowerEffectText(ministerKey, follower.id, eff.id, e.target.value)}
                                  className="bg-[#0B192C] border border-slate-800 text-cyan-200 px-1 py-0.5 rounded flex-1 text-[9px]"
                                />
                                {follower.effects.length > 1 && (
                                  <button
                                    onClick={() => removeEffectFromFollower(ministerKey, follower.id, eff.id)}
                                    className="text-slate-500 hover:text-rose-400 text-[9px]"
                                  >
                                    ✕
                                  </button>
                                )}
                              </div>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        );
      };

      if (gameState === 'MAIN_MENU') {
        return (
          <div className="min-h-screen bg-[#0F223D] text-[#E2E8F0] flex flex-col items-center justify-center p-6 font-serif">
            <div className="border-4 border-[#E5C158] p-8 rounded-lg max-w-md w-full text-center bg-[#0B192C] shadow-2xl">
              <h1 className="text-3xl font-bold text-[#E5C158] mb-2 tracking-wide">PARLIAMENTARY ENGINE</h1>
              <p className="text-sm italic text-slate-400 mb-8">British Political Strategy Simulation · 1800s</p>
              <div className="space-y-4">
                <button
                  onClick={() => setGameState('YEAR_INPUT')}
                  className="w-full bg-[#E5C158] text-[#0F223D] font-bold py-3 px-6 rounded hover:bg-yellow-400 transition-colors cursor-pointer"
                >
                  NEW GAME
                </button>
                <button
                  onClick={handleLoadGame}
                  className="w-full border border-[#E5C158] text-[#E5C158] font-bold py-3 px-6 rounded hover:bg-[#E5C158] hover:text-[#0F223D] transition-colors cursor-pointer"
                >
                  LOAD GAME
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'YEAR_INPUT') {
        return (
          <div className="min-h-screen bg-[#0F223D] text-[#E2E8F0] flex flex-col items-center justify-center p-6 font-serif">
            <div className="border-2 border-[#E5C158] p-8 rounded-lg max-w-sm w-full bg-[#0B192C]">
              <h2 className="text-2xl font-bold text-[#E5C158] mb-4 text-center">Select Starting Year</h2>
              <input
                type="number"
                value={selectedYear}
                onChange={(e) => setSelectedYear(parseInt(e.target.value) || 1820)}
                className="w-full bg-[#0F223D] border border-[#E5C158] text-white p-3 rounded mb-6 text-center text-xl font-bold"
              />
              <button
                onClick={() => setGameState('TIMETABLE_BUILDER')}
                className="w-full bg-[#E5C158] text-[#0F223D] font-bold py-3 rounded hover:bg-yellow-400 transition-colors cursor-pointer"
              >
                PROCEED TO TIMETABLE
              </button>
            </div>
          </div>
        );
      }

      if (gameState === 'TIMETABLE_BUILDER') {
        const optionWindowTurns = [4, 5, 7, 8, 9, 10, 11, 12];
        const secondHalfTurns = Array.from({ length: 12 }, (_, i) => i + 13).filter(t => !RECESS_TURNS[t]);

        return (
          <div className="min-h-screen bg-[#0F223D] text-[#E2E8F0] p-6 font-serif max-w-6xl mx-auto">
            <button onClick={() => setGameState('MAIN_MENU')} className="text-xs text-slate-400 hover:text-white mb-4 block cursor-pointer">
              ← Return to Menu
            </button>
            <span className="text-xs uppercase tracking-widest text-[#E5C158]">PRE-SESSION · CLERK OF THE HOUSE</span>
            <h1 className="text-3xl font-bold text-white mb-2">Design the Timetable · {selectedYear}</h1>
            <p className="text-sm text-slate-300 mb-6">
              Before Parliament convenes, order the sitting bi-weekly turns of {selectedYear}. Recess turns are excluded from scheduling options.
            </p>

            {!isValid ? (
              <div className="bg-rose-950/80 border-2 border-rose-600 p-5 rounded-lg mb-8 shadow-xl">
                <div className="flex items-center gap-2 mb-2 text-rose-300 font-bold text-base">
                  <span>⚠️</span> Timetable Requirements & Rules Pending
                </div>
                <div className="space-y-2 text-sm text-rose-200">
                  {validationErrors.map((err, idx) => (
                    <div key={idx} className="flex items-start gap-2 bg-rose-900/40 p-2 rounded border border-rose-800/60">
                      <span className="font-bold">•</span>
                      <span>{err}</span>
                    </div>
                  ))}
                </div>
              </div>

              <div className="bg-emerald-950/80 border-2 border-emerald-500 p-4 rounded-lg mb-8 text-emerald-200 text-sm font-bold flex items-center gap-3">
                <span>✓</span> All timetable rules and requirements satisfied! You may begin the session below.

            <div className="border border-[#E5C158]/40 bg-[#0B192C] p-4 rounded mb-6">
              <h2 className="text-sm font-bold text-[#E5C158] mb-2 flex items-center gap-2">🔒 Fixed Orders & Recesses</h2>
              <div className="space-y-1.5 text-xs">
                <div><span className="bg-[#E5C158]/20 text-[#E5C158] px-2 py-0.5 rounded font-bold mr-2">TURN 1</span> Opening Address to Parliament & Session Convening.</div>
                <div><span className="bg-[#E5C158]/20 text-[#E5C158] px-2 py-0.5 rounded font-bold mr-2">TURNS 1, 2, 3, 4, 5, 7</span> Consolidated Funds (Gross Domestic Income Growth Assessment).</div>

                  className="w-full bg-[#0F223D] border border-slate-700 text-xs p-2 rounded text-white"
                >
                  <option value="">-- Choose Sitting Turn --</option>
                  {secondHalfTurns.map((t) => (
                    <option key={t} value={t}>Turn {t} ({MONTH_NAMES[t - 1]})</option>
                  ))}
                </select>
              </div>

              <div className="border border-slate-700 bg-[#0B192C] p-4 rounded">
                <h3 className="font-bold text-white text-sm mb-1">Admiralty Annual Report</h3>
                <p className="text-xs text-slate-400 mb-2">Sitting Turns 17–23</p>
                <select
                  value={admiraltyTurn || ''}
                  onChange={(e) => setAdmiraltyTurn(e.target.value ? parseInt(e.target.value) : null)}
                  className="w-full bg-[#0F223D] border border-slate-700 text-xs p-2 rounded text-white"
                >
                  <option value="">-- Choose Sitting Turn --</option>
                  {secondHalfTurns.map((t) => (
                    <option key={t} value={t}>Turn {t} ({MONTH_NAMES[t - 1]})</option>
                  ))}
                </select>
              </div>
            </div>

            <button
              disabled={!isValid}
              onClick={() => {
                setActiveTab('Cabinet');
                setGameState('DASHBOARD');
              }}
              className={`w-full py-3.5 rounded-lg font-bold text-base transition-colors mb-8 ${isValid ? 'bg-[#E5C158] text-[#0F223D] hover:bg-yellow-400 cursor-pointer shadow-lg' : 'bg-slate-800 text-slate-500 cursor-not-allowed'}`}
            >
              {isValid ? 'Confirm & Start Year' : 'Resolve every rule above before session may begin'}
            </button>
          </div>
        );
      }

      const tabs = [
        'Parliamentary Timetable', 'General Election', 'Parliament', 
        'Cabinet', "Lord Chancellor's Department", 
        'Exchequer', 'Foreign Office', 'Home Office', 'Admiralty', 'War Office'
      ];

      const isHomeOfficeScheduled = peaceTurns.includes(currentTurn);

      return (
        <div className="min-h-screen bg-[#0F223D] text-[#E2E8F0] font-serif flex flex-col relative">
          <header className="border-b border-[#E5C158] bg-[#0B192C] px-4 py-3 flex items-center gap-4">
            <div className="relative">
              <button 
                onClick={() => setIsMenuOpen(!isMenuOpen)}
                className="border border-[#E5C158] text-[#E5C158] p-1.5 rounded hover:bg-[#E5C158]/10 cursor-pointer"
              >
                ☰
              </button>

              {isMenuOpen && (
                <div className="absolute top-10 left-0 w-48 bg-[#0B192C] border border-[#E5C158] rounded shadow-2xl z-50 py-1 font-sans text-xs">
                  <button
                    onClick={handleSaveGame}
                    className="w-full text-left px-4 py-2 hover:bg-[#E5C158]/20 text-[#E2E8F0] flex items-center gap-2 cursor-pointer"
                  >
                    💾 Save Game
                  </button>
                  <button
                    onClick={() => {
                      setIsMenuOpen(false);
                      setGameState('MAIN_MENU');
                    }}
                    className="w-full text-left px-4 py-2 hover:bg-rose-900/50 text-rose-300 flex items-center gap-2 cursor-pointer border-t border-slate-800"
                  >
                    🚪 Exit to Menu
                  </button>
                </div>
              )}
            </div>

            <div className="text-sm font-bold text-[#E5C158] whitespace-nowrap">Year {selectedYear} · Turn {currentTurn} of 24</div>
            
            <nav className="flex gap-2 overflow-x-auto py-1">
              {tabs.map((tab) => (
                <button
                  key={tab}
                  onClick={() => setActiveTab(tab)}
                  className={`text-xs whitespace-nowrap px-3 py-1.5 rounded cursor-pointer ${activeTab === tab ? 'bg-[#E5C158] text-[#0F223D] font-bold' : 'text-slate-300 hover:text-white'}`}
                >
                  {tab}
                </button>
              ))}
            </nav>
          </header>

          <main className="flex-1 p-6 max-w-6xl mx-auto w-full">
            <div className="flex justify-between items-center mb-4">
              <h1 className="text-2xl font-bold text-[#E5C158]">{activeTab}</h1>
              <button onClick={handleNextTurn} className="bg-[#E5C158] text-[#0F223D] font-bold px-4 py-2 rounded text-xs hover:bg-yellow-400 cursor-pointer">
                Advance to Next Turn →
              </button>
            </div>

            {/* CABINET TAB WITH NO. 10 DOWNING STREET & PRIME MINISTER INTEGRATION */}
            {activeTab === 'Cabinet' && (
              <div className="space-y-8">
                {/* CABINET HIERARCHY PANEL: NO. 10 DOWNING STREET */}
                <div className="bg-[#0B192C] border-2 border-[#E5C158]/70 p-8 rounded-lg shadow-2xl relative overflow-hidden">
                  <div className="border-b border-[#E5C158]/40 pb-4 mb-8 text-center">
                    <h2 className="text-2xl font-bold text-[#E5C158] tracking-wider uppercase">🏛️ No. 10 Downing Street</h2>
                    <p className="text-xs text-slate-400 italic">His Majesty's Cabinet & Executive Officers of the Crown</p>
                  </div>

                  {/* MONARCH (TOP LEVEL) */}
                  <div className="flex justify-center mb-8">
                    {renderMinisterProfile('monarch')}
                  </div>

                  {/* PRIME MINISTER (HEAD OF GOVERNMENT - TOP/CENTER OF CABINET) */}
                  <div className="flex justify-center mb-10 pb-6 border-b border-slate-800/80">
                    {renderMinisterProfile('pm')}
                  </div>

                  {/* CABINET MINISTERS (ROW OF 6) */}
                  <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-6 justify-items-center">
                    {renderMinisterProfile('lordChancellor')}
                    {renderMinisterProfile('exchequer')}
                    {renderMinisterProfile('foreign')}
                    {renderMinisterProfile('home')}
                    {renderMinisterProfile('admiralty')}
                    {renderMinisterProfile('war')}
                  </div>
                </div>

                {/* EXECUTIVE & DELIBERATION NOTES PANELS */}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  {/* STRATEGIC DIRECTIVES */}
                  <div className="bg-[#0B192C] border border-[#E5C158]/60 p-6 rounded space-y-4 font-sans">
                    <div className="border-b border-[#E5C158]/40 pb-3 flex justify-between items-center">
                      <div>
                        <h2 className="text-base font-bold text-[#E5C158]">📜 Executive Priorities</h2>
                        <p className="text-xs text-slate-400">First Lord of the Treasury & Executive Office</p>
                      </div>
                      <span className="text-xs bg-[#E5C158]/20 text-[#E5C158] px-2.5 py-1 rounded font-mono font-bold">
                        {selectedYear}
                      </span>
                    </div>

                    <div className="space-y-4 text-xs">
                      <div>
                        <label className="block text-slate-300 font-bold mb-1">Prime Minister's Strategic Directives</label>
                        <textarea
                          rows={4}
                          value={cabinetForm.pmNotes}
                          onChange={(e) => setCabinetForm({ ...cabinetForm, pmNotes: e.target.value })}
                          className="w-full bg-[#0F223D] border border-slate-700 text-slate-200 p-2.5 rounded focus:border-[#E5C158] font-mono leading-relaxed resize-none"
                          placeholder="Enter executive priorities and party political notes..."
                        />
                      </div>

                      <div>
                        <label className="block text-slate-300 font-bold mb-1">Government Key Directives</label>
                        <textarea
                          rows={4}
                          value={cabinetForm.keyDirectives}
                          onChange={(e) => setCabinetForm({ ...cabinetForm, keyDirectives: e.target.value })}
                          className="w-full bg-[#0F223D] border border-slate-700 text-slate-200 p-2.5 rounded focus:border-[#E5C158] font-mono leading-relaxed resize-none"
                          placeholder="Enter strategic goals for the current session..."
                        />
                      </div>
                    </div>
                  </div>

                  {/* CABINET MINUTES */}
                  <div className="bg-[#0B192C] border border-[#E5C158]/60 p-6 rounded space-y-4 font-sans">
                    <div className="border-b border-[#E5C158]/40 pb-3 flex justify-between items-center">
                      <div>
                        <h2 className="text-base font-bold text-[#E5C158]">🏛️ Cabinet Deliberations</h2>
                        <p className="text-xs text-slate-400">Confidential Servants & Ministerial Deliberations</p>
                      </div>
                      <span className="text-xs bg-emerald-950 text-emerald-300 border border-emerald-800 px-2.5 py-1 rounded font-mono font-bold">
                        Turn {currentTurn}
                      </span>
                    </div>

                    <div className="space-y-4 text-xs">
                      <div>
                        <label className="block text-slate-300 font-bold mb-1">Session Agenda & Ministerial Business</label>
                        <textarea
                          rows={4}
                          value={cabinetForm.cabinetAgenda}
                          onChange={(e) => setCabinetForm({ ...cabinetForm, cabinetAgenda: e.target.value })}
                          className="w-full bg-[#0F223D] border border-slate-700 text-slate-200 p-2.5 rounded focus:border-[#E5C158] font-mono leading-relaxed resize-none"
                          placeholder="Detail items for Cabinet discussion..."
                        />
                      </div>

                      <div>
                        <label className="block text-slate-300 font-bold mb-1">Cabinet Minutes & Decisions</label>
                        <textarea
                          rows={4}
                          value={cabinetForm.cabinetMinutes}
                          onChange={(e) => setCabinetForm({ ...cabinetForm, cabinetMinutes: e.target.value })}
                          className="w-full bg-[#0F223D] border border-slate-700 text-slate-200 p-2.5 rounded focus:border-[#E5C158] font-mono leading-relaxed resize-none"
                          placeholder="Record Cabinet decisions and ministerial consensus..."
                        />
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* OTHER TABS (Parliament, Exchequer, Foreign, Home, etc.) */}
            {activeTab !== 'Cabinet' && (
              <div className="bg-[#0B192C] border border-[#E5C158]/40 p-8 rounded text-center">
                <p className="text-slate-300 font-sans text-sm">
                  Active view: <strong className="text-[#E5C158]">{activeTab}</strong>. You may switch between the top tabs or interact with Cabinet directives above. Reference image_1d5f91.png as specified.
                </p>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ParliamentaryEngine />);
  </script>
</body>
</html>
