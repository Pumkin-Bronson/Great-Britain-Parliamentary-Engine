    function toRoman(num) {
      const lookup = { M: 1000, CM: 900, D: 500, CD: 400, C: 100, XC: 90, L: 50, XL: 40, X: 10, IX: 9, V: 5, IV: 4, I: 1 };
      let roman = '';
      for (let i in lookup) {
        while (num >= lookup[i]) {
          roman += i;
          num -= lookup[i];
        }
      }
      return roman;
    }

      // Consolidated Funds Calculations

        if (score >= 10) return { label: 'Exceptional', color: 'text-emerald-400' };

          homeOfficeForm.publicOrder.wales +
          homeOfficeForm.publicOrder.scotland +

        sumRegion(homeOfficeForm.garrisons) + 
        sumRegion(homeOfficeForm.ministers) + 
        sumRegion(homeOfficeForm.buildings) + 
        sumRegion(homeOfficeForm.govType) + 
        sumRegion(homeOfficeForm.culture);

            setOppositionTurns(parsed.oppositionTurns || []);
            setWarOfficeTurn(parsed.warOfficeTurn || null);
            setAdmiraltyTurn(parsed.admiraltyTurn || null);
            setTurn3Rev(parsed.turn3Rev || 9154);
            setTurn8Rev(parsed.turn8Rev || 12500);

            if (parsed.homeOfficeForm) setHomeOfficeForm(parsed.homeOfficeForm);

      };

      const validateRules = () => {
        const errors = [];
        if (justiceTurns.length > 1) {
          const sorted = [...justiceTurns].sort((a, b) => a - b);
          for (let i = 0; i < sorted.length - 1; i++) {
            if (sorted[i + 1] - sorted[i] !== 8) {
              errors.push("Lord Chancellor reports must be exactly 8 turns apart.");
            }
          }
        }
        if (peaceTurns.length > 1) {
          const sorted = [...peaceTurns].sort((a, b) => a - b);
          for (let i = 0; i < sorted.length - 1; i++) {
            if (sorted[i + 1] - sorted[i] !== 4) {
              errors.push("Home Office reports must be exactly 4 turns apart.");
            }
          }
        }
        if (oppositionTurns.length !== 2) {
          errors.push("You must designate exactly 2 Opposition Days (Turns 4–12, sitting turns only).");
        }
        if (!warOfficeTurn) {
          errors.push("War Office Annual Report must be scheduled between Turn 13 and Turn 24 (sitting turns only).");

        if (!admiraltyTurn) {
          errors.push("Admiralty Annual Report must be scheduled between Turn 13 and Turn 24 (sitting turns only).");
        }
        return errors;

                                {actionConfig.coreTitle}
                              </div>
                              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs">
                                <div>
                                  <label className="block text-[10px] text-slate-400 mb-1">Target Sovereign State / Power</label>
                                  <input
                                    type="text"
                                    value={foreignOfficeForm.actionData[actionId]?.power || ''}
                                    onChange={(e) => handleActionDataChange(actionId, 'power', e.target.value)}
                                    placeholder="e.g. Kingdom of Prussia"
                                    className="w-full bg-[#0B192C] border border-slate-700 text-white p-1.5 rounded focus:border-[#E5C158]"
                                  />
                                </div>
                                {actionId === 'bribes' && (
                                  <div>
                                    <label className="block text-[10px] text-slate-400 mb-1">Grant Quantum (£ Specie)</label>
                                    <input
                                      type="number"
                                      value={foreignOfficeForm.actionData[actionId]?.sum || ''}
                                      onChange={(e) => handleActionDataChange(actionId, 'sum', e.target.value)}
                                      className="w-full bg-[#0B192C] border border-slate-700 text-white p-1.5 rounded focus:border-[#E5C158]"
                                    />
                                  </div>
                                )}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                )}

                {/* TAB 5: CABINET COUNCIL */}
                {activeTab === 'Cabinet Council' && (
                  <div className="space-y-6 font-mono">
                    {/* CABINET SUB-TAB NAV */}
                    <div className="flex space-x-3 border-b border-slate-800 pb-2">
                      {[
                        { id: 'NO_10_DOWNING_STREET', label: 'No. 10 Downing Street' },
                        { id: 'MINISTERIAL_PORTFOLIOS', label: 'Ministerial Portfolios' }
                      ].map((subTab) => (
                        <button
                          key={subTab.id}
                          onClick={() => setCabinetSubTab(subTab.id)}
                          className={`px-3 py-1.5 text-xs font-bold rounded transition-colors ${
                            cabinetSubTab === subTab.id
                              ? 'bg-[#E5C158] text-[#0F223D]'
                              : 'bg-[#0B192C] text-slate-300 hover:bg-slate-800'
                          }`}
                        >
                          {subTab.label}
                        </button>
                      ))}
                    </div>

                    {cabinetSubTab === 'NO_10_DOWNING_STREET' && (
                      <div className="p-6 bg-[#0B192C] border border-slate-700 rounded-lg space-y-6">
                        <div className="border-b border-slate-700 pb-3">
                          <h2 className="text-lg font-serif font-bold text-[#E5C158]">
                            No. 10 Downing Street // Cabinet Minute Ledger
                          </h2>
                          <p className="text-xs text-slate-400">
                            Prime Minister's confidential directives and collective Cabinet decisions.
                          </p>
                        </div>

                        <div className="space-y-4">
                          <div>
                            <label className="block text-xs font-bold text-slate-300 mb-1">Prime Minister's Memorandum</label>
                            <textarea
                              rows="3"
                              value={cabinetForm.pmNotes}
                              onChange={(e) => setCabinetForm({ ...cabinetForm, pmNotes: e.target.value })}
                              className="w-full bg-[#0F223D] border border-slate-700 text-white p-2 text-xs rounded focus:border-[#E5C158]"
                            ></textarea>
                          </div>
                          <div>
                            <label className="block text-xs font-bold text-slate-300 mb-1">Executive Key Directives</label>
                            <textarea
                              rows="3"
                              value={cabinetForm.keyDirectives}
                              onChange={(e) => setCabinetForm({ ...cabinetForm, keyDirectives: e.target.value })}
                              className="w-full bg-[#0F223D] border border-slate-700 text-white p-2 text-xs rounded focus:border-[#E5C158]"
                            ></textarea>
                          </div>
                        </div>
                      </div>
                    )}

                    {cabinetSubTab === 'MINISTERIAL_PORTFOLIOS' && (
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {Object.keys(cabinetMinisters).map((key) => {
                          const m = cabinetMinisters[key];
                          return (
                            <div key={key} className="p-4 bg-[#0B192C] border border-slate-700 rounded-lg space-y-4 shadow-lg">
                              <div className="flex space-x-4 items-center">
                                <img
                                  src={m.img}
                                  alt={m.name}
                                  className="w-16 h-20 object-cover rounded border border-[#E5C158]/50 shadow"
                                />
                                <div className="space-y-1">
                                  <div className="text-xs text-[#E5C158] font-bold uppercase">{m.role}</div>
                                  <input
                                    type="text"
                                    value={m.name}
                                    onChange={(e) => handleMinisterFieldChange(key, 'name', e.target.value)}
                                    className="bg-[#0F223D] border border-slate-700 text-white font-bold text-sm px-2 py-0.5 rounded w-full"
                                  />
                                  <div className="text-[11px] text-slate-400">
                                    Title: <input
                                      type="text"
                                      value={m.title}
                                      onChange={(e) => handleMinisterFieldChange(key, 'title', e.target.value)}
                                      className="bg-[#0F223D] border border-slate-700 text-slate-300 text-[11px] px-1 rounded inline-block w-32"
                                    />
                                  </div>
                                </div>
                              </div>

                              {/* TRAITS & FOLLOWERS TOGGLE */}
                              <div className="pt-2 border-t border-slate-800 space-y-2">
                                <div className="flex justify-between items-center">
                                  <span className="text-xs font-bold text-slate-300">Traits & Entourage</span>
                                  <button
                                    onClick={() => toggleMinisterTraitsOpen(key)}
                                    className="text-xs text-[#E5C158] underline"
                                  >
                                    {m.isTraitsOpen ? 'Hide' : 'Configure'}
                                  </button>
                                </div>

                                {m.isTraitsOpen && (
                                  <div className="space-y-3 pt-2">
                                    {/* Traits */}
                                    <div className="space-y-2">
                                      <div className="flex justify-between items-center">
                                        <span className="text-[10px] uppercase font-bold text-amber-400">Character Traits</span>
                                        <button onClick={() => addTraitToMinister(key)} className="text-[10px] bg-slate-800 px-1.5 py-0.5 rounded text-white">+ Trait</button>
                                      </div>
                                      {m.traits.map((t) => (
                                        <div key={t.id} className="p-2 bg-[#0F223D] border border-slate-800 rounded space-y-1">
                                          <div className="flex justify-between items-center">
                                            <input
                                              type="text"
                                              value={t.name}
                                              onChange={(e) => updateTraitName(key, t.id, e.target.value)}
                                              className="bg-transparent text-xs text-white font-bold w-full"
                                            />
                                            <button onClick={() => removeTraitFromMinister(key, t.id)} className="text-rose-400 text-xs font-bold px-1">✕</button>
                                          </div>
                                          {t.effects.map((eff) => (
                                            <div key={eff.id} className="text-[10px] text-slate-400 pl-2">
                                              • {eff.text}
                                            </div>
                                          ))}
                                        </div>
                                      ))}
                                    </div>
                                  </div>
                                )}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ParliamentaryEngine />);
  </script>
</body>
</html>
