<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1800s British Parliamentary Strategy Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#0F223D] text-[#E2E8F0]">
  <div id="root"></div>

  <script type="text/babel">
    const MONTH_NAMES = [
      'Jan (Early)', 'Jan (Late)', 'Feb (Early)', 'Feb (Late)', 'Mar (Early)', 'Mar (Late)', 
      'Apr (Early)', 'Apr (Late)', 'May (Early)', 'May (Late)', 'Jun (Early)', 'Jun (Late)',
      'Jul (Early)', 'Jul (Late)', 'Aug (Early)', 'Aug (Late)', 'Sep (Early)', 'Sep (Late)',
      'Oct (Early)', 'Oct (Late)', 'Nov (Early)', 'Nov (Late)', 'Dec (Early)', 'Dec (Late)'
    ];

    // Parliamentary Recesses mapped to 24 bi-weekly turns
    const RECESS_TURNS = {
      6: 'Easter Recess',               // Late March
      13: 'Summer Recess',              // Early July
      14: 'Summer Recess',              // Late July
      15: 'Summer Recess',              // Early August
      16: 'Summer Recess',              // Late August
      18: 'Conference Recess',          // Late September
      24: 'Christmas & New Year Recess' // Late December
    };

    function ParliamentaryEngine() {
      const [gameState, setGameState] = React.useState('TIMETABLE_BUILDER');
      const [selectedYear, setSelectedYear] = React.useState(1820);
      const [activeTab, setActiveTab] = React.useState('Exchequer');
      const [exchequerSubTab, setExchequerSubTab] = React.useState('GDI_ASSESSMENT');
      const [currentTurn, setCurrentTurn] = React.useState(1);
      const [isMenuOpen, setIsMenuOpen] = React.useState(false);

      const [justiceTurns, setJusticeTurns] = React.useState([]);
      const [peaceTurns, setPeaceTurns] = React.useState([]);
      const [oppositionTurns, setOppositionTurns] = React.useState([]);
      const [warOfficeTurn, setWarOfficeTurn] = React.useState(null);
      const [admiraltyTurn, setAdmiraltyTurn] = React.useState(null);

      const [turn3Rev, setTurn3Rev] = React.useState(9154);
      const [turn8Rev, setTurn8Rev] = React.useState(12500);
      const [growthRate, setGrowthRate] = React.useState(null);

      // Consolidated Funds Audit Form State
      const [cfForm, setCfForm] = React.useState({
        domTax: 0,
        bristol: 0,
        chatham: 0,
        liverpool: 0,
        waterford: 0,
        tradeIncome: 0,
        coreTreasury: 0,
        protectorates: 0,
        subsidies: 0,
        contributions: 0,
        reparations: 0,
        prizeGrants: 0,
        exactions: 0,
        landForces: 0,
        fleetMaint: 0,
        townWatch: 0,
        civilList: 0,
        pensions: 0,
        diplomatic: 0,
        initialLiquidity: 24500
      });

      const handleCfChange = (field, val) => {
        setCfForm((prev) => ({
          ...prev,
          [field]: parseFloat(val) || 0
        }));
      };

      // Calculations for Consolidated Funds Audit
      const totalCapacity = cfForm.bristol + cfForm.chatham + cfForm.liverpool + cfForm.waterford;
      const totalInflows = 
        cfForm.domTax + totalCapacity + cfForm.tradeIncome + cfForm.coreTreasury +
        cfForm.protectorates + cfForm.subsidies + cfForm.contributions +
        cfForm.reparations + cfForm.prizeGrants + cfForm.exactions;

      const totalOutflows = 
        cfForm.landForces + cfForm.fleetMaint + cfForm.townWatch +
        cfForm.civilList + cfForm.pensions + cfForm.diplomatic;

      const netYield = totalInflows - totalOutflows;
      const totalLiquidity = cfForm.initialLiquidity + netYield;

      // Save & Load Handlers
      const handleSaveGame = () => {
        const stateToSave = {
          selectedYear,
          currentTurn,
          activeTab,
          exchequerSubTab,
          justiceTurns,
          peaceTurns,
          oppositionTurns,
          warOfficeTurn,
          admiraltyTurn,
          turn3Rev,
          turn8Rev,
          growthRate,
          cfForm
        };
        localStorage.setItem('parliament_savegame', JSON.stringify(stateToSave));
        alert('Game saved successfully!');
        setIsMenuOpen(false);
      };

      const handleLoadGame = () => {
        const saved = localStorage.getItem('parliament_savegame');
        if (saved) {
          const parsed = JSON.parse(saved);
          setSelectedYear(parsed.selectedYear || 1820);
          setCurrentTurn(parsed.currentTurn || 1);
          setActiveTab(parsed.activeTab || 'Exchequer');
          setExchequerSubTab(parsed.exchequerSubTab || 'GDI_ASSESSMENT');
          setJusticeTurns(parsed.justiceTurns || []);
          setPeaceTurns(parsed.peaceTurns || []);
          setOppositionTurns(parsed.oppositionTurns || []);
          setWarOfficeTurn(parsed.warOfficeTurn || null);
          setAdmiraltyTurn(parsed.admiraltyTurn || null);
          setTurn3Rev(parsed.turn3Rev || 9154);
          setTurn8Rev(parsed.turn8Rev || 12500);
          setGrowthRate(parsed.growthRate || null);
          if (parsed.cfForm) setCfForm(parsed.cfForm);
          setGameState('DASHBOARD');
          setIsMenuOpen(false);
        } else {
          alert('No saved game found.');
        }
      };

      const validateRules = () => {
        const errors = [];
        if (justiceTurns.length > 1) {
          const sorted = [...justiceTurns].sort((a, b) => a - b);
          for (let i = 0; i < sorted.length - 1; i++) {
            if (sorted[i + 1] - sorted[i] !== 8) {
              errors.push("Lord Chancellor reports must be exactly 8 turns apart.");
            }
          }
        }
        if (peaceTurns.length > 1) {
          const sorted = [...peaceTurns].sort((a, b) => a - b);
          for (let i = 0; i < sorted.length - 1; i++) {
            if (sorted[i + 1] - sorted[i] !== 4) {
              errors.push("Home Office reports must be exactly 4 turns apart.");
            }
          }
        }
        if (oppositionTurns.length !== 2) {
          errors.push("You must designate exactly 2 Opposition Days (Turns 4–12, sitting turns only).");
        }
        if (!warOfficeTurn) {
          errors.push("War Office Annual Report must be scheduled between Turn 13 and Turn 24 (sitting turns only).");
        }
        if (!admiraltyTurn) {
          errors.push("Admiralty Annual Report must be scheduled between Turn 13 and Turn 24 (sitting turns only).");
        }
        return errors;
      };

      const validationErrors = validateRules();
      const isValid = validationErrors.length === 0;

      const toggleTurn = (turn, currentList, setList) => {
        if (RECESS_TURNS[turn]) return;
        if (currentList.includes(turn)) {
          setList(currentList.filter((t) => t !== turn));
        } else {
          setList([...currentList, turn]);
        }
      };

      const handleCalculateGrowth = () => {
        if (turn3Rev > 0 && turn8Rev > 0) {
          const g = Math.pow(turn8Rev / turn3Rev, 1 / 5) - 1;
          setGrowthRate(g);
        }
      };

      const handleNextTurn = () => {
        if (currentTurn < 24) {
          setCurrentTurn(currentTurn + 1);
        } else {
          setSelectedYear((prev) => prev + 1);
          setCurrentTurn(1);
          setGameState('TIMETABLE_BUILDER');
        }
      };

      const renderLucidTimeline = (turns, currentList, setList) => (
        <div className="relative pt-6 pb-2 my-2 overflow-x-auto">
          <div className="absolute top-3 left-0 right-0 h-[3px] bg-[#E5C158] shadow-[0_0_8px_rgba(229,193,88,0.4)] z-0" />
          <div className="flex justify-between min-w-[650px] relative z-10 px-2 gap-2">
            {turns.map((t) => {
              const isRecess = !!RECESS_TURNS[t];
              const isSelected = currentList.includes(t);
              const monthLabel = MONTH_NAMES[t - 1];

              return (
                <div key={t} className="flex flex-col items-center flex-1">
                  <div className={`w-[2px] h-3 mb-1 ${isSelected ? 'bg-[#E5C158]' : 'bg-[#E5C158]/60'}`}></div>
                  <button
                    disabled={isRecess}
                    onClick={() => toggleTurn(t, currentList, setList)}
                    className={`w-full py-2 px-1 rounded-md text-center border transition-all duration-150 shadow-md ${
                      isRecess
                        ? 'border-slate-800 bg-slate-900/80 text-slate-600 cursor-not-allowed opacity-50'
                        : isSelected
                        ? 'border-[#E5C158] bg-[#E5C158] text-[#0F223D] font-bold scale-105 shadow-yellow-500/20'
                        : 'border-slate-600 bg-[#0B192C] text-slate-200 hover:border-[#E5C158] hover:bg-[#0F223D] cursor-pointer'
                    }`}
                  >
                    <div className="text-[10px] uppercase tracking-wider opacity-80 leading-none mb-1">
                      {monthLabel}
                    </div>
                    <div className="text-xs font-bold leading-none">
                      Turn {t}
                    </div>
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      );

      const renderMasterTimeline = () => {
        const allTurns = Array.from({ length: 24 }, (_, i) => i + 1);

        return (
          <div className="relative pt-6 pb-4 my-2 overflow-x-auto">
            <div className="absolute top-3 left-0 right-0 h-[3px] bg-[#E5C158] shadow-[0_0_10px_rgba(229,193,88,0.5)] z-0" />
            <div className="flex justify-between min-w-[1500px] relative z-10 px-2 gap-2">
              {allTurns.map((t) => {
                const recessName = RECESS_TURNS[t];
                const monthLabel = MONTH_NAMES[t - 1];
                
                const isJustice = justiceTurns.includes(t);
                const isPeace = peaceTurns.includes(t);
                const isOpp = oppositionTurns.includes(t);
                const isWar = warOfficeTurn === t;
                const isAdm = admiraltyTurn === t;
                const isBudget = t === 8;

                const hasScheduledEvent = isJustice || isPeace || isOpp || isWar || isAdm || isBudget;

                return (
                  <div key={t} className="flex flex-col items-center flex-1 min-w-[55px]">
                    <div className={`w-[2px] h-3 mb-1 ${recessName ? 'bg-slate-700' : hasScheduledEvent ? 'bg-[#E5C158]' : 'bg-[#E5C158]/50'}`}></div>
                    <div className={`w-full p-1.5 rounded border text-center transition-all min-h-[72px] flex flex-col justify-between ${
                      recessName
                        ? 'border-slate-800 bg-slate-900/60 text-slate-500'
                        : hasScheduledEvent
                        ? 'border-[#E5C158] bg-[#0F223D] text-white shadow-lg'
                        : 'border-slate-700 bg-[#0B192C] text-slate-300'
                    }`}>
                      <div>
                        <div className="text-[9px] uppercase tracking-wider opacity-75 font-semibold">
                          {monthLabel}
                        </div>
                        <div className="text-xs font-bold text-[#E5C158]">
                          T{t}
                        </div>
                      </div>

                      <div className="mt-1 space-y-0.5 text-[8px] leading-tight">
                        {recessName && <span className="text-slate-500 italic block">Recess</span>}
                        {isBudget && <span className="bg-amber-500 text-black px-1 rounded block font-bold">Budget</span>}
                        {isJustice && <span className="bg-blue-600 text-white px-1 rounded block font-bold">Justice</span>}
                        {isPeace && <span className="bg-purple-600 text-white px-1 rounded block font-bold">Home</span>}
                        {isOpp && <span className="bg-rose-600 text-white px-1 rounded block font-bold">Opp</span>}
                        {isWar && <span className="bg-amber-600 text-white px-1 rounded block font-bold">War</span>}
                        {isAdm && <span className="bg-cyan-600 text-white px-1 rounded block font-bold">Admiralty</span>}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      const getTurnPrimaryLabel = (t) => {
        const gdiTurns = [1, 2, 3, 4, 5, 7];
        const cfTurns = [9, 10, 11, 12, 17, 19, 20, 21, 22, 23];

        if (t === 1) return "Opening Address | Consolidated Funds (Gross Domestic Income Growth Assessment)";
        if (gdiTurns.includes(t)) return "Consolidated Funds (Gross Domestic Income Growth Assessment)";
        if (t === 8) return "Financial Statement (Annual Budget)";
        if (cfTurns.includes(t)) return "Consolidated Funds";
        return "";
      };

      if (gameState === 'MAIN_MENU') {
        return (
          <div className="min-h-screen bg-[#0F223D] text-[#E2E8F0] flex flex-col items-center justify-center p-6 font-serif">
            <div className="border-4 border-[#E5C158] p-8 rounded-lg max-w-md w-full text-center bg-[#0B192C] shadow-2xl">
              <h1 className="text-3xl font-bold text-[#E5C158] mb-2 tracking-wide">PARLIAMENTARY ENGINE</h1>
              <p className="text-sm italic text-slate-400 mb-8">British Political Strategy Simulation · 1800s</p>
              <div className="space-y-4">
                <button
                  onClick={() => setGameState('YEAR_INPUT')}
                  className="w-full bg-[#E5C158] text-[#0F223D] font-bold py-3 px-6 rounded hover:bg-yellow-400 transition-colors cursor-pointer"
                >
                  NEW GAME
                </button>
                <button
                  onClick={handleLoadGame}
                  className="w-full border border-[#E5C158] text-[#E5C158] font-bold py-3 px-6 rounded hover:bg-[#E5C158] hover:text-[#0F223D] transition-colors cursor-pointer"
                >
                  LOAD GAME
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'YEAR_INPUT') {
        return (
          <div className="min-h-screen bg-[#0F223D] text-[#E2E8F0] flex flex-col items-center justify-center p-6 font-serif">
            <div className="border-2 border-[#E5C158] p-8 rounded-lg max-w-sm w-full bg-[#0B192C]">
              <h2 className="text-2xl font-bold text-[#E5C158] mb-4 text-center">Select Starting Year</h2>
              <input
                type="number"
                value={selectedYear}
                onChange={(e) => setSelectedYear(parseInt(e.target.value) || 1820)}
                className="w-full bg-[#0F223D] border border-[#E5C158] text-white p-3 rounded mb-6 text-center text-xl font-bold"
              />
              <button
                onClick={() => setGameState('TIMETABLE_BUILDER')}
                className="w-full bg-[#E5C158] text-[#0F223D] font-bold py-3 rounded hover:bg-yellow-400 transition-colors cursor-pointer"
              >
                PROCEED TO TIMETABLE
              </button>
            </div>
          </div>
        );
      }

      if (gameState === 'TIMETABLE_BUILDER') {
        const optionWindowTurns = [4, 5, 7, 8, 9, 10, 11, 12];
        const secondHalfTurns = Array.from({ length: 12 }, (_, i) => i + 13).filter(t => !RECESS_TURNS[t]);

        return (
          <div className="min-h-screen bg-[#0F223D] text-[#E2E8F0] p-6 font-serif max-w-6xl mx-auto">
            <button onClick={() => setGameState('MAIN_MENU')} className="text-xs text-slate-400 hover:text-white mb-4 block cursor-pointer">
              ← Return to Menu
            </button>
            <span className="text-xs uppercase tracking-widest text-[#E5C158]">PRE-SESSION · CLERK OF THE HOUSE</span>
            <h1 className="text-3xl font-bold text-white mb-2">Design the Timetable · {selectedYear}</h1>
            <p className="text-sm text-slate-300 mb-6">
              Before Parliament convenes, order the sitting bi-weekly turns of {selectedYear}. Recess turns are excluded from scheduling options.
            </p>

            {!isValid ? (
              <div className="bg-rose-950/80 border-2 border-rose-600 p-5 rounded-lg mb-8 shadow-xl">
                <div className="flex items-center gap-2 mb-2 text-rose-300 font-bold text-base">
                  <span>⚠️</span> Timetable Requirements & Rules Pending
                </div>
                <div className="space-y-2 text-sm text-rose-200">
                  {validationErrors.map((err, idx) => (
                    <div key={idx} className="flex items-start gap-2 bg-rose-900/40 p-2 rounded border border-rose-800/60">
                      <span className="font-bold">•</span>
                      <span>{err}</span>
                    </div>
                  ))}
                </div>
              </div>
            ) : (
              <div className="bg-emerald-950/80 border-2 border-emerald-500 p-4 rounded-lg mb-8 text-emerald-200 text-sm font-bold flex items-center gap-3">
                <span>✓</span> All timetable rules and requirements satisfied! You may begin the session below.
              </div>
            )}

            <div className="border-2 border-[#E5C158] bg-[#0B192C] p-5 rounded-lg mb-8 shadow-xl">
              <div className="flex justify-between items-center mb-1">
                <h2 className="text-sm font-bold text-[#E5C158] flex items-center gap-2">
                  🗺️ Master Parliamentary Session Timeline (Turns 1–24)
                </h2>
                <span className="text-xs text-slate-400">Scroll horizontally to view full session timeline</span>
              </div>
              {renderMasterTimeline()}
            </div>

            <div className="border border-[#E5C158]/40 bg-[#0B192C] p-4 rounded mb-6">
              <h2 className="text-sm font-bold text-[#E5C158] mb-2 flex items-center gap-2">🔒 Fixed Orders & Recesses</h2>
              <div className="space-y-1.5 text-xs">
                <div><span className="bg-[#E5C158]/20 text-[#E5C158] px-2 py-0.5 rounded font-bold mr-2">TURN 1</span> Opening Address to Parliament & Session Convening.</div>
                <div><span className="bg-[#E5C158]/20 text-[#E5C158] px-2 py-0.5 rounded font-bold mr-2">TURNS 1, 2, 3, 4, 5, 7</span> Consolidated Funds (Gross Domestic Income Growth Assessment).</div>
                <div><span className="bg-[#E5C158]/20 text-[#E5C158] px-2 py-0.5 rounded font-bold mr-2">TURN 8</span> Financial Statement — Annual Budget.</div>
                <div><span className="bg-[#E5C158]/20 text-[#E5C158] px-2 py-0.5 rounded font-bold mr-2">TURNS 9–12, 17, 19–23</span> Consolidated Funds.</div>
                <div><span className="bg-slate-700/60 text-slate-300 px-2 py-0.5 rounded font-bold mr-2">RECESSES</span> Easter (T6), Summer (T13–16), Conference (T18), Christmas (T24).</div>
              </div>
            </div>

            <div className="border border-slate-700 bg-[#0B192C] p-5 rounded-lg mb-6 shadow-md">
              <div className="flex justify-between items-center mb-1">
                <h3 className="font-bold text-white text-sm">Lord Chancellor's Report <span className="text-xs text-slate-400 font-normal">(Administration of Justice)</span></h3>
                <span className="text-xs px-2 py-0.5 rounded bg-slate-800 text-slate-400">Spacing: 8 turns</span>
              </div>
              {renderLucidTimeline(optionWindowTurns, justiceTurns, setJusticeTurns)}
            </div>

            <div className="border border-slate-700 bg-[#0B192C] p-5 rounded-lg mb-6 shadow-md">
              <div className="flex justify-between items-center mb-1">
                <h3 className="font-bold text-white text-sm">Home Office Report <span className="text-xs text-slate-400 font-normal">(State of Public Peace)</span></h3>
                <span className="text-xs px-2 py-0.5 rounded bg-slate-800 text-slate-400">Spacing: 4 turns</span>
              </div>
              {renderLucidTimeline(optionWindowTurns, peaceTurns, setPeaceTurns)}
            </div>

            <div className="border border-slate-700 bg-[#0B192C] p-5 rounded-lg mb-6 shadow-md">
              <div className="flex justify-between items-center mb-1">
                <h3 className="font-bold text-white text-sm">Opposition Days</h3>
                <span className={`text-xs px-2 py-0.5 rounded ${oppositionTurns.length === 2 ? 'bg-emerald-900 text-emerald-200' : 'bg-rose-900 text-rose-200'}`}>{oppositionTurns.length} of 2 set</span>
              </div>
              {renderLucidTimeline(optionWindowTurns, oppositionTurns, setOppositionTurns)}
            </div>
