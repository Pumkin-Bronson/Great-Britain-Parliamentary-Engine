<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1800s British Parliamentary Strategy Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#0F223D] text-[#E2E8F0]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const MONTH_NAMES = [
      'Jan', 'Jan', 'Feb', 'Feb', 'Mar', 'Mar',
      'Apr', 'Apr', 'May', 'May', 'Jun', 'Jun',
      'Jul', 'Jul', 'Aug', 'Aug', 'Sep', 'Sep',
      'Oct', 'Oct', 'Nov', 'Nov', 'Dec', 'Dec'
    ];

    function App() {
      const [view, setView] = useState('menu'); // 'menu', 'timetable-setup', 'gameplay'
      const [activeTab, setActiveTab] = useState('timetable');
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [currentTurn, setCurrentTurn] = useState(8);

      // Save Game Handler
      const handleSaveGame = () => {
        const gameState = { currentTurn, activeTab };
        localStorage.setItem('parliament_savegame', JSON.stringify(gameState));
        alert('Game saved successfully!');
        setIsMenuOpen(false);
      };

      // Load Game Handler
      const handleLoadGame = () => {
        const saved = localStorage.getItem('parliament_savegame');
        if (saved) {
          const gameState = JSON.parse(saved);
          setCurrentTurn(gameState.currentTurn || 8);
          setActiveTab(gameState.activeTab || 'timetable');
          setView('gameplay');
        } else {
          alert('No saved game found.');
        }
      };

      // Main Menu View
      if (view === 'menu') {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-[#0B1727] p-6 text-center">
            <h1 className="text-4xl font-bold tracking-wide text-[#F3C66B] mb-2 font-serif">
              1800s British Parliamentary Strategy Engine
            </h1>
            <p className="text-slate-400 mb-8 max-w-md">
              Manage the government, balance the budget, and navigate Victorian politics.
            </p>
            <div className="space-y-4 w-64">
              <button 
                onClick={() => setView('timetable-setup')}
                className="w-full py-3 bg-[#1E3A8A] hover:bg-[#2563EB] text-white font-semibold rounded-lg shadow-md transition"
              >
                New Game
              </button>
              <button 
                onClick={handleLoadGame}
                className="w-full py-3 bg-slate-800 hover:bg-slate-700 text-slate-200 font-semibold rounded-lg border border-slate-600 transition"
              >
                Load Game
              </button>
            </div>
          </div>
        );
      }

      // Timetable Setup View
      if (view === 'timetable-setup') {
        return (
          <div className="min-h-screen bg-[#0F223D] p-8 max-w-5xl mx-auto font-serif">
            <button 
              onClick={() => setView('menu')}
              className="text-slate-400 hover:text-white text-sm mb-6 inline-block"
            >
              ← Return to Menu
            </button>
            
            <header className="mb-6">
              <span className="text-xs uppercase tracking-widest text-[#F3C66B]">Pre-Session · Clerk of the House</span>
              <h1 className="text-3xl font-bold text-white mt-1">Design the Timetable · 1820</h1>
              <p className="text-sm text-slate-300 mt-2">
                Before Parliament convenes, order the twenty-four bi-weekly turns of 1820. The Estimates and Budget are fixed by custom; you must place the compulsory reports and Opposition Days within their designated windows.
              </p>
            </header>

            <div className="bg-[#162C4E] border border-slate-700 rounded-lg p-6 mb-6">
              <h2 className="text-[#F3C66B] font-semibold flex items-center gap-2 mb-2">
                🔒 Fixed by Standing Order
              </h2>
              <div className="text-sm text-slate-300 space-y-1">
                <p><strong className="text-white">TURNS 1–7:</strong> Consolidated Funds — with the Gross Income Growth Assessment.</p>
                <p><strong className="text-white">TURN 8:</strong> Financial Statement and Budget Speech.</p>
              </div>
            </div>

            <div className="flex justify-end">
              <button 
                onClick={() => setView('gameplay')}
                className="px-6 py-2 bg-[#F3C66B] hover:bg-[#e0b253] text-[#0F223D] font-bold rounded shadow transition font-sans"
              >
                Confirm Timetable & Begin Session →
              </button>
