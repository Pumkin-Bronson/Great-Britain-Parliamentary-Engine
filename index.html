<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1800s British Parliamentary Strategy Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#0F223D] text-[#E2E8F0] antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const MONTH_NAMES = [
      'Jan (Early)', 'Jan (Late)', 'Feb (Early)', 'Feb (Late)', 'Mar (Early)', 'Mar (Late)', 
      'Apr (Early)', 'Apr (Late)', 'May (Early)', 'May (Late)', 'Jun (Early)', 'Jun (Late)',
      'Jul (Early)', 'Jul (Late)', 'Aug (Early)', 'Aug (Late)', 'Sep (Early)', 'Sep (Late)',
      'Oct (Early)', 'Oct (Late)', 'Nov (Early)', 'Nov (Late)', 'Dec (Early)', 'Dec (Late)'
    ];

    const RECESS_TURNS = {
      6: 'Easter Recess',               
      13: 'Whitsun Recess',
      17: 'Summer Recess', 18: 'Summer Recess', 19: 'Summer Recess', 20: 'Summer Recess'
    };

    function ParliamentaryEngine() {
      const [activeTab, setActiveTab] = useState('Cabinet');
      const [currentTurn, setCurrentTurn] = useState(1);
      const budgetTurn = 5;
      const admiraltyTurn = 8;

      const tabs = ['Cabinet', 'Exchequer', 'Home Office', 'Foreign Office', 'Parliamentary Timetable'];

      return (
        <div className="min-h-screen flex flex-col font-sans">
          {/* Header */}
          <header className="bg-[#0B192C] border-b border-slate-800 px-6 py-4 flex items-center justify-between">
            <div className="flex items-center space-x-3">
              <div className="w-3 h-3 rounded-full bg-[#E5C158]"></div>
              <h1 className="text-lg font-serif text-[#E5C158] tracking-wide uppercase font-bold">
                1800s Parliamentary Strategy Engine
              </h1>
            </div>
            <div className="flex items-center space-x-4 text-xs text-slate-400">
              <span>Active Turn: <strong className="text-[#E5C158]">{MONTH_NAMES[currentTurn - 1]}</strong></span>
              <button 
                onClick={() => setCurrentTurn(prev => (prev < 24 ? prev + 1 : 1))}
                className="bg-[#1E3E62] hover:bg-[#2A5282] text-white px-3 py-1.5 rounded transition font-semibold"
              >
                Advance Turn →
              </button>
            </div>
          </header>

          {/* Navigation */}
          <nav className="bg-[#102A45] border-b border-slate-800 px-6 flex space-x-1 overflow-x-auto">
            {tabs.map(tab => (
              <button
                key={tab}
                onClick={() => setActiveTab(tab)}
                className={`px-4 py-3 text-xs font-semibold uppercase tracking-wider transition border-b-2 whitespace-nowrap ${
                  activeTab === tab
                    ? 'border-[#E5C158] text-[#E5C158] bg-[#0F223D]'
                    : 'border-transparent text-slate-400 hover:text-slate-200 hover:border-slate-700'
                }`}
              >
                {tab}
              </button>
            ))}
          </nav>

          {/* Main Dashboard Content */}
          <main className="flex-1 p-6 max-w-7xl mx-auto w-full">
            {activeTab === 'Cabinet' && (
              <div className="bg-[#0B192C] border border-slate-800 p-6 rounded shadow">
                <h2 className="text-md font-bold text-[#E5C158] uppercase tracking-wider mb-4">Cabinet Overview</h2>
                <p className="text-sm text-slate-300">
                  Manage core state policies, prime minister directives, and strategic administration.
                </p>
              </div>
            )}

            {activeTab === 'Exchequer' && (
              <div className="bg-[#0B192C] border border-slate-800 p-6 rounded shadow">
                <h2 className="text-md font-bold text-[#E5C158] uppercase tracking-wider mb-4">HM Treasury & Exchequer</h2>
                <p className="text-sm text-slate-300">
                  Fiscal policy, tax allocations, and national debt controls.
                </p>
              </div>
            )}

            {activeTab === 'Home Office' && (
              <div className="bg-[#0B192C] border border-slate-800 p-6 rounded shadow">
                <h2 className="text-md font-bold text-[#E5C158] uppercase tracking-wider mb-4">Home Department</h2>
                <p className="text-sm text-slate-300">
                  Domestic law, civil order, and judicial administration.
                </p>
              </div>
            )}

            {activeTab === 'Foreign Office' && (
              <div className="bg-[#0B192C] border border-slate-800 p-6 rounded shadow">
                <h2 className="text-md font-bold text-[#E5C158] uppercase tracking-wider mb-4">Foreign Department</h2>
                <p className="text-sm text-slate-300">
                  Diplomatic relations, treaties, and international intelligence.
                </p>
              </div>
            )}

            {activeTab === 'Parliamentary Timetable' && (
              <div className="bg-[#0B192C] border border-slate-800 p-6 rounded shadow">
                <h2 className="text-md font-bold text-[#E5C158] uppercase tracking-wider mb-4">Annual Parliamentary Timetable</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                  {MONTH_NAMES.map((month, index) => {
                    const t = index + 1;
                    const recessName = RECESS_TURNS[t];
                    return (
                      <div 
                        key={t}
                        className={`p-3 rounded border text-xs flex justify-between items-center ${
                          t === currentTurn 
                            ? 'bg-[#1E3E62] border-[#E5C158]' 
                            : 'bg-[#0F223D] border-slate-800'
                        }`}
                      >
                        <div>
                          <span className="font-bold text-slate-200">Turn {t}: {month}</span>
                          {recessName ? (
                            <span className="block text-[#E5C158] text-[10px] mt-0.5">{recessName}</span>
                          ) : (
                            <span className="block text-slate-400 text-[10px] mt-0.5">
                              {budgetTurn === t && <span className="text-amber-300">Budget Presentation</span>}
                              {admiraltyTurn === t && <span className="text-cyan-300">Admiralty Report</span>}
                              {budgetTurn !== t && admiraltyTurn !== t && <span>Regular Sitting</span>}
                            </span>
                          )}
                        </div>
                        <div>
                          {recessName ? (
                            <span className="text-slate-500 italic">No Sitting</span>
                          ) : t < currentTurn ? (
                            <span className="text-emerald-400 font-bold">✓ Completed</span>
                          ) : t === currentTurn ? (
                            <span className="text-[#E5C158] font-bold">● Active</span>
                          ) : (
                            <span className="text-slate-500">Upcoming</span>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ParliamentaryEngine />);
  </script>
</body>
</html>
