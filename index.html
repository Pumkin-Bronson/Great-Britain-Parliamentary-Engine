    function toRoman(num) {
      const lookup = { M: 1000, CM: 900, D: 500, CD: 400, C: 100, XC: 90, L: 50, XL: 40, X: 10, IX: 9, V: 5, IV: 4, I: 1 };
      let roman = '';
      for (let i in lookup) {
        while (num >= lookup[i]) {
          roman += i;
          num -= lookup[i];
        }
      }
      return roman;
    }

    function formatOrdinal(value) {
      const parsed = parseInt(value, 10);
      if (!Number.isFinite(parsed) || parsed < 1) return '';

      const remainder100 = parsed % 100;
      if (remainder100 >= 11 && remainder100 <= 13) {
        return `${parsed}th`;
      }

      const remainder10 = parsed % 10;
      if (remainder10 === 1) return `${parsed}st`;
      if (remainder10 === 2) return `${parsed}nd`;
      if (remainder10 === 3) return `${parsed}rd`;
      return `${parsed}th`;
    }

    // Local inline portrait data generator.
    // Portraits are rendered directly as React SVG and never depend on external image URLs.
    // A new portrait is generated only when the user confirms a changed minister name with Enter.
    function createNineteenthCenturyPortraitData(name, ministerKey, variationSeed = 'initial') {
      const safeName = String(name || 'Unnamed Minister').trim() || 'Unnamed Minister';
      const seedSource = `${ministerKey || 'minister'}:${safeName}:${variationSeed}`;
      let hash = 2166136261;

      for (let i = 0; i < seedSource.length; i += 1) {
        hash ^= seedSource.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }

      let randomState = hash >>> 0;
      const random = () => {
        randomState += 0x6D2B79F5;
        let value = randomState;
        value = Math.imul(value ^ (value >>> 15), value | 1);
        value ^= value + Math.imul(value ^ (value >>> 7), value | 61);
        return ((value ^ (value >>> 14)) >>> 0) / 4294967296;
      };
      const pick = (values) => values[Math.floor(random() * values.length)];

      const hairStyle = pick(['short', 'long', 'wig', 'bald']);
      const hairColourName = hairStyle === 'wig'
        ? 'white'
        : pick(['brown', 'black', 'white', 'grey', 'ginger', 'blonde']);

      const facialHairOptions = hairStyle === 'wig'
        ? ['none', 'sideburns', 'muttonChops']
        : ['none', 'moustache', 'sideburns', 'muttonChops'];

      const clothingType = pick(['threePiece', 'doubleBreasted']);
      const clothingColourName = clothingType === 'threePiece'
        ? pick(['brown', 'black', 'navy'])
        : pick(['brown', 'black', 'navy', 'charcoal']);

      return {
        safeName,
        hairStyle,
        hairColourName,
        facialHair: pick(facialHairOptions),
        clothingType,
        clothingColourName,
        skinTone: pick(['porcelain', 'fair', 'light', 'warmFair']),
        faceShape: pick(['narrow', 'average', 'broad']),
        eyeColour: pick(['blueGrey', 'brown', 'greenGrey']),
        gender: ministerKey === 'monarch' && isFemaleMonarchName(safeName) ? 'female' : 'male',
        seed: String(variationSeed)
      };
    }

      const removeEffectFromFollower = (key, followerId, effectId) => {
        setCabinetMinisters(prev => {
          const m = prev[key];
          const updated = m.followers.map(f => {
            if (f.id === followerId) {
              return { ...f, effects: f.effects.filter(e => e.id !== effectId) };
            }
            return f;
          });
          return { ...prev, [key]: { ...m, followers: updated } };
        });
      };

      const updateFollowerEffectText = (key, followerId, effectId, text) => {
        setCabinetMinisters(prev => {
          const m = prev[key];
          const updated = m.followers.map(f => {
            if (f.id === followerId) {
              const effs = f.effects.map(e => e.id === effectId ? { ...e, text } : e);
              return { ...f, effects: effs };
            }
            return f;
          });
          return { ...prev, [key]: { ...m, followers: updated } };

      };

      // Consolidated Funds Form State

        contributions: 500, reparations: 1000, prizeGrants: 300, exactions: 0,

        garrisons: { london: 4, wales: 2, scotland: 2, ireland: 6 },
        ministers: { london: 2, wales: 1, scotland: 1, ireland: 1 },
        buildings: { london: 3, wales: 1, scotland: 1, ireland: 0 },

        culture: { london: 5, wales: 2, scotland: 3, ireland: 1 },
        religiousUnrest: { london: 1, wales: 2, scotland: 2, ireland: 5 },

      // Foreign Office State

      const handleCfChange = (field, val) => {

        setHomeOfficeForm((prev) => {

          updated[index][field] = value;

        setHomeOfficeForm((prev) => ({

      const toggleDiplomaticAction = (actionId) => {
        setForeignOfficeForm((prev) => {
          const exists = prev.selectedActions.includes(actionId);

      const handleActionDataChange = (actionId, field, value) => {
        setForeignOfficeForm((prev) => ({
          ...prev,
          actionData: {

      const isExchequerSubTabUnlocked = (subTabKey) => {

        if (subTabKey === 'GDI_ASSESSMENT') return gdiTurns.includes(currentTurn);
        if (subTabKey === 'FINANCIAL_STATEMENT') return currentTurn === 8;
        if (subTabKey === 'CONSOLIDATED_FUNDS') return cfTurns.includes(currentTurn);
        return true;

      // Consolidated Funds Calculations
      const totalCapacity = (cfForm.bristol || 0) + (cfForm.chatham || 0) + (cfForm.liverpool || 0) + (cfForm.waterford || 0);
      const totalInflows = 
        (cfForm.domTax || 0) + (cfForm.tradeIncome || 0) + (cfForm.coreTreasury || 0) +
        (cfForm.protectorates || 0) + (cfForm.subsidies || 0) + (cfForm.contributions || 0) +
        (cfForm.reparations || 0) + (cfForm.prizeGrants || 0) + (cfForm.exactions || 0);

      const totalOutflows = 
        (cfForm.landForces || 0) + (cfForm.fleetMaint || 0) + (cfForm.townWatch || 0) +
        (cfForm.civilList || 0) + (cfForm.pensions || 0) + (cfForm.diplomatic || 0);

      const netYield = totalInflows - totalOutflows;
      const totalLiquidity = (cfForm.initialLiquidity || 0) + netYield;


      // Chancellor's Annual Financial Statement Calculations
      const handleFinancialStatementChange = (field, value) => {
        const parsed = parseFloat(value);
        setFinancialStatement(prev => ({ ...prev, [field]: Number.isNaN(parsed) ? 0 : parsed }));
      };

      const projectedAnnualRevenue = (() => {
        const opening = Number(gdiTurn1Inflow) || 0;
        const later = Number(gdiTurn7Inflow) || 0;
        const growthPerTurn = (later - opening) / 6;
        return Array.from({ length: 24 }, (_, index) => Math.max(0, opening + growthPerTurn * index))
          .reduce((sum, value) => sum + value, 0);
      })();

      const totalServiceEstimates =
        (financialStatement.armyEstimate || 0) + (financialStatement.navalEstimate || 0) +
        (financialStatement.homeEstimate || 0) + (financialStatement.foreignEstimate || 0) +
        (financialStatement.civilListEstimate || 0);

      const totalReserveFunds =
        (financialStatement.armyReserve || 0) + (financialStatement.navalReserve || 0) +
        (financialStatement.homeReserve || 0) + (financialStatement.foreignReserve || 0) +
        (financialStatement.civilListReserve || 0);

      const estimatedAnnualSurplus = projectedAnnualRevenue - totalServiceEstimates;
      const estimatedAnnualSurplusWithReserve = estimatedAnnualSurplus - totalReserveFunds;
      const predictedMaximumTreasuryBalance = estimatedAnnualSurplus + (financialStatement.lateAprilTreasuryBalance || 0);
      const predictedMinimumTreasuryBalance = estimatedAnnualSurplusWithReserve + (financialStatement.lateAprilTreasuryBalance || 0);

      // Home Office Calculations
      const getPublicOrderStatusLabel = (score) => {

        return { label: 'Risk', color: 'text-rose-500 font-bold' };

        if (score >= 6) return { label: 'Medium', color: 'text-amber-400' };
        if (score >= 1) return { label: 'Low', color: 'text-blue-400' };
        return { label: 'None', color: 'text-emerald-400' };

        if (score >= 5) return { label: 'High', color: 'text-rose-400 font-bold' };
        if (score >= 3) return { label: 'Medium', color: 'text-amber-400' };
        if (score >= 1) return { label: 'Low', color: 'text-blue-400' };
        return { label: 'None', color: 'text-emerald-400' };

        (homeOfficeForm.publicOrder.london +
          homeOfficeForm.publicOrder.wales +
          homeOfficeForm.publicOrder.scotland +
          homeOfficeForm.publicOrder.ireland) /

          selectedYear, currentTurn, activeTab, exchequerSubTab, cabinetSubTab, chancerySubTab,
          peaceTurns, oppositionTurns, warOfficeTurn, admiraltyTurn,
          turn3Rev, turn8Rev, growthRate, gdiTurn1Inflow, gdiTurn7Inflow, financialStatement, cfForm, homeOfficeForm, foreignOfficeForm, cabinetForm, cabinetMinisters,
          admiraltySubTab, navyRates, fleetDisposition, maritimeExpenditure,
          warOfficeSubTab, armyListCategories, territorialOrganisation, armyExpenditure,
          greatSealDraft, nationalArchive
        };
        localStorage.setItem('parliament_savegame', JSON.stringify(stateToSave));
        alert('Game saved successfully!');
        setIsMenuOpen(false);
      };

      const handleLoadGame = () => {
        const saved = localStorage.getItem('parliament_savegame');
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            setSelectedYear(parsed.selectedYear || 1820);
            setCurrentTurn(parsed.currentTurn || 1);
            setActiveTab(parsed.activeTab || 'Parliamentary Timetable');
            setExchequerSubTab(parsed.exchequerSubTab || 'CONSOLIDATED_FUNDS');
            setCabinetSubTab(parsed.cabinetSubTab || 'NO_10_DOWNING_STREET');
            setChancerySubTab(parsed.chancerySubTab || 'GREAT_SEAL_REGISTER');
            setPeaceTurns(parsed.peaceTurns || []);
            setOppositionTurns(parsed.oppositionTurns || []);
            setWarOfficeTurn(parsed.warOfficeTurn || null);
            setAdmiraltyTurn(parsed.admiraltyTurn || null);
            setTurn3Rev(parsed.turn3Rev || 9154);
            setTurn8Rev(parsed.turn8Rev || 12500);
            setGrowthRate(parsed.growthRate || null);
            if (parsed.gdiTurn1Inflow !== undefined) setGdiTurn1Inflow(parsed.gdiTurn1Inflow);
            if (parsed.gdiTurn7Inflow !== undefined) setGdiTurn7Inflow(parsed.gdiTurn7Inflow);
            if (parsed.financialStatement) setFinancialStatement(parsed.financialStatement);
            if (parsed.cfForm) setCfForm(parsed.cfForm);
            if (parsed.homeOfficeForm) setHomeOfficeForm(parsed.homeOfficeForm);
            if (parsed.foreignOfficeForm) setForeignOfficeForm(parsed.foreignOfficeForm);
            if (parsed.cabinetForm) setCabinetForm(parsed.cabinetForm);
            if (parsed.cabinetMinisters) setCabinetMinisters(parsed.cabinetMinisters);
            if (parsed.admiraltySubTab) setAdmiraltySubTab(parsed.admiraltySubTab);
            if (parsed.navyRates) setNavyRates(parsed.navyRates);
            if (parsed.fleetDisposition) setFleetDisposition(parsed.fleetDisposition);
            if (parsed.maritimeExpenditure) setMaritimeExpenditure(parsed.maritimeExpenditure);
            if (parsed.warOfficeSubTab) setWarOfficeSubTab(parsed.warOfficeSubTab);
            if (parsed.armyListCategories) setArmyListCategories(parsed.armyListCategories);
            if (parsed.territorialOrganisation) setTerritorialOrganisation(parsed.territorialOrganisation);
            if (parsed.armyExpenditure) setArmyExpenditure(parsed.armyExpenditure);
            if (parsed.greatSealDraft) setGreatSealDraft(parsed.greatSealDraft);
            if (parsed.nationalArchive) setNationalArchive(parsed.nationalArchive);
            setGameState('DASHBOARD');
            setIsMenuOpen(false);
          } catch (e) {
            alert('Failed to parse save game data.');
          }
        } else {
          alert('No saved game found.');
        }
      };

      const validateRules = () => {
        const errors = [];
        if (peaceTurns.length > 1) {
          const sorted = [...peaceTurns].sort((a, b) => a - b);
          for (let i = 0; i < sorted.length - 1; i++) {
            if (sorted[i + 1] - sorted[i] !== 4) {
              errors.push("Home Office reports must be exactly 4 turns apart.");
            }
          }
        }
        if (oppositionTurns.length !== 2) {
          errors.push("You must designate exactly 2 Opposition Days (Turns 4–12, sitting turns only).");
        }
        if (!warOfficeTurn) {
          errors.push("War Office Annual Report must be scheduled between Turn 13 and Turn 24 (sitting turns only).");
        }
        if (!admiraltyTurn) {
          errors.push("Admiralty Annual Report must be scheduled between Turn 13 and Turn 24 (sitting turns only).");
        }
        return errors;
      };

      const validationErrors = validateRules();
      const isValid = validationErrors.length === 0;

      const toggleTurn = (turn, currentList, setList) => {
        if (RECESS_TURNS[turn]) return;
        if (currentList.includes(turn)) {
          setList(currentList.filter((t) => t !== turn));
        } else {
          setList([...currentList, turn]);
        }
      };

      const handleNextTurn = () => {
        if (currentTurn < 24) {
          setCurrentTurn(currentTurn + 1);
        } else {
          setSelectedYear((prev) => prev + 1);
          setCurrentTurn(1);
          setGameState('TIMETABLE_BUILDER');
        }
      };

      const renderLucidTimeline = (turns, currentList, setList) => (
        <div className="relative pt-6 pb-2 my-2 overflow-x-auto">

            {turns.map((t) => {

                <div key={t} className="flex flex-col items-center flex-1 relative z-10">

                        : 'border-slate-600 bg-[#0B192C] text-slate-200 hover:border-[#E5C158] hover:bg-[#0F223D] cursor-pointer'

              <div className="flex justify-between relative z-10 gap-2">
                {allTurns.map((t) => {
                  const recessName = RECESS_TURNS[t];
                  const monthLabel = MONTH_NAMES[t - 1];
                  
                  const isPeace = peaceTurns.includes(t);
                  const isOpp = oppositionTurns.includes(t);

            >

            </button>

              <div className="mt-3 w-64 bg-[#0B192C] border-2 border-[#E5C158] p-3 rounded-lg shadow-2xl text-left space-y-3 z-30 font-sans">
                <div className="border-b border-slate-700 pb-2">

                    <div>
                      <label className="block text-slate-300 font-semibold mb-0.5">Management Skills :</label>
                      <input
                        type="text"
                        value={minister.managementSkills || ''}
                        onChange={(e) => {
                          const val = e.target.value;
                          if (/^\**$/.test(val)) {
                            handleMinisterFieldChange(ministerKey, 'managementSkills', val);
                          }
                        }}
                        className="bg-[#0F223D] border border-slate-700 text-[#E5C158] font-bold px-2 py-1 rounded w-full text-[10px] focus:outline-none focus:border-[#E5C158]"
                        placeholder='Input with "*"'
                      />
                    </div>
                    <div>
                      <label className="block text-slate-300 font-semibold mb-0.5">Age :</label>
                      <input
                        type="text"
                        value={minister.age || ''}
                        onChange={(e) => handleMinisterFieldChange(ministerKey, 'age', e.target.value)}
                        className="bg-[#0F223D] border border-slate-700 text-white font-bold px-2 py-1 rounded w-full text-[10px] focus:outline-none focus:border-[#E5C158]"

                <div className="border-b border-slate-700 pb-2">

                            {territorialOrganisation[nation].length === 0 && <div className="text-slate-500 italic border border-slate-800 rounded p-3">No region selected.</div>}
                            {territorialOrganisation[nation].map(region => (
                              <div key={region.id} className="bg-[#0F223D] border border-slate-700 rounded p-4 space-y-4">
                                <div className="flex items-center gap-2">
                                  <div className="text-[#E5C158] font-bold text-base flex-1">🏛️ {region.name}</div>
                                  <button onClick={() => removeTerritorialRegion(nation, region.id)} className="text-rose-400 hover:text-rose-200 font-bold">×</button>
                                </div>
                                {region.enabledBranches.length < 3 && (
                                  <select defaultValue="" onChange={(e) => { addTerritorialBranch(nation, region.id, e.target.value); e.currentTarget.value = ''; }} className="w-full bg-[#0B192C] border border-slate-600 text-slate-200 px-2 py-2 rounded">
                                    <option value="" disabled>+ Add Force Branch</option>
                                    {!region.enabledBranches.includes('infantry') && <option value="infantry">💂 Infantry</option>}
                                    {!region.enabledBranches.includes('cavalry') && <option value="cavalry">🐴 Cavalry</option>}
                                    {!region.enabledBranches.includes('artillery') && <option value="artillery">💣 Artillery</option>}
                                  </select>
                                )}
                                {region.enabledBranches.map(branch => {
                                  const branchLabel = branch === 'infantry' ? '💂 Infantry' : branch === 'cavalry' ? '🐴 Cavalry' : '💣 Artillery';
                                  const assignedUnits = region.units[branch].map(unitId => armyUnitOptions.find(option => option.id === unitId)).filter(Boolean);
                                  const availableUnits = armyUnitOptions.filter(option => option.branch === branch && !assignedTerritorialArmyUnitIds.has(option.id));
                                  return (
                                    <div key={branch} className="border-l-2 border-[#E5C158]/50 pl-3 space-y-2">
                                      <div className="flex items-center gap-2"><div className="text-[#E5C158] font-bold flex-1">{branchLabel}</div><button onClick={() => removeTerritorialBranch(nation, region.id, branch)} className="text-rose-400 hover:text-rose-200 font-bold">×</button></div>
                                      {assignedUnits.map(unit => <div key={unit.id} className="flex items-center gap-2 bg-[#0B192C] border border-slate-700 rounded px-2 py-2"><span className="text-slate-200 flex-1">{unit.displayName}</span><button onClick={() => removeTerritorialUnit(nation, region.id, branch, unit.id)} className="text-rose-400 hover:text-rose-200 font-bold">×</button></div>)}
                                      <select defaultValue="" disabled={availableUnits.length === 0} onChange={(e) => { addTerritorialUnit(nation, region.id, branch, e.target.value); e.currentTarget.value = ''; }} className="w-full bg-[#0B192C] border border-[#E5C158] text-slate-200 px-2 py-2 rounded disabled:opacity-50">
                                        <option value="" disabled>{availableUnits.length > 0 ? `-- Select unit from Army List --` : `-- No available ${branch} units --`}</option>
                                        {availableUnits.map(unit => <option key={unit.id} value={unit.id}>{unit.displayName} — {unit.categoryLabel.replace(/^[^\s]+\s/, '')}</option>)}
                                      </select>
                                    </div>
                                  );
                                })}
                              </div>
                            ))}
                          </div>
                        );
                      })}
                    </div>
                    <div className="text-center space-y-1 pt-4"><div className="text-slate-400">========================================================================================</div><div className="text-slate-200 text-base tracking-wide">DOCUMENT CERTIFIED &amp; SEALED BY THE GREAT SEAL OF GREAT BRITAIN</div><div className="text-slate-400">========================================================================================</div></div>
                  </div>
                )}

                {warOfficeSubTab === 'ARMY_EXPENDITURE' && (
                  <div className="bg-[#0B192C] border border-[#E5C158]/60 p-6 rounded space-y-6 font-mono text-xs">
                    <div className="text-center space-y-1">
                      <div className="text-slate-400">========================================================================================</div>
                      <div className="text-[#E5C158] font-bold tracking-wider text-xl">🇬🇧 War Office : Army Expenditure</div>
                      <div className="text-slate-400">========================================================================================</div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {[
                        ['infantryPayAndAllowances', 'Infantry Pay & Allowances'],
                        ['cavalryPayAndRemounts', 'Cavalry Pay & Remounts'],
                        ['artilleryAndOrdnance', 'Artillery & Ordnance'],
                        ['recruitmentAndBounties', 'Recruitment & Bounties'],
                        ['uniformsAndEquipment', 'Uniforms & Equipment'],
                        ['barracksAndGarrisons', 'Barracks & Garrisons'],
                        ['transportAndCommissariat', 'Transport & Commissariat'],
                        ['pensionsAndHalfPay', 'Pensions & Half Pay'],
                        ['extraordinaryOperations', 'Extraordinary Operations']
                      ].map(([field, label]) => (
                        <div key={field} className="grid grid-cols-2 gap-2 items-center">
                          <label className="text-slate-300">{label} :</label>
                          <input
                            type="number"
                            min="0"
                            value={armyExpenditure[field]}
                            onChange={(e) => handleArmyExpenditureChange(field, e.target.value)}
                            className="bg-[#0F223D] border border-slate-700 text-emerald-400 font-bold p-2 rounded w-full"
                          />
                        </div>
                      ))}
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-2 items-center border-t border-[#E5C158]/40 pt-4 text-base font-bold">
                      <span className="text-[#E5C158]">TOTAL ARMY EXPENDITURE :</span>
                      <span className="text-emerald-400 bg-[#0F223D] border border-[#E5C158] p-2 rounded">
                        £{armyExpenditureTotal.toLocaleString()}
                      </span>
                    </div>

                    <div>
                      <label className="text-slate-300 block mb-2">Secretary at War's Notes &amp; Army Estimate Remarks :</label>
                      <textarea
                        value={armyExpenditure.notes}
                        onChange={(e) => handleArmyExpenditureChange('notes', e.target.value)}
                        rows="6"
                        className="w-full bg-[#0F223D] border border-slate-700 text-white p-3 rounded resize-y"
                        placeholder="Enter army expenditure notes..."
                      />
                    </div>

                    <div className="text-center space-y-1 pt-4">
                      <div className="text-slate-400">========================================================================================</div>
                      <div className="text-slate-200 text-base tracking-wide">DOCUMENT CERTIFIED &amp; SEALED BY THE GREAT SEAL OF GREAT BRITAIN</div>
                      <div className="text-slate-400">========================================================================================</div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* CHANCERY OFFICE TAB */}
            {activeTab === "Chancery Office" && (
              <div className="space-y-4">
                <div className="flex flex-wrap gap-2 bg-[#0B192C] border-b border-[#E5C158]/50 p-2">
                  <button
                    onClick={() => setChancerySubTab('GREAT_SEAL_REGISTER')}
                    className={`px-4 py-2 rounded font-bold transition-colors ${
                      chancerySubTab === 'GREAT_SEAL_REGISTER'
                        ? 'bg-[#E5C158] text-[#0F223D]'
                        : 'text-slate-200 hover:text-[#E5C158]'
                    }`}
                  >
                    ⚖️ Chancery Office : Great Seal Register
                  </button>
                  <button
                    onClick={() => setChancerySubTab('NATIONAL_ARCHIVE')}
                    className={`px-4 py-2 rounded font-bold transition-colors ${
                      chancerySubTab === 'NATIONAL_ARCHIVE'
                        ? 'bg-[#E5C158] text-[#0F223D]'
                        : 'text-slate-200 hover:text-[#E5C158]'
                    }`}
                  >
                    National Archive
                  </button>
                </div>

                {chancerySubTab === 'GREAT_SEAL_REGISTER' && (
                  <div className="bg-[#0B192C] border border-[#E5C158]/60 p-6 rounded space-y-8 font-mono text-xs">
                    <div className="text-center space-y-1">
                      <div className="text-slate-400">========================================================================================</div>
                      <div className="text-[#E5C158] font-bold tracking-wider text-xl">⚖️ Chancery Office : Great Seal Register</div>
                      <div className="text-slate-400">========================================================================================</div>
                    </div>

                    <div className="max-w-3xl mx-auto space-y-5">
                      <div>
                        <label className="block text-[#E5C158] font-bold mb-2">Instrument Type</label>
                        <select
                          value={greatSealDraft.instrumentType}
                          onChange={(e) => handleGreatSealDraftChange('instrumentType', e.target.value)}
                          className="w-full bg-[#0F223D] border border-slate-600 text-white p-3 rounded"
                        >
                          <option>Act of Parliament</option>
                          <option>Convention or Treaty</option>
                          <option>Mobilisation Order</option>
                          <option>Royal Warrant</option>
                          <option>Order in Council</option>
                          <option>Letters Patent</option>
                          <option>Other Instrument of State</option>
                        </select>
                      </div>

                      <div>
                        <label className="block text-[#E5C158] font-bold mb-2">Act / Convention / Mobilisation / Instrument Title</label>
                        <input
                          type="text"
                          value={greatSealDraft.title}
                          onChange={(e) => handleGreatSealDraftChange('title', e.target.value)}
                          className="w-full bg-[#0F223D] border border-slate-600 text-white p-3 rounded text-lg font-bold"
                          placeholder="XXXX Act / Convention / Mobilisation etc."
                        />
                      </div>

                      <div>
                        <label className="block text-[#E5C158] font-bold mb-2 text-center text-lg">Context</label>
                        <textarea
                          value={greatSealDraft.context}
                          onChange={(e) => handleGreatSealDraftChange('context', e.target.value)}
                          rows="8"
                          className="w-full bg-[#0F223D] border border-slate-600 text-white p-4 rounded resize-y"
                          placeholder="Record the context, authority, parliamentary passage, treaty terms, mobilisation purpose or other relevant details."
                        />
                      </div>

                      <button
                        onClick={stampGreatSealInstrument}
                        className="w-full min-h-[270px] border-[6px] border-dashed border-[#E5C158] rounded-2xl text-[#E5C158] bg-[#0F223D] hover:bg-[#E5C158]/10 transition-colors flex items-center justify-center cursor-pointer"
                        title="Apply the Great Seal and send this instrument to the National Archive"
                      >
                        <span className="text-5xl md:text-6xl font-bold -rotate-12">The Great Seal of Great Britain</span>
                      </button>

                      <div className="text-center text-slate-400 italic">
                        Stamp action records the instrument for Year {selectedYear}, Turn {currentTurn} and transfers it to the National Archive.
                      </div>
                    </div>
                  </div>
                )}

                {chancerySubTab === 'NATIONAL_ARCHIVE' && (
                  <div className="bg-[#0B192C] border border-[#E5C158]/60 p-6 rounded space-y-6 font-mono text-xs">
                    <div className="text-center space-y-1">
                      <div className="text-slate-400">========================================================================================</div>
                      <div className="text-[#E5C158] font-bold tracking-wider text-xl">⚖️ Chancery Office : National Archive</div>
                      <div className="text-slate-400">========================================================================================</div>
                    </div>

                    {nationalArchive.length === 0 ? (
                      <div className="bg-[#0F223D] border border-slate-700 rounded p-8 text-center text-slate-400 italic">
                        No instrument has yet been certified under The Great Seal.
                      </div>
                    ) : (
                      <div className="space-y-4">
                        {nationalArchive.map(record => (
                          <div key={record.id} className="bg-[#0F223D] border border-[#E5C158]/50 rounded p-5 space-y-3">
                            <div className="flex flex-col md:flex-row md:items-start gap-3">
                              <div className="flex-1">
                                <div className="text-[#E5C158] font-bold text-lg">{record.title}</div>
                                <div className="text-slate-300 mt-1">{record.instrumentType}</div>
                                <div className="text-slate-400 mt-1">
                                  {record.period} {record.year} · Turn {record.turn}
                                </div>
                              </div>
                              <div className="flex items-center gap-3">
                                <span className="border-2 border-dashed border-[#E5C158] text-[#E5C158] px-4 py-2 rounded font-bold -rotate-3">
                                  The Great Seal of Great Britain
                                </span>
                                <button
                                  onClick={() => removeNationalArchiveRecord(record.id)}
                                  className="text-rose-400 hover:text-rose-200 font-bold"
                                  title="Remove archive record"
                                >
                                  ×
                                </button>
                              </div>
                            </div>
                            {record.context && (
                              <div className="border-t border-slate-700 pt-3 whitespace-pre-wrap text-slate-200 leading-relaxed">
                                {record.context}
                              </div>
                            )}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            {/* GENERAL ELECTION TAB */}
            {activeTab === 'General Election' && (
              <div className="bg-[#0B192C] border border-[#E5C158]/60 p-6 rounded space-y-6 font-mono text-xs">
                <div className="text-center space-y-1">
                  <div className="text-slate-400">========================================================================================</div>
                  <div className="text-white font-bold tracking-wider text-sm">PARLIAMENT // GENERAL ELECTION & WRITS OF ELECTION</div>
                  <div className="text-slate-400">========================================================================================</div>
                </div>
                <div className="bg-[#0F223D] p-5 rounded border border-slate-700 text-center text-slate-400 italic">
                  Election status and borough franchise tracking.
                </div>
              </div>
            )}

            {/* PARLIAMENT TAB */}
            {activeTab === 'Parliament' && (
              <div className="bg-[#0B192C] border border-[#E5C158]/60 p-6 rounded space-y-6 font-mono text-xs">
                <div className="text-center space-y-1">
                  <div className="text-slate-400">========================================================================================</div>
                  <div className="text-white font-bold tracking-wider text-sm">PALACE OF WESTMINSTER // HOUSE OF COMMONS & LORDS DEBATES</div>
                  <div className="text-slate-400">========================================================================================</div>
                </div>
                <div className="bg-[#0F223D] p-5 rounded border border-slate-700 text-center text-slate-400 italic">
                  Parliamentary legislative division lists and chamber debates.
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<ParliamentaryEngine />);
  </script>
</body>
</html>
